// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2*r) r = w/2
    if (h < 2*r) r = h/2
    this.beginPath()
    this.moveTo(x+r, y)
    this.arcTo(x+w, y,   x+w, y+h, r)
    this.arcTo(x+w, y+h, x,   y+h, r)
    this.arcTo(x,   y+h, x,   y,   r)
    this.arcTo(x,   y,   x+w, y,   r)
    this.closePath()
    return this
  }
}

// [3] Easing & math utils

const E = {
  outCubic:   t => 1 - Math.pow(1-t, 3),
  outQuint:   t => 1 - Math.pow(1-t, 5),
  outElastic: t => {
    if (t===0||t===1) return t
    return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1
  },
  inOutQuad:  t => t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2,
  outBounce:  t => {
    const n1=7.5625, d1=2.75
    if (t < 1/d1)        return n1*t*t
    if (t < 2/d1)        return n1*(t-=1.5/d1)*t+0.75
    if (t < 2.5/d1)      return n1*(t-=2.25/d1)*t+0.9375
    return n1*(t-=2.625/d1)*t+0.984375
  },
  linear: t => t,
}
const lerp   = (a, b, t) => a + (b-a)*t
const clamp  = (v, lo, hi) => Math.max(lo, Math.min(hi, v))
const prog   = (el, s, e) => clamp((el-s)/(e-s), 0, 1)

  SCENES.forEach((_, i) => {

    else if (i === idx) f.style.transform = `scaleX(${clamp(ratio,0,1)})`

function genChart(n=120) {
  const closes = [], highs = [], lows = [], volumes = []
  let p = 50000 + Math.random()*50000
  for (let i=0; i<n; i++) {
    const chg = (Math.random()-0.48)*p*0.025
    p = Math.max(p+chg, 1000)
    const h = p*(1+Math.random()*0.015)
    const l = p*(1-Math.random()*0.015)
    closes.push(Math.round(p))
    highs.push(Math.round(h))
    lows.push(Math.round(l))
    volumes.push(Math.round(1e6 + Math.random()*9e6))
  }
  return { closes, highs, lows, volumes }
}

function normalizeSock(raw) {
  const ch = raw.chart || {}
  const closes  = ch.close  || ch.closes  || []
  const highs   = ch.high   || ch.highs   || []
  const lows    = ch.low    || ch.lows    || []
  const volumes = ch.volume || ch.volumes || []
  const n = closes.length
  return {
    ticker: raw.ticker || raw.symbol || 'UNKNOWN',
    name:   raw.name || raw.ticker || 'Unknown',
    price:  raw.price || closes[n-1] || 0,
    change_pct: raw.change_pct || raw.change || 0,
    sector: raw.sector || 'ETC',
    score:  raw.score || 75,
    signals: raw.signals || { golden_cross:false, volume_confirm:false, rsi_signal:false },
    swing:  raw.swing || {
      entry_low: closes[n-1]*0.98, entry_high: closes[n-1]*1.00,
      stop_loss: closes[n-1]*0.92, stop_pct:8,
      target1: closes[n-1]*1.12, target1_pct:12, target1_week:'3-4주',

// ─────────────────────────────────────────────
// [6] Technical indicators
// ─────────────────────────────────────────────
function sma(arr, n) {
  const out = new Array(arr.length).fill(null)
  for (let i=n-1; i<arr.length; i++) {
    let s=0; for(let j=0;j<n;j++) s+=arr[i-j]; out[i]=s/n
  }
  return out
}

function ema(arr, n) {
  const k = 2/(n+1)
  const out = new Array(arr.length).fill(null)
  let i0 = -1
  for (let i=0;i<arr.length;i++) if(arr[i]!=null){i0=i;break}
  if (i0<0) return out
  out[i0] = arr[i0]
  for (let i=i0+1;i<arr.length;i++) {
    out[i] = (arr[i]==null?out[i-1]:arr[i])*k + out[i-1]*(1-k)
  }
  return out
}

function calcBoll(closes, n=20, k=2) {
  const mid = sma(closes, n)
  const upper = [], lower = []
  for (let i=0; i<closes.length; i++) {
    if (mid[i]==null) { upper.push(null); lower.push(null); continue }
    let sq=0
    for (let j=0;j<n;j++) sq+=Math.pow(closes[i-j]-mid[i],2)
    const sd = Math.sqrt(sq/n)
    upper.push(mid[i]+k*sd)
    lower.push(mid[i]-k*sd)
  }
  return { upper, mid, lower }
}

function calcFib(closes, highs, lows, lb=60) {
  const sl = Math.max(0, closes.length-lb)
  const subH = highs.slice(sl), subL = lows.slice(sl)
  const hi = Math.max(...subH), lo = Math.min(...subL)
  const d = hi - lo
  return {
    hi, lo,
    f618: hi - d*0.618,
    f500: hi - d*0.500,
    f382: hi - d*0.382,
    f236: hi - d*0.236,
  }
}

function findGoldenCross(ma5, ma20) {
  for (let i=ma20.length-1; i>0; i--) {
    if (ma5[i]!=null && ma20[i]!=null && ma5[i-1]!=null && ma20[i-1]!=null) {
      if (ma5[i-1] <= ma20[i-1] && ma5[i] > ma20[i]) return i
    }
  }
  return -1
}

function findVolSpike(volumes, n=20) {
  let best=-1, bv=0
  for (let i=n; i<volumes.length; i++) {
    let avg=0; for(let j=1;j<=n;j++) avg+=volumes[i-j]; avg/=n
    const ratio = volumes[i]/avg
    if (ratio>bv) { bv=ratio; best=i }
  }
  return { idx: best, ratio: bv }
}

function calcRSI(closes, n=14) {
  const out = new Array(closes.length).fill(null)
  if (closes.length < n+2) return out
  let gU=0, lU=0
  for (let i=1; i<=n; i++) {
    const d = closes[i]-closes[i-1]
    d>0 ? gU+=d : lU+=-d
  }
  let aG=gU/n, aL=lU/n
  out[n] = 100-100/(1+aG/Math.max(aL,0.001))
  for (let i=n+1; i<closes.length; i++) {
    const d=closes[i]-closes[i-1]
    const g=d>0?d:0, l=d<0?-d:0
    aG=(aG*(n-1)+g)/n; aL=(aL*(n-1)+l)/n
    out[i] = 100-100/(1+aG/Math.max(aL,0.001))
  }
  return out
}

function calcMACD(closes) {
  const e12 = ema(closes, 12)
  const e26 = ema(closes, 26)
  const macd = e12.map((v,i) => (v!=null&&e26[i]!=null) ? v-e26[i] : null)
  const signal = ema(macd.map(v=>v||0), 9)
  const hist = macd.map((v,i) => (v!=null&&signal[i]!=null) ? v-signal[i] : null)
  return { macd, signal, hist }
}

// ─────────────────────────────────────────────
// [7] Coordinate utils
// ─────────────────────────────────────────────
const CL=20, CR=346, CT=100, CB=380
const VT=400, VB=480

function normY(val, minP, maxP) {
  return CT + (CB-CT)*(1-(val-minP)/(maxP-minP))
}
function normVY(val, maxV) {
  return VB - (VB-VT)*(val/maxV)
}
function xArr(idx, n) {
  return CL + (CR-CL)*(idx/(n-1))
}

function fmtPrice(v) {
  if (v==null || v===0) return '-'
  if (v>=1000000) return (v/1000000).toFixed(2)+'M'
  if (v>=1000)    return Math.round(v).toLocaleString()
  return v.toFixed(2)
}
function fmtShort(v) {
  if (v>=1e9)  return (v/1e9).toFixed(1)+'B'
  if (v>=1e6)  return (v/1e6).toFixed(1)+'M'
  if (v>=1e3)  return (v/1e3).toFixed(1)+'K'
  return String(v)
}
function fmtChange(v) {
  return (v>=0?'+':'') + Number(v).toFixed(2) + '%'
}

function drawYLabels(ctx, minP, maxP, steps=4) {
  ctx.save()
  ctx.font = '10px "Noto Sans KR"'
  ctx.fillStyle = C.gray
  ctx.textAlign = 'right'
  for (let i=0; i<=steps; i++) {
    const val = minP + (maxP-minP)*(i/steps)
    const y = normY(val, minP, maxP)
    ctx.fillText(fmtPrice(val), CL-4, y+4)
    ctx.strokeStyle = '#ffffff08'
    ctx.lineWidth = 0.5
    ctx.beginPath(); ctx.moveTo(CL, y); ctx.lineTo(CR, y); ctx.stroke()
  }
  ctx.restore()
}

function drawXLabels(ctx, n) {
  const steps = 4
  ctx.save()
  ctx.font = '10px "Noto Sans KR"'
  ctx.fillStyle = C.gray
  ctx.textAlign = 'center'
  for (let i=0; i<=steps; i++) {
    const idx = Math.round((n-1)*i/steps)
    const x = xArr(idx, n)
    const daysAgo = n-1-idx
    const label = daysAgo===0 ? '오늘' : `-${daysAgo}d`
    ctx.fillText(label, x, CB+16)
  }
  ctx.restore()
}

// ─────────────────────────────────────────────
// [8] drawCometLine
// ─────────────────────────────────────────────
function drawCometLine(ctx, xs, ys, progress, {
  color='#6ee7b7', lw=2, glow=null, glowBlur=12,
  comet=true, fill=false, fillColor=null,
}={}) {
  if (xs.length < 2) return
  const n = xs.length
  const endIdx = Math.floor(progress * (n-1))
  if (endIdx < 1) return

  ctx.save()
  if (glow) {
    ctx.shadowColor = glow
    ctx.shadowBlur  = glowBlur
  }

  if (fill && fillColor) {
    ctx.beginPath()
    ctx.moveTo(xs[0], ys[0])
    for (let i=1; i<=endIdx; i++) ctx.lineTo(xs[i], ys[i])
    ctx.lineTo(xs[endIdx], CB)
    ctx.lineTo(xs[0], CB)
    ctx.closePath()
    ctx.fillStyle = fillColor
    ctx.fill()
  }

  ctx.beginPath()
  ctx.moveTo(xs[0], ys[0])
  for (let i=1; i<=endIdx; i++) ctx.lineTo(xs[i], ys[i])
  ctx.strokeStyle = color
  ctx.lineWidth = lw
  ctx.lineJoin = 'round'
  ctx.lineCap = 'round'
  ctx.stroke()

  if (comet && endIdx < n-1) {
    const cx = xs[endIdx], cy = ys[endIdx]
    ctx.shadowBlur = 0
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 10)
    grad.addColorStop(0, color)
    grad.addColorStop(1, 'transparent')
    ctx.beginPath()
    ctx.arc(cx, cy, 4, 0, Math.PI*2)
    ctx.fillStyle = grad
    ctx.fill()
    ctx.beginPath()
    ctx.arc(cx, cy, 2, 0, Math.PI*2)
    ctx.fillStyle = color
    ctx.fill()
  }
  ctx.restore()
}

// ─────────────────────────────────────────────
// [9] drawBurst
// ─────────────────────────────────────────────
function drawBurst(ctx, cx, cy, progress, color, {
  rings=4, maxR=52, pCount=12, flashA=0.18,
}={}) {
  if (!color) color = C.gold
  ctx.save()
  // flash
  const fa = flashA * Math.max(0, 1-progress*3)
  if (fa>0) {
    ctx.globalAlpha = fa
    ctx.fillStyle = color
    ctx.beginPath(); ctx.arc(cx, cy, 60, 0, Math.PI*2); ctx.fill()
    ctx.globalAlpha = 1
  }
  // rings
  for (let r=0; r<rings; r++) {
    const rp = clamp(progress - r*0.1, 0, 1)
    if (rp<=0) continue
    const radius = maxR * rp
    const alpha  = (1-rp)*0.7
    ctx.globalAlpha = alpha
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2)
    ctx.strokeStyle = color
    ctx.lineWidth = 2
    ctx.stroke()
  }
  ctx.globalAlpha = 1
  // particles
  for (let p=0; p<pCount; p++) {
    const angle = (p/pCount)*Math.PI*2
    const dist  = maxR*1.4*progress
    const pa    = clamp(1-progress, 0, 1)
    const px = cx + Math.cos(angle)*dist
    const py = cy + Math.sin(angle)*dist
    ctx.globalAlpha = pa
    ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2)
    ctx.fillStyle = color
    ctx.fill()
  }
  ctx.globalAlpha = 1
  // center glow
  const ca = Math.max(0, 0.9-progress*1.5)
  if (ca > 0) {
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 20)
    cg.addColorStop(0, '#ffffff')
    cg.addColorStop(0.3, color)
    cg.addColorStop(1, 'transparent')
    ctx.globalAlpha = ca
    ctx.beginPath(); ctx.arc(cx, cy, 20, 0, Math.PI*2)
    ctx.fillStyle = cg; ctx.fill()
    ctx.globalAlpha = 1
  }
  ctx.restore()
}

// ─────────────────────────────────────────────
// [10] drawPopLabel
// ─────────────────────────────────────────────
function drawPopLabel(ctx, x, y, text, progress, color) {
  if (!color) color = C.gold
  if (progress<=0) return
  const t = E.outElastic(clamp(progress*2, 0, 1))
  const alpha = clamp(progress*3, 0, 1)
  const py = y - 10*(1-t)
  ctx.save()
  ctx.globalAlpha = alpha
  ctx.font = 'bold 11px "Noto Sans KR"'
  ctx.textAlign = 'center'
  const tw = ctx.measureText(text).width
  const pad = 8
  const rw = tw + pad*2, rh = 22
  const rx = x - rw/2, ry = py - rh/2
  ctx.fillStyle = color
  ctx.beginPath(); ctx.roundRect(rx, ry, rw, rh, 11); ctx.fill()
  ctx.fillStyle = '#000'
  ctx.fillText(text, x, py+4)
  ctx.restore()
}

// ─────────────────────────────────────────────
// [11] drawHLine
// ─────────────────────────────────────────────
function drawHLine(ctx, y, L, R, label, color, {style='dashed', lw=1, labelRight=true}={}) {
  ctx.save()
  ctx.strokeStyle = color
  ctx.lineWidth = lw
  if (style==='dashed') ctx.setLineDash([6,4])
  else if (style==='dotted') ctx.setLineDash([2,4])
  else ctx.setLineDash([])
  ctx.beginPath(); ctx.moveTo(L, y); ctx.lineTo(R, y); ctx.stroke()
  ctx.setLineDash([])
  if (label) {
    ctx.font = '10px "Noto Sans KR"'
    ctx.fillStyle = color
    ctx.textAlign = labelRight ? 'right' : 'left'
    ctx.fillText(label, labelRight ? R : L, y-3)
  }
  ctx.restore()
}

const SIGI = {
  face:  s => s>=90?'(=ↀωↀ=)✧':s>=80?'(=^ω^=)':s>=70?'(=･ω･=)':s>=60?'(=ↀ_ↀ=)':'(=ΦωΦ=)',
  line1: s => s>=90?'이건 못 참아...':s>=80?'오늘 이거 진짜임':s>=70?'지금 눈에 띄는게 있는데':s>=60?'뭔가 보이긴 하는데':'음... 좀 지켜봐야 할 것 같기도',
  line2: s => s>=90?'역대급 신호 포착됨 🔥':s>=80?'강한 매수 신호야 ⚡':s>=70?'괜찮은 그림이 나왔어':s>=60?'신호가 애매해':'아직은 관망이 낫겠는데',
}

// ─── SIGI (1500ms) ───
function renderSigi(sc, el) {
  const stock = DATA[sc.stock]
  const s = stock.score
  const t  = clamp(el/1500, 0, 1)

  // bg
  const grad = ctx.createLinearGradient(0, 0, 0, H)
  grad.addColorStop(0, '#0a0a14')
  grad.addColorStop(1, C.bg)
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, W, H)

  // subtle grid lines
  ctx.strokeStyle = '#ffffff05'
  ctx.lineWidth = 0.5
  for (let i=0;i<10;i++) {
    ctx.beginPath(); ctx.moveTo(i*(W/10), 0); ctx.lineTo(i*(W/10), H); ctx.stroke()
  }
  for (let i=0;i<18;i++) {
    ctx.beginPath(); ctx.moveTo(0, i*(H/18)); ctx.lineTo(W, i*(H/18)); ctx.stroke()
  }

  const cx=W/2, cy=H/2-40
  const scoreColor = s>=80?C.gold:s>=60?C.green:C.blue
  const ringR = 90

  // score ring
  const ringP = E.outCubic(clamp(t*2,0,1))
  ctx.save()
  ctx.strokeStyle = C.muted
  ctx.lineWidth = 6
  ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI*2); ctx.stroke()
  ctx.strokeStyle = scoreColor
  ctx.lineWidth = 6
  ctx.lineCap = 'round'
  ctx.shadowColor = scoreColor; ctx.shadowBlur = 16
  ctx.beginPath()
  ctx.arc(cx, cy, ringR, -Math.PI/2, -Math.PI/2 + Math.PI*2*(s/100)*ringP)
  ctx.stroke()
  ctx.restore()

  // cat face
  const faceA     = E.outCubic(clamp((t-0.1)*2.5, 0, 1))
  const faceScale = E.outElastic(clamp((t-0.05)*1.8, 0, 1))
  ctx.save()
  ctx.globalAlpha = faceA
  ctx.translate(cx, cy)
  ctx.scale(faceScale, faceScale)
  ctx.font = 'bold 26px monospace'
  ctx.fillStyle = scoreColor
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.shadowColor = scoreColor; ctx.shadowBlur = 20
  ctx.fillText(SIGI.face(s), 0, 0)
  ctx.textBaseline = 'alphabetic'
  ctx.restore()

  // score number below ring
  ctx.save()
  ctx.globalAlpha = E.outCubic(clamp((t-0.2)*2, 0, 1))
  ctx.font = 'bold 18px "Noto Sans KR"'
  ctx.fillStyle = scoreColor
  ctx.textAlign = 'center'
  ctx.shadowColor = scoreColor; ctx.shadowBlur = 12
  const scoreVal = Math.round(s * Math.min(1, t*3))
  ctx.fillText(`${scoreVal}점`, cx, cy+ringR+30)
  ctx.restore()

  // line 1
  ctx.save()
  ctx.globalAlpha = E.outCubic(clamp((t-0.4)*3, 0, 1))
  ctx.font = '700 17px "Noto Sans KR"'
  ctx.fillStyle = C.white
  ctx.textAlign = 'center'
  ctx.fillText(SIGI.line1(s), cx, cy+ringR+70)
  ctx.restore()

  // line 2
  ctx.save()
  ctx.globalAlpha = E.outCubic(clamp((t-0.6)*3, 0, 1))
  ctx.font = '700 15px "Noto Sans KR"'
  ctx.fillStyle = scoreColor
  ctx.textAlign = 'center'
  ctx.shadowColor = scoreColor; ctx.shadowBlur = 8
  ctx.fillText(SIGI.line2(s), cx, cy+ringR+100)
  ctx.restore()
}

// ─── HOOK (2500ms) ───
function renderHook(sc, el) {
  const stock = DATA[sc.stock]
  const t = clamp(el/2500, 0, 1)

  ctx.fillStyle = C.bg
  ctx.fillRect(0, 0, W, H)

  const tickY = H*0.28

  // ticker
  const tickScale = E.outElastic(clamp(t*2, 0, 1))
  ctx.save()
  ctx.globalAlpha = clamp(t*3, 0, 1)
  ctx.translate(W/2, tickY)
  ctx.scale(tickScale, tickScale)
  ctx.font = '900 48px "Noto Sans KR"'
  ctx.fillStyle = C.white
  ctx.textAlign = 'center'
  ctx.fillText(stock.ticker, 0, 0)
  ctx.restore()

  // sector badge
  ctx.save()
  ctx.globalAlpha = E.outCubic(clamp((t-0.15)*3, 0, 1))
  ctx.font = '12px "Noto Sans KR"'
  ctx.textAlign = 'center'
  const sw2 = ctx.measureText(stock.sector).width
  const sx = W/2 - sw2/2 - 12, sy = tickY+22
  ctx.fillStyle = C.muted
  ctx.beginPath(); ctx.roundRect(sx, sy, sw2+24, 24, 12); ctx.fill()
  ctx.fillStyle = C.gray
  ctx.fillText(stock.sector, W/2, sy+16)
  ctx.restore()

  // price
  ctx.save()
  ctx.globalAlpha = E.outCubic(clamp((t-0.25)*3, 0, 1))
  ctx.font = '700 38px "Noto Sans KR"'
  ctx.fillStyle = C.white
  ctx.textAlign = 'center'
  ctx.fillText(fmtPrice(stock.price), W/2, H*0.46)
  ctx.restore()

  // change pct
  const chgColor = stock.change_pct >= 0 ? C.green : C.red
  ctx.save()
  ctx.globalAlpha = E.outCubic(clamp((t-0.35)*3, 0, 1))
  ctx.font = '700 22px "Noto Sans KR"'
  ctx.fillStyle = chgColor
  ctx.textAlign = 'center'
  ctx.shadowColor = chgColor; ctx.shadowBlur = 12
  ctx.fillText(fmtChange(stock.change_pct), W/2, H*0.54)
  ctx.restore()

  // signal pills
  const sigs = [
    ['골든크로스', stock.signals.golden_cross],
    ['거래량확인', stock.signals.volume_confirm],
    ['RSI신호',   stock.signals.rsi_signal],
  ]
  const pillY = H*0.64
  const pillW = 104, pillGap = 8
  const totalW = sigs.length*pillW + (sigs.length-1)*pillGap
  let px = W/2 - totalW/2
  sigs.forEach(([label, on], i) => {
    const pa = E.outCubic(clamp((t-0.45-i*0.08)*4, 0, 1))
    ctx.save()
    ctx.globalAlpha = pa
    ctx.font = '700 11px "Noto Sans KR"'
    const bgColor = on ? C.green : C.muted
    const txColor = on ? '#000' : C.gray
    ctx.fillStyle = bgColor
    if (on) { ctx.shadowColor = bgColor; ctx.shadowBlur = 10 }
    ctx.beginPath(); ctx.roundRect(px, pillY, pillW, 28, 14); ctx.fill()
    ctx.shadowBlur = 0
    ctx.fillStyle = txColor
    ctx.textAlign = 'center'
    ctx.fillText((on?'✓ ':'')+label, px+pillW/2, pillY+18)
    ctx.restore()
    px += pillW + pillGap
  })

  // RR badge
  ctx.save()
  ctx.globalAlpha = clamp((t-0.7)*5, 0, 1)
  const rrScale = E.outElastic(clamp((t-0.7)*3, 0, 1))
  ctx.font = '700 13px "Noto Sans KR"'
  const rrText = `RR ${stock.swing.rr_ratio.toFixed(1)}:1`
  const rrW = ctx.measureText(rrText).width + 24
  ctx.translate(W/2, H*0.76+16)
  ctx.scale(rrScale, rrScale)
  ctx.fillStyle = C.gold
  ctx.shadowColor = C.gold; ctx.shadowBlur = 16
  ctx.beginPath(); ctx.roundRect(-rrW/2, -16, rrW, 32, 16); ctx.fill()
  ctx.shadowBlur = 0
  ctx.fillStyle = '#000'
  ctx.textAlign = 'center'
  ctx.fillText(rrText, 0, 5)
  ctx.restore()

  // name
  ctx.save()
  ctx.globalAlpha = E.outCubic(clamp((t-0.5)*3, 0, 1)) * 0.6
  ctx.font = '14px "Noto Sans KR"'
  ctx.fillStyle = C.gray
  ctx.textAlign = 'center'
  ctx.fillText(stock.name, W/2, H*0.86)
  ctx.restore()
}

// ─── CHART (5000ms) ───
function renderChart(sc, el) {
  const stock = DATA[sc.stock]
  const cd = stock.chart_data
  const closes = cd.closes, highs = cd.highs, lows = cd.lows, volumes = cd.volumes
  const n = closes.length

  const ma5arr  = sma(closes, 5)
  const ma20arr = sma(closes, 20)
  const boll    = calcBoll(closes)
  const fib     = calcFib(closes, highs, lows)
  const swing   = stock.swing
  const gcIdx   = findGoldenCross(ma5arr, ma20arr)
  const volSpike = findVolSpike(volumes)

  const minP = Math.min(Math.min(...lows), swing.stop_loss) * 0.995
  const maxP = Math.max(Math.max(...highs), swing.target1)  * 1.005

  const xs  = closes.map((_, i) => xArr(i, n))
  const ys  = closes.map(v => normY(v, minP, maxP))
  const maxV = Math.max(...volumes)

  // bg
  ctx.fillStyle = C.bg
  ctx.fillRect(0, 0, W, H)

  // header
  ctx.save()
  ctx.font = '700 14px "Noto Sans KR"'
  ctx.fillStyle = C.white
  ctx.textAlign = 'left'
  ctx.fillText(stock.ticker, CL, 30)
  ctx.font = '12px "Noto Sans KR"'
  ctx.fillStyle = C.gray
  ctx.fillText(stock.name, CL, 50)
  const chgColor = stock.change_pct>=0?C.green:C.red
  ctx.font = '700 16px "Noto Sans KR"'
  ctx.fillStyle = chgColor
  ctx.textAlign = 'right'
  ctx.fillText(fmtChange(stock.change_pct), CR, 36)
  ctx.font = '700 20px "Noto Sans KR"'
  ctx.fillStyle = C.white
  ctx.fillText(fmtPrice(stock.price), CR, 60)
  ctx.restore()

  // chart area border
  ctx.save()
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1
  ctx.strokeRect(CL, CT, CR-CL, CB-CT)
  ctx.strokeRect(CL, VT+4, CR-CL, VB-VT-4)
  ctx.restore()

  drawYLabels(ctx, minP, maxP)
  drawXLabels(ctx, n)

  // Phase 1: Boll + price comet (0–1200ms)
  const p1 = prog(el, 0, 1200)
  if (p1 > 0) {
    const bU = boll.upper.map(v => v!=null ? normY(v, minP, maxP) : null)
    const bL = boll.lower.map(v => v!=null ? normY(v, minP, maxP) : null)
    const bMid = boll.mid.map(v => v!=null ? normY(v, minP, maxP) : null)
    const bEnd = Math.floor(p1*(n-1))

    // Boll fill
    ctx.save()
    ctx.beginPath()
    let bollStarted = false
    for (let i=0; i<=bEnd; i++) {
      if(bU[i]==null) continue
      if(!bollStarted){ctx.moveTo(xs[i],bU[i]);bollStarted=true}
      else ctx.lineTo(xs[i],bU[i])
    }
    for (let i=bEnd; i>=0; i--) {
      if(bL[i]==null) continue
      ctx.lineTo(xs[i],bL[i])
    }
    ctx.closePath()
    ctx.fillStyle='rgba(96,165,250,0.07)'; ctx.fill()

    // Boll mid dashed
    ctx.setLineDash([3,5])
    ctx.strokeStyle='rgba(96,165,250,0.3)'; ctx.lineWidth=0.8
    ctx.beginPath()
    let bmStarted=false
    for(let i=0;i<=bEnd;i++){
      if(bMid[i]==null) continue
      if(!bmStarted){ctx.moveTo(xs[i],bMid[i]);bmStarted=true}
      else ctx.lineTo(xs[i],bMid[i])
    }
    ctx.stroke()
    ctx.setLineDash([])
    ctx.restore()

    // price comet line
    const vxs=[], vys=[]
    xs.forEach((x,i)=>{ if(closes[i]!=null){vxs.push(x);vys.push(ys[i])} })
    drawCometLine(ctx, vxs, vys, p1, {
      color:C.green, lw:2,
      glow:C.green, glowBlur:10,
      fill:true, fillColor:'rgba(16,185,129,0.06)',
    })
  }

  // Phase 2: MA lines + golden cross (1200–2200ms)
  const p2 = prog(el, 1200, 2200)
  if (p2 > 0) {
    const endI = Math.floor(p2*(n-1))
    const ma5xs=[], ma5ys=[], ma20xs=[], ma20ys=[]
    for(let i=0;i<=endI;i++){
      if(ma5arr[i]!=null){ma5xs.push(xs[i]);ma5ys.push(normY(ma5arr[i],minP,maxP))}
      if(ma20arr[i]!=null){ma20xs.push(xs[i]);ma20ys.push(normY(ma20arr[i],minP,maxP))}
    }
    drawCometLine(ctx,ma5xs,ma5ys,1,{color:'#fbbf24',lw:1.5,comet:false})
    drawCometLine(ctx,ma20xs,ma20ys,1,{color:'#a78bfa',lw:1.5,comet:false})

    // MA legend
    ctx.save()
    ctx.globalAlpha=clamp(p2*5,0,1)
    ctx.font='10px "Noto Sans KR"'
    ctx.fillStyle='#fbbf24'; ctx.fillRect(CL+4,CT+6,12,2)
    ctx.fillText('MA5',CL+20,CT+11); ctx.fillStyle='#fbbf24'
    ctx.fillStyle='#a78bfa'; ctx.fillRect(CL+4,CT+18,12,2)
    ctx.fillStyle='#a78bfa'; ctx.fillText('MA20',CL+20,CT+23)
    ctx.restore()

    if (gcIdx>=0 && endI>=gcIdx) {
      const gcx = xs[gcIdx], gcy = normY(closes[gcIdx], minP, maxP)
      drawBurst(ctx, gcx, gcy, clamp(p2*3-0.3, 0, 1), C.gold)
      drawPopLabel(ctx, gcx, gcy-20, '골든크로스!', clamp((p2-0.2)*3, 0, 1), C.gold)
    }
  }

  // Phase 3: Volume bars (2200–3200ms)
  const p3 = prog(el, 2200, 3200)
  if (p3 > 0) {
    const barW = (CR-CL)/n * 0.6
    const endI = Math.floor(p3*(n-1))
    for (let i=0; i<=endI; i++) {
      const vY = normVY(volumes[i], maxV)
      const vH = VB - vY
      if(vH<=0) continue
      const isSpike = i===volSpike.idx
      const vc = i>0 && closes[i] >= closes[i-1] ? C.green : C.red
      ctx.save()
      ctx.fillStyle = isSpike ? C.gold : vc
      ctx.globalAlpha = isSpike ? 0.9 : 0.5
      if(isSpike){ctx.shadowColor=C.gold;ctx.shadowBlur=12}
      ctx.fillRect(xs[i]-barW/2, vY, barW, vH)
      ctx.restore()
    }
    if (volSpike.idx>=0 && endI>=volSpike.idx) {
      drawPopLabel(ctx, xs[volSpike.idx], VT-8, `${volSpike.ratio.toFixed(1)}x 급등!`, clamp((p3-0.4)*4,0,1), C.gold)
    }
    ctx.save()
    ctx.globalAlpha=clamp(p3*5,0,1)
    ctx.font='10px "Noto Sans KR"'; ctx.fillStyle=C.gray; ctx.textAlign='left'
    ctx.fillText('Volume', CL+4, VT+16)
    ctx.restore()
  }

  // Phase 4: Fibonacci (3200–4200ms)
  const p4 = prog(el, 3200, 4200)
  if (p4 > 0) {
    const fibs = [
      [fib.f618,'Fib 61.8%','rgba(167,139,250,0.7)'],
      [fib.f500,'Fib 50.0%','rgba(96,165,250,0.5)'],
      [fib.f382,'Fib 38.2%','rgba(52,211,153,0.5)'],
    ]
    fibs.forEach(([val,lbl,col], i) => {
      const fa = clamp((p4-i*0.15)*4, 0, 1)
      if(fa<=0) return
      const fy = normY(val, minP, maxP)
      if(fy<CT||fy>CB) return
      ctx.save(); ctx.globalAlpha=fa
      drawHLine(ctx, fy, CL, CR, lbl, col, {style:'dotted',lw:0.8})
      ctx.restore()
    })
    // entry zone
    const ezA = clamp((p4-0.4)*3, 0, 1)
    if(ezA>0){
      const ey1 = normY(swing.entry_high, minP, maxP)
      const ey2 = normY(swing.entry_low,  minP, maxP)
      if(ey1>=CT && ey2<=CB){
        ctx.save()
        ctx.globalAlpha=ezA*0.25; ctx.fillStyle=C.gold
        ctx.fillRect(CL, ey1, CR-CL, ey2-ey1)
        ctx.globalAlpha=ezA*0.7; ctx.font='bold 10px "Noto Sans KR"'
        ctx.fillStyle=C.gold; ctx.textAlign='right'
        ctx.fillText('진입 구간', CR, ey1-3)
        ctx.restore()
      }
    }
  }

  // Phase 5: Stop/Target 반짝 라인 + 가격 패널 (4200–8000ms)
  const p5 = prog(el, 4200, 8000)
  if (p5 > 0) {
    const fadeIn = clamp(p5*5, 0, 1)
    const blink  = 0.55 + 0.45 * Math.sin(el * 0.007)  // 반짝 주기 ~900ms
    const stopY  = normY(swing.stop_loss, minP, maxP)
    const t1Y    = normY(swing.target1,   minP, maxP)
    const t2Y    = normY(swing.target2,   minP, maxP)

    // 손절 — 빨간 반짝
    if (stopY>=CT && stopY<=CB) {
      ctx.save()
      ctx.globalAlpha = fadeIn * blink
      ctx.shadowColor = C.red; ctx.shadowBlur = 10*blink
      drawHLine(ctx, stopY, CL, CR, `손절 ${fmtPrice(swing.stop_loss)}`, C.red, {style:'dashed',lw:1.5})
      ctx.restore()
    }
    // 목표1 — 초록 반짝
    if (t1Y>=CT && t1Y<=CB) {
      ctx.save()
      ctx.globalAlpha = fadeIn * blink
      ctx.shadowColor = C.green; ctx.shadowBlur = 10*blink
      drawHLine(ctx, t1Y, CL, CR, `목표1 ${fmtPrice(swing.target1)}`, C.green, {style:'dashed',lw:1.5})
      ctx.restore()
    }
    // 목표2 — 연한 초록
    if (t2Y>=CT && t2Y<=CB) {
      ctx.save()
      ctx.globalAlpha = fadeIn * 0.75
      drawHLine(ctx, t2Y, CL, CR, `목표2 ${fmtPrice(swing.target2)}`, '#6ee7b7', {style:'dashed',lw:1})
      ctx.restore()
    }

    // ─ 가격 정보 패널 (거래량 하단)
    const infoA = clamp((p5-0.1)*5, 0, 1)
    if (infoA > 0) {
      const panelRows = [
        ['진입가',    `${fmtPrice(swing.entry_low)} – ${fmtPrice(swing.entry_high)}`, C.gold],
        ['1차 목표가', `+${swing.target1_pct}%  →  ${fmtPrice(swing.target1)}  (${swing.target1_week})`, C.green],
        ['손절가',    `-${swing.stop_pct}%  →  ${fmtPrice(swing.stop_loss)}`, C.red],
      ]
      panelRows.forEach(([lbl, val, col], i) => {
        const ry = VB + 14 + i*24
        ctx.save()
        ctx.globalAlpha = infoA
        if (i > 0) {
          ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=0.5
          ctx.beginPath(); ctx.moveTo(CL, ry-6); ctx.lineTo(CR, ry-6); ctx.stroke()
        }
        ctx.font='11px "Noto Sans KR"'; ctx.fillStyle=C.gray; ctx.textAlign='left'
        ctx.fillText(lbl, CL, ry+2)
        ctx.font='bold 12px "Noto Sans KR"'; ctx.fillStyle=col
        ctx.shadowColor=col; ctx.shadowBlur=4; ctx.textAlign='right'
        ctx.fillText(val, CR, ry+2)
        ctx.restore()
      })

      // RR badge
      const rrA = E.outElastic(clamp((p5-0.15)*4, 0, 1))
      const rrAl = clamp((p5-0.15)*6, 0, 1)
      if (rrAl > 0) {
        ctx.save()
        ctx.globalAlpha = rrAl
        ctx.font = 'bold 12px "Noto Sans KR"'
        const rrTxt = `RR  1 : ${swing.rr_ratio.toFixed(1)}`
        const rw2 = ctx.measureText(rrTxt).width + 26
        ctx.translate(W/2, VB + 100)
        ctx.scale(rrA, rrA)
        ctx.fillStyle=C.gold
        ctx.shadowColor=C.gold; ctx.shadowBlur=12*(0.55+0.45*Math.sin(el*0.006))
        ctx.beginPath(); ctx.roundRect(-rw2/2,-14,rw2,28,14); ctx.fill()
        ctx.shadowBlur=0; ctx.fillStyle='#000'; ctx.textAlign='center'
        ctx.fillText(rrTxt, 0, 5)
        ctx.restore()
      }
    }
  }
}

// ─── SUMMARY (3000ms) HTML ───
function renderSummary(sc, el) {
  ctx.fillStyle = C.bg
  ctx.fillRect(0, 0, W, H)
  const stock = DATA[sc.stock]
  const sw  = stock.swing
  const key = 'summary_' + sc.id
  const cd  = stock.chart_data
  const cls = cd.closes, hgs = cd.highs, lws = cd.lows, vols = cd.volumes
  const n   = cls.length, last = cls[n-1]

  // ── 지표 계산
  const ma5a   = sma(cls, 5)
  const ma20a  = sma(cls, 20)
  const rsiArr = calcRSI(cls)
  const {macd:macdArr, signal:sigArr, hist:histArr} = calcMACD(cls)
  const boll2  = calcBoll(cls)
  const fib2   = calcFib(cls, hgs, lws)
  const vs2    = findVolSpike(vols)
  const vma20  = sma(vols, 20)
  const gcIdx2 = findGoldenCross(ma5a, ma20a)

  const rsiV  = rsiArr[n-1] || 50
  const macdV = macdArr[n-1], sigV = sigArr[n-1]
  const histV = histArr[n-1]||0, histP = histArr[n-2]||0
  const ma20V = ma20a[n-1]||last
  const bollM = boll2.mid[n-1]
  const bollBW  = (boll2.upper[n-1]||0)-(boll2.lower[n-1]||0)
  const bollBW2 = n>=20 ? (boll2.upper[n-20]||0)-(boll2.lower[n-20]||0) : bollBW*1.5

  const hi30 = Math.max(...cls.slice(Math.max(0,n-31), n-1))

  // 12개 기술 지표
  const sigs = [
    // 트렌드
    ['📈 골든크로스',      gcIdx2>=0 && gcIdx2>=n-20],
    ['🔼 MA20 상방 안착',  last > ma20V],
    ['💥 추세 돌파',       last > hi30],
    // 모멘텀
    ['🔀 MACD 골든크로스', macdV!=null && sigV!=null && macdV > sigV],
    ['📊 MACD 히스토그램↑',histV > histP],
    ['⚡ RSI 모멘텀',      rsiV > 50 && rsiV < 70],
    ['🔄 RSI 과매도 반등', rsiV >= 35 && rsiV <= 55 && cls[n-1]>cls[n-5]],
    // 거래량
    ['📦 거래량 급등',     vs2.idx>=n-10 && vs2.ratio>1.5],
    ['📉 거래량 MA 상회',  vma20[n-1]!=null && vols[n-1]>vma20[n-1]],
    // 패턴·구조
    ['🎯 볼린저 밴드 돌파', bollM!=null && last > bollM],
    ['🌀 피보나치 지지',   [fib2.f618,fib2.f500,fib2.f382].some(lv=>Math.abs(last-lv)/last<0.025)],
    ['🏆 컵앤핸들 패턴',   stock.score >= 85],
  ]

  const trueN = sigs.filter(([,v])=>v).length
  const pct   = Math.round(trueN/sigs.length*100)
  const pctColor = pct>=70?'#10b981':pct>=50?'#f59e0b':'#ef4444'
  const pctBg    = pct>=70?'rgba(16,185,129,0.12)':pct>=50?'rgba(245,158,11,0.12)':'rgba(239,68,68,0.12)'
  const pctBd    = pct>=70?'rgba(16,185,129,0.3)':pct>=50?'rgba(245,158,11,0.3)':'rgba(239,68,68,0.3)'

  initUI(key, `
  <div style="
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:340px;
    animation:sumIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  ">
    <style>
    @keyframes sumIn{from{opacity:0;transform:translate(-50%,-56%) scale(0.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    </style>

    <!-- 헤더 -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div>
        <div style="font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.5px;">${stock.ticker}</div>
        <div style="font-size:11px;color:#555;">스윙 트레이딩 신호 분석</div>
      </div>
      <div style="text-align:center;padding:6px 12px;border-radius:20px;
        background:${pctBg};border:1px solid ${pctBd};">
        <div style="font-size:18px;font-weight:900;color:${pctColor};">${pct}%</div>
        <div style="font-size:9px;color:${pctColor};opacity:0.8;">${trueN}/${sigs.length} 신호</div>
      </div>
    </div>

    <!-- 지표 그리드 2열 -->
    <div style="background:#0a0a12;border:1px solid #1a1a2a;border-radius:14px;padding:10px 12px;margin-bottom:8px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
        ${sigs.map(([lbl,on])=>`
        <div style="
          display:flex;align-items:center;gap:5px;
          padding:5px 7px;border-radius:8px;
          background:${on?'rgba(16,185,129,0.08)':'rgba(255,255,255,0.02)'};
          border:1px solid ${on?'rgba(16,185,129,0.2)':'#1a1a1a'};
        ">
          <span style="font-size:11px;font-weight:900;color:${on?'#10b981':'#3a3a3a'};flex-shrink:0;">${on?'✓':'✗'}</span>
          <span style="font-size:10px;color:${on?'#bbb':'#444'};line-height:1.3;">${lbl}</span>
        </div>`).join('')}
      </div>
    </div>

    <!-- 스윙 가격 -->
    <div style="background:#0a0a12;border:1px solid #1a1a2a;border-radius:14px;padding:10px 14px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:11px;color:#555;">진입가</span>
        <span style="font-size:12px;font-weight:700;color:#f59e0b;">${fmtPrice(sw.entry_low)} – ${fmtPrice(sw.entry_high)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:11px;color:#555;">1차 목표 <span style="color:#333;">(${sw.target1_week})</span></span>
        <span style="font-size:12px;font-weight:700;color:#10b981;">+${sw.target1_pct}% → ${fmtPrice(sw.target1)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:11px;color:#555;">2차 목표 <span style="color:#333;">(${sw.target2_week})</span></span>
        <span style="font-size:12px;font-weight:700;color:#10b981;">+${sw.target2_pct}% → ${fmtPrice(sw.target2)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span style="font-size:11px;color:#555;">손절가</span>
        <span style="font-size:12px;font-weight:700;color:#ef4444;">-${sw.stop_pct}% → ${fmtPrice(sw.stop_loss)}</span>
      </div>
    </div>

    <!-- 스탯 4개 -->
    <div style="display:flex;gap:6px;">
      <div style="flex:1;background:#0a0a12;border:1px solid #1a1a2a;border-radius:10px;padding:8px 4px;text-align:center;">
        <div style="font-size:9px;color:#555;margin-bottom:2px;">RR비</div>
        <div style="font-size:16px;font-weight:900;color:#f59e0b;">1:${sw.rr_ratio.toFixed(1)}</div>
      </div>
      <div style="flex:1;background:#0a0a12;border:1px solid #1a1a2a;border-radius:10px;padding:8px 4px;text-align:center;">
        <div style="font-size:9px;color:#555;margin-bottom:2px;">거래량</div>
        <div style="font-size:16px;font-weight:900;color:#60a5fa;">${sw.vol_multiple.toFixed(1)}x</div>
      </div>
      <div style="flex:1;background:#0a0a12;border:1px solid #1a1a2a;border-radius:10px;padding:8px 4px;text-align:center;">
        <div style="font-size:9px;color:#555;margin-bottom:2px;">RSI</div>
        <div style="font-size:16px;font-weight:900;color:${rsiV>70?'#ef4444':rsiV>50?'#10b981':'#60a5fa'};">${rsiV.toFixed(0)}</div>
      </div>
      <div style="flex:1;background:#0a0a12;border:1px solid #1a1a2a;border-radius:10px;padding:8px 4px;text-align:center;">
        <div style="font-size:9px;color:#555;margin-bottom:2px;">점수</div>
        <div style="font-size:16px;font-weight:900;color:#a78bfa;">${stock.score}</div>
      </div>
    </div>
  </div>`)
}

// ─── TRANSITION (500ms) ───
function renderTransition(sc, el) {
  const t = clamp(el/500, 0, 1)
  ctx.fillStyle = C.bg
  ctx.fillRect(0, 0, W, H)
  const alpha = t < 0.3
    ? E.outQuint(t/0.3)
    : E.outCubic(1-(t-0.3)/0.7)
  ctx.save()
  ctx.globalAlpha = alpha * 0.85
  ctx.fillStyle = C.white
  ctx.fillRect(0, 0, W, H)
  ctx.restore()
  clearUI()
}

// ─── FINAL (2500ms) HTML ───
function renderFinal(sc, el) {
  ctx.fillStyle = C.bg
  ctx.fillRect(0, 0, W, H)

  // particle background
  const t = clamp(el/2500, 0, 1)
  for (let i=0; i<30; i++) {
    const seed = i * 137.508
    const px = (Math.sin(seed)*0.5+0.5)*W
    const py = (Math.cos(seed*1.3)*0.5+0.5)*H
    const phase = (t*2 + i*0.2) % 1
    const sz = 1.5 + Math.sin(seed)*0.8
    ctx.save()
    ctx.globalAlpha = clamp(t*4,0,1) * (0.3+Math.sin(phase*Math.PI)*0.4)
    ctx.fillStyle = [C.gold, C.green, C.blue][i%3]
    ctx.beginPath(); ctx.arc(px, py, sz, 0, Math.PI*2); ctx.fill()
    ctx.restore()
  }

  initUI('final', `
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;text-align:center;animation:finalIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;">
    <style>
    @keyframes finalIn{from{opacity:0;transform:translate(-50%,-60%) scale(0.85)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    @keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
    </style>
    <div style="font-size:40px;margin-bottom:8px;">🐱</div>
    <div style="font-size:24px;font-weight:900;color:#fff;margin-bottom:4px;">오늘의 추천 완료</div>
    <div style="font-size:13px;color:#555;margin-bottom:24px;">Top 2 스윙 트레이딩 종목</div>
    ${DATA.map(s=>`
    <div style="background:linear-gradient(135deg,#111,#0d0d1a);border:1px solid #222;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div style="text-align:left;">
        <div style="font-size:18px;font-weight:900;color:#fff;">${s.ticker}</div>
        <div style="font-size:11px;color:#555;">${s.sector}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:15px;font-weight:700;color:#f59e0b;">${fmtChange(s.change_pct)}</div>
        <div style="font-size:12px;color:#888;margin-top:2px;">점수 ${s.score}</div>
      </div>
    </div>`).join('')}
    <div style="margin-top:16px;padding:10px 20px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;font-size:11px;color:#f59e0b;animation:pulse 2s ease-in-out infinite;">⚠ 본 분석은 참고용입니다. 투자 결정은 본인 판단으로.</div>
  </div>`)
}

// ─────────────────────────────────────────────
// [14] renderScene dispatcher
// ─────────────────────────────────────────────
function renderScene(sc, el) {
  switch(sc.type) {
    case 'sigi':       renderSigi(sc, el);       break
    case 'hook':       renderHook(sc, el);        break
    case 'card':       renderCard(sc, el);        break
    case 'chart':      renderChart(sc, el);       break
    case 'summary':    renderSummary(sc, el);     break
    case 'transition': renderTransition(sc, el);  break
    case 'final':      renderFinal(sc, el);       break
  }
}

// ─────────────────────────────────────────────
// [15] Master loop
// ─────────────────────────────────────────────
function masterLoop(ts) {
  requestAnimationFrame(masterLoop)
  if (paused) return
  if (!lastTs) lastTs = ts
  lastTs = ts
  if (!scStart) scStart = ts
  const el = ts - scStart

  ctx.clearRect(0, 0, W, H)
  ctx.fillStyle = C.bg
  ctx.fillRect(0, 0, W, H)

  const sc = SCENES[scIdx]
  if (DATA) renderScene(sc, el)
  updateSegBar(scIdx, el / sc.dur)

  if (el >= sc.dur) {
    scIdx = (scIdx + 1) % SCENES.length
    scStart = ts
    clearUI()
  }
}

// tap to pause
document.getElementById('phone').addEventListener('click', () => { paused = !paused })

// ─────────────────────────────────────────────
// [16] Boot — wait for fonts then load data
// ─────────────────────────────────────────────
;(async () => {
  await document.fonts.ready
  try {
    await Promise.all([
      document.fonts.load('400 14px "Noto Sans KR"'),
      document.fonts.load('700 14px "Noto Sans KR"'),
      document.fonts.load('900 14px "Noto Sans KR"'),
    ])
  } catch(e) {}
  await loadData()
})()
</script>
