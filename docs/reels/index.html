<script>
'use strict'
/* ═══════════════════════════════════════════════════════════
   3. 이징 함수
════════════════════════════════════════════════════════════ */
const easeOutCubic  = t => 1 - Math.pow(1-t, 3)
const easeOutQuint  = t => 1 - Math.pow(1-t, 5)
const easeOutElastic = t => {
  if (t === 0 || t === 1) return t
  return Math.pow(2,-10*t) * Math.sin((t*10-0.75)*(2*Math.PI/3)) + 1
}
const lerp  = (a,b,t) => a + (b-a)*t
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi,v))
const prog  = (elapsed, start, dur) => clamp((elapsed-start)/dur, 0, 1)

/* ═══════════════════════════════════════════════════════════
   SCENE_PLAN  (총합 30000ms)
════════════════════════════════════════════════════════════ */

]

/* ═══════════════════════════════════════════════════════════
   신호 의미 매핑
════════════════════════════════════════════════════════════ */
const SIGNAL_LABELS = {
  golden_cross:      'Golden Cross  (단기 추세 전환 확인)',
  volume_confirm:    'Volume Surge  (수급 폭증 · 매집 신호)',
  rsi_signal:        'RSI 모멘텀  (과열 아님 · 상승 여력)',
  rsi_divergence:    'RSI Divergence  (하락 중 반등 선행)',
  bollinger_break:   'Bollinger Breakout  (변동성 폭발 임박)',
  macd_cross:        'MACD Cross  (매수세 우위 전환)',
  stoch_signal:      'Stochastic  (과매도 탈출 · 반등 시작)',
  ma_alignment:      'MA 정배열  (5 · 20 · 60 전부 상향)',

/* ═══════════════════════════════════════════════════════════
   2. Canvas 전역 변수
════════════════════════════════════════════════════════════ */
const W = 390, H = 844
let DPR = 1
let canvas, ctx

/* ═══════════════════════════════════════════════════════════
   6. 마스터 루프 상태
════════════════════════════════════════════════════════════ */
let sceneIdx = 0, sceneStartTime = null, paused = false, lastTs = 0

/* ═══════════════════════════════════════════════════════════
   4. 세그먼트 프로그레스바
════════════════════════════════════════════════════════════ */
function buildSegBar() {
  const bar = document.getElementById('segbar')
  bar.innerHTML = ''
  SCENE_PLAN.forEach((_, i) => {
    const seg  = document.createElement('div'); seg.className = 'seg'
    const fill = document.createElement('div'); fill.className = 'seg-fill'
    fill.id = 'sf' + i
    seg.appendChild(fill); bar.appendChild(seg)
  })
}

function updateSegBar(idx, pct) {
  SCENE_PLAN.forEach((_, i) => {
    const f = document.getElementById('sf'+i); if (!f) return
    f.style.width = (i < idx ? 100 : i === idx ? clamp(pct,0,1)*100 : 0) + '%'
  })
}

/* ═══════════════════════════════════════════════════��═══════
   포맷 헬퍼
════════════════════════════════════════════════════════════ */
function fmtPrice(v) {
  if (!v && v !== 0) return '—'
  if (v < 10)   return '$' + v.toFixed(3)
  if (v < 1000) return '$' + v.toFixed(2)
  return '$' + v.toLocaleString('en-US', {maximumFractionDigits:0})
}
function fmtChange(pct) {
  return (pct >= 0 ? '▲ +' : '▼ ') + Math.abs(pct).toFixed(2) + '%'
}

/* ═══════════════════════════════════════════════════════════
   Canvas 좌표 헬퍼
════════════════════════════════════════════════════════════ */
function normY(vals, minV, maxV, top, bot) {
  const range = maxV - minV || 1
  return vals.map(v => v == null ? null : bot - ((v - minV) / range) * (bot - top))
}
function xArr(n, L, R) {
  return Array.from({length:n}, (_,i) => L + (i/(n-1||1))*(R-L))
}

/* ═══════════════════════════════════════════════════════════
   SMA
════════════════════════════════════════════════════════════ */
function sma(arr, n) {
  return arr.map((_, i) => {
    if (i < n-1) return null
    let s = 0; for (let j=i-n+1; j<=i; j++) s += arr[j]
    return s/n
  })
}

/* ═══════════════════════════════════════════════════════════
   8. drawCometLine() — 혜성 라인
════════════════════════════════════════════════════════════ */
function drawCometLine(ctx, xs, ys, progress, {
  color='#6ee7b7', lineWidth=2, glowColor=null, glowBlur=12, comet=true
}={}) {
  const n = xs.length
  const end = (n-1) * easeOutCubic(progress)
  const drawn = Math.floor(end), frac = end - drawn
  ctx.save()
  ctx.strokeStyle = color; ctx.lineWidth = lineWidth
  ctx.lineJoin = 'round'; ctx.lineCap = 'round'
  if (glowColor) { ctx.shadowColor = glowColor; ctx.shadowBlur = glowBlur }
  ctx.beginPath()
  let started = false
  for (let i = 0; i <= Math.min(drawn+1, n-1); i++) {
    const y = ys[i]; if (y == null) { started = false; continue }
    let x = xs[i]
    if (i === drawn+1 && drawn < n-1 && ys[drawn] != null) {
      x = lerp(xs[drawn], x, frac)
      const yy = lerp(ys[drawn], y, frac)
      started ? ctx.lineTo(x, yy) : (ctx.moveTo(x, yy), started = true)
      continue
    }
    started ? ctx.lineTo(x, y) : (ctx.moveTo(x, y), started = true)
  }
  ctx.stroke()
  if (comet && progress > 0.02 && progress < 0.97 && ys[drawn] != null) {
    const hi = Math.min(drawn+1, n-1)
    const hx = lerp(xs[drawn], xs[hi], frac)
    const hy = lerp(ys[drawn], ys[hi] ?? ys[drawn], frac)
    ctx.shadowColor = glowColor||color; ctx.shadowBlur = 24
    ctx.fillStyle = '#fff'
    ctx.beginPath(); ctx.arc(hx, hy, lineWidth*1.9, 0, Math.PI*2); ctx.fill()
  }
  ctx.restore()
}

/* ═══════════════════════════════════════════════════════════
   9. drawBurst() — 폭발 효과
════════════════════════════════════════════════════════════ */
function drawBurst(ctx, cx, cy, progress, color='#f59e0b') {
  const p = clamp(progress, 0, 1)
  const fa = Math.sin(clamp(p/0.4,0,1)*Math.PI)*0.22
  if (fa > 0.01) {
    ctx.save(); ctx.globalAlpha=fa; ctx.fillStyle=color
    ctx.fillRect(0,0,W,H); ctx.restore()
  }
  for (let r=0; r<4; r++) {
    const rp = easeOutCubic(clamp(p*3-r*0.3, 0, 1))
    if (rp <= 0.01) continue
    ctx.save(); ctx.globalAlpha = (1-rp)*0.9
    ctx.strokeStyle=color; ctx.lineWidth = 2.5*(1-rp*0.7)
    ctx.shadowColor=color; ctx.shadowBlur = 14*(1-rp)
    ctx.beginPath(); ctx.arc(cx, cy, rp*55, 0, Math.PI*2); ctx.stroke()
    ctx.restore()
  }
  const pp = easeOutQuint(clamp(p*1.8, 0, 1))
  if (pp > 0.01 && pp < 0.99) {
    for (let i=0; i<12; i++) {
      const a = (i/12)*Math.PI*2
      ctx.save(); ctx.globalAlpha = (1-pp)*0.95
      ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=8
      ctx.beginPath()
      ctx.arc(cx+Math.cos(a)*pp*58, cy+Math.sin(a)*pp*58, 2.8*(1-pp*0.85), 0, Math.PI*2)
      ctx.fill(); ctx.restore()
    }
  }
  ctx.save()
  ctx.globalAlpha = clamp(p*4,0,1) * (1-clamp((p-0.7)/0.3,0,1))
  ctx.shadowColor=color; ctx.shadowBlur=30
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx,cy,5.5,0,Math.PI*2); ctx.fill()
  ctx.restore()
}

/* ═══════════════════════════════════════════════════════════
   10. drawPopLabel() — 팝업 레이블
════════════════════════════════════════════════════════════ */
function drawPopLabel(ctx, x, y, text, progress, color='#f59e0b') {
  const p = easeOutElastic(clamp(progress, 0, 1))
  const alpha = clamp(p*2, 0, 1); if (alpha < 0.01) return
  const offsetY = (1-p)*18
  ctx.save(); ctx.globalAlpha = alpha
  ctx.font = '700 11px "Noto Sans KR",sans-serif'
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic'
  const tw = ctx.measureText(text).width
  const bw = tw+22, bh=24, r=12
  ctx.fillStyle='#050505ee'; ctx.shadowColor=color; ctx.shadowBlur=18
  ctx.beginPath(); ctx.roundRect(x-bw/2, y-offsetY-bh, bw, bh, r); ctx.fill()
  ctx.fillStyle=color; ctx.shadowBlur=8
  ctx.fillText(text, x, y-offsetY-7)
  ctx.restore()
}

/* ═══════════════════════════════════════════════════════════
   5. 목데이터
════════════════════════════════════════════════════════════ */
function generateMockChart(base, n) {
  let p = base * 0.87
  const closes=[], highs=[], lows=[], volumes=[]
  for (let i=0; i<n; i++) {
    let chg
    if      (i<15) chg = (Math.random()-0.42)*base*0.019
    else if (i<30) chg = -(Math.random()+0.08)*base*0.011
    else if (i<45) chg = (Math.random()-0.50)*base*0.008
    else           chg = (Math.random()+0.30)*base*0.017
    p = Math.max(base*0.74, p+chg)
    const v = p*0.013
    closes.push(+(p.toFixed(2)))
    highs.push(+(p+Math.random()*v).toFixed(2))
    lows.push(+(Math.max(p*0.99, p-Math.random()*v)).toFixed(2))
    volumes.push(Math.round(1200000*(i>=58 ? 2.6+Math.random() : 0.55+Math.random()*0.9)))
  }
  return {closes, highs, lows, volumes}
}

/* ── 한국어명 헬퍼 ───────────────────────────────────────── */
window.KR_NAMES = {}
function getKrName(ticker, englishName) {
  return window.KR_NAMES[ticker] || englishName || ticker
}

/* ── kr_names.json 로더 ─────────────────────────────────── */
async function loadKrNames() {
  const paths = ['../kr_names.json', '/stock-screener/kr_names.json']
  for (const p of paths) {
    try {
      const r = await fetch(p)
      if (!r.ok) continue
      window.KR_NAMES = await r.json()
      return
    } catch(e) {}
  }
}

/* ── data.json 로더 ──────────────────────────────────────── */
async function loadData() {
  // kr_names 와 data.json 을 동시에 요청
  await loadKrNames()

  const paths = [
    '../data.json',
    '/stock-screener/data.json',
    'https://kimjaeseung.github.io/stock-screener/data.json',
  ]
  for (const p of paths) {
    try {
      const r = await fetch(p+'?t='+Date.now())
      if (!r.ok) continue
      const j = await r.json()
      if (j.stocks?.length >= 2) return prepareData(j)
    } catch(e) { /* try next */ }
  }
  return getMockData()
}

/* 실데이터 방어적 전처리 */
function prepareData(data) {
  data.stocks = data.stocks.slice(0,2).map(s => {
    /* chart_data: 스크리너가 {closes,highs,lows,volumes} 로 내보냄.
       구버전은 s.chart 에 {close,high,low,volume} (단수) 형태로 있을 수 있음. */
    if (!s.chart_data) {
      if (s.chart && s.chart.close) {
        // 구버전 SPA chart 형식 → reels 형식으로 변환
        s.chart_data = {
          closes:  s.chart.close  || [],
          highs:   s.chart.high   || [],
          lows:    s.chart.low    || [],
          volumes: s.chart.volume || [],
        }
      } else {
        s.chart_data = generateMockChart(s.price||100, 65)
      }
    }
    /* swing: 없으면 ATR 근사치로 생성 */
    if (!s.swing) {
      const p = s.price||100
      const atr = s.atr || p * 0.025  // fallback: 2.5% of price
      s.swing = {
        entry_low:  +(p*0.995).toFixed(2),     entry_high: +(p*1.005).toFixed(2),
        stop_loss:  +(p - 2.5*atr).toFixed(2), stop_pct:   +(-2.5*atr/p*100).toFixed(1),
        target1:    +(p + 3*atr).toFixed(2),   target1_pct:+(3*atr/p*100).toFixed(1), target1_week:2,
        target2:    +(p + 6*atr).toFixed(2),   target2_pct:+(6*atr/p*100).toFixed(1), target2_week:4,
        rr_ratio:   2.5, vol_multiple: s.vol_ratio||2.0,
      }
    }
    /* signals: 스크리너가 dict[str,bool]로 내보냄.
       구버전 문자열 리스트라면 키 이름 매핑 시도. */
    if (Array.isArray(s.signals)) {
      const arr = s.signals
      const keyMap = {
        'golden_cross':     ['golden','Golden Cross','MA20'],
        'volume_confirm':   ['Volume Surge','Volume Up','volume'],
        'rsi_signal':       ['RSI Strong','RSI Rising','RSI'],
        'macd_cross':       ['MACD Bullish','MACD Cross'],
        'bollinger_break':  ['Bollinger','BB'],
        'stoch_signal':     ['Stoch'],
        'ma_alignment':     ['alignment','MA5','정배열'],
        'relative_strength':['RS +','Relative'],
        'fib_support':      ['Fibonacci','fib'],
        'rsi_divergence':   ['Divergence','divergence'],
      }
      const newSigs = {}
      Object.keys(SIGNAL_LABELS).forEach(k => {
        const patterns = keyMap[k] || [k]
        newSigs[k] = arr.some(item => patterns.some(p => item.includes(p)))
      })
      s.signals = newSigs
    }
    if (!s.signals) s.signals = {}
    if (!s.sector)  s.sector = 'NASDAQ'
    return s
  })
  return data
}

/* ═══════════════════════════════════════════════════════════
   setUI 헬퍼
════════════════════════════════════════════════════════════ */
function setUI(html) {

}

/* ═══════════════════════════════════════════════════════════
   11. 후킹 씬 (Canvas)
════════════════════════════════════════════════════════════ */
function renderHook(ctx, elapsed, stock) {
  const sw = stock.swing
  const cx = W/2

  /* 황금 플래시 배경 */
  const fp = prog(elapsed, 1200, 280)
  if (fp > 0 && fp < 1) {
    ctx.save(); ctx.globalAlpha = Math.sin(fp*Math.PI)*0.38
    ctx.fillStyle='#f59e0b'; ctx.fillRect(0,0,W,H); ctx.restore()
  }

  /* 라인1: "오늘의 스윙 기회" */
  const a1 = easeOutCubic(prog(elapsed, 0, 400))
  if (a1 > 0.01) {
    ctx.save(); ctx.globalAlpha = a1
    ctx.fillStyle='#f59e0b'
    ctx.font = '300 11px "Noto Sans KR",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='alphabetic'
    ctx.letterSpacing = '4px'
    ctx.fillText('오늘의 스윙 기회', cx, H/2-92)
    ctx.letterSpacing = '0px'
    ctx.restore()
  }

  /* 라인2: "4주 안에 +X% 가능" — slideUp */
  const a2 = easeOutCubic(prog(elapsed, 600, 450))
  if (a2 > 0.01) {
    ctx.save(); ctx.globalAlpha = a2
    ctx.fillStyle='#ffffff'
    ctx.font = '700 33px "Noto Sans KR",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='alphabetic'
    ctx.fillText(`4주 안에 +${sw.target2_pct}% 가능`, cx, H/2-42 + (1-a2)*22)
    ctx.restore()
  }

  /* 라인3: TICKER — easeOutElastic + 글로우 */
  const a3 = easeOutElastic(prog(elapsed, 1200, 900))
  if (a3 > 0.01) {
    const scale = clamp(a3, 0.1, 1.25)
    ctx.save(); ctx.globalAlpha = Math.min(1, a3*1.3)
    ctx.fillStyle='#f59e0b'
    ctx.shadowColor='#f59e0b'; ctx.shadowBlur = 28*Math.min(1,a3)
    ctx.font = '900 72px "Noto Sans KR",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='alphabetic'
    ctx.translate(cx, H/2+28)
    ctx.scale(scale, scale)
    ctx.fillText(stock.ticker, 0, 0)
    ctx.restore()
  }

  /* 라인4: 한국어명 + sector */
  const a4 = easeOutCubic(prog(elapsed, 1600, 400))
  if (a4 > 0.01) {
    const krName = getKrName(stock.ticker, stock.name)
    const sectorTxt = stock.sector && stock.sector !== 'NASDAQ' ? stock.sector : 'NASDAQ'
    ctx.save(); ctx.globalAlpha = a4
    ctx.fillStyle='#888888'
    ctx.font = '400 12px "Noto Sans KR",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='alphabetic'
    ctx.fillText(krName, cx, H/2+58)
    ctx.fillStyle='#555555'
    ctx.font = '300 11px "Noto Sans KR",sans-serif'
    ctx.fillText(sectorTxt + ' · NASDAQ', cx, H/2+74)
    ctx.restore()
  }
}

/* ═══════════════════════════════════════════════════════════
   12. 진입 조건 카드 씬 (Canvas — 녹화 캡처 가능)
════════════════════════════════════════════════════════════ */
function renderEntryCard(ctx, elapsed, stock) {
  setUI('')
  const sw = stock.swing
  const cardP = easeOutCubic(prog(elapsed, 0, 600))
  if (cardP < 0.01) return
  const offY = (1 - cardP) * 80

  ctx.save()
  ctx.globalAlpha = cardP
  ctx.translate(0, offY)

  const mx = 20, cw = W - mx * 2
  const rowH = 47, nRows = 6
  const cardH = 16 + nRows * rowH
  const startY = 218

  ctx.fillStyle = '#fff'
  ctx.font = '900 26px "Noto Sans KR",sans-serif'
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic'
  ctx.fillText(stock.ticker, mx, startY)

  ctx.fillStyle = '#aaa'
  ctx.font = '400 12px "Noto Sans KR",sans-serif'
  ctx.fillText(getKrName(stock.ticker, stock.name) || stock.ticker, mx, startY + 22)

  const cY = startY + 38
  ctx.fillStyle = '#0a0a0a'; ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.roundRect(mx, cY, cw, cardH, 16); ctx.fill(); ctx.stroke()

  const rowDefs = [
    { delay:200, icon:'📌', label:'종목',
      main:()=>`${stock.ticker}  ${fmtPrice(stock.price)}`,
      sub:()=>fmtChange(stock.change_pct),
      mainC:'#fff', subC:()=>stock.change_pct>=0?'#10b981':'#ef4444' },
    { delay:300, icon:'💰', label:'진입가',
      main:()=>`${fmtPrice(sw.entry_low)} ~ ${fmtPrice(sw.entry_high)}`,
      mainC:'#f59e0b', pulse:true },
    { delay:400, icon:'🛑', label:'손절가',
      main:()=>fmtPrice(sw.stop_loss), sub:()=>`(${sw.stop_pct}%)`,
      mainC:'#ef4444', subC:()=>'#ef444488' },
    { delay:500, icon:'🎯', label:'목표1',
      main:()=>fmtPrice(sw.target1), sub:()=>`(+${sw.target1_pct}%)`,
      mainC:'#10b981', subC:()=>'#10b98188' },
    { delay:600, icon:'🎯', label:'목표2',
      main:()=>fmtPrice(sw.target2), sub:()=>`(+${sw.target2_pct}%)`,
      mainC:'#6ee7b7', subC:()=>'#6ee7b788' },
    { delay:700, icon:'⚖️', label:'손익비',
      main:()=>`${sw.rr_ratio} : 1${sw.rr_ratio>=2?' ⭐':''}`,
      mainC: sw.rr_ratio>=2?'#f59e0b':'#ccc' },
  ]

  rowDefs.forEach((row, ri) => {
    const rp = easeOutCubic(prog(elapsed, row.delay, 380))
    if (rp < 0.01) return
    const rowTopY = cY + 8 + ri * rowH
    const midY    = rowTopY + rowH / 2

    ctx.save(); ctx.globalAlpha = rp

    if (ri > 0) {
      ctx.strokeStyle = row.pulse ? '#f59e0b22' : '#111111'; ctx.lineWidth = 1
      ctx.beginPath(); ctx.moveTo(mx+12, rowTopY); ctx.lineTo(mx+cw-12, rowTopY); ctx.stroke()
    }

    if (row.pulse) {
      const pa = (Math.sin(elapsed*0.004)*0.5+0.5)*0.07
      ctx.fillStyle = '#f59e0b'; ctx.globalAlpha = rp*pa
      ctx.fillRect(mx+1, rowTopY, cw-2, rowH)
      ctx.globalAlpha = rp
    }

    ctx.fillStyle = '#aaa'; ctx.font = '400 12px "Noto Sans KR",sans-serif'
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle'
    ctx.fillText(`${row.icon} ${row.label}`, mx+12, midY)

    let rx = mx + cw - 12
    if (row.sub) {
      const subTxt = row.sub()
      ctx.font = '400 11px "Noto Sans KR",sans-serif'
      const sw2 = ctx.measureText(subTxt).width
      ctx.fillStyle = row.subC ? row.subC() : '#888'
      ctx.textAlign = 'right'; ctx.fillText(subTxt, rx, midY)
      rx -= sw2 + 4
    }
    ctx.fillStyle = row.mainC || '#fff'; ctx.font = '700 13px "Noto Sans KR",sans-serif'
    ctx.textAlign = 'right'; ctx.fillText(row.main(), rx, midY)

    ctx.restore()
  })

  const hintY = cY + cardH + 22
  const h1 = easeOutCubic(prog(elapsed, 1500, 400))
  const h2 = easeOutCubic(prog(elapsed, 1700, 400))
  if (h1 > 0.01) {
    ctx.save(); ctx.globalAlpha = h1*0.7
    ctx.fillStyle='#f59e0b'; ctx.font='400 12px "Noto Sans KR",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='alphabetic'
    ctx.fillText('이 가격대 지켜주면 홀드', W/2, hintY); ctx.restore()
  }
  if (h2 > 0.01) {
    ctx.save(); ctx.globalAlpha = h2*0.7
    ctx.fillStyle='#ef4444'; ctx.font='400 11px "Noto Sans KR",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='alphabetic'
    ctx.fillText('손절가 이탈 시 즉시 매도', W/2, hintY+20); ctx.restore()
  }

  ctx.restore()
}

/* ═══════════════════════════════════════════════════════════
   13~17. 차트 씬 (Canvas)
════════════════════════════════════════════════════════════ */
function renderChart(ctx, elapsed, stock) {
  const {closes, highs, lows, volumes} = stock.chart_data
  const sw = stock.swing
  const n = closes.length

  /* 레이아웃 */
  const PAD_L=8, PAD_R=54
  const CT=112, CB=590   /* 가격 차트 top/bottom */
  const VT=602, VB=680   /* 거래량 top/bottom */
  const CL=PAD_L, CR=W-PAD_R

  /* 최근 60봉 */
  const DN = Math.min(n,60)
  const dc = closes.slice(-DN), dh = highs.slice(-DN)
  const dl = lows.slice(-DN),   dv = volumes.slice(-DN)

  /* 가격 범위 (차트 데이터 기준, 목표가 상단 확보) */
  const dataMin = Math.min(...dl)
  const dataMax = Math.max(...dh)
  const rangePad = (dataMax-dataMin)*0.06
  const minV = dataMin - rangePad
  const maxV = dataMax + rangePad

  const xs    = xArr(DN, CL, CR)
  const closeY = normY(dc, minV, maxV, CT, CB)
  const highY  = normY(dh, minV, maxV, CT, CB)
  const lowY   = normY(dl, minV, maxV, CT, CB)

  /* MA5 / MA20 */
  const ma5  = sma(dc, 5);  const ma5Y  = normY(ma5,  minV, maxV, CT, CB)
  const ma20 = sma(dc, 20); const ma20Y = normY(ma20, minV, maxV, CT, CB)

  /* 골든크로스 탐지 */
  let gcIdx = Math.floor(DN*0.65)
  for (let i=1; i<DN; i++) {
    if (ma5[i]!=null && ma20[i]!=null && ma5[i-1]!=null && ma20[i-1]!=null) {
      if (ma5[i-1] < ma20[i-1] && ma5[i] >= ma20[i]) { gcIdx=i; break }
    }
  }

  /* Y → 가격 좌표 변환 */
  const toY = price => CB - ((price-minV)/(maxV-minV||1))*(CB-CT)

  /* 헤더 */
  const hA = easeOutCubic(prog(elapsed, 0, 350))
  if (hA > 0.01) {
    ctx.save(); ctx.globalAlpha = hA
    ctx.fillStyle='#fff'; ctx.font='900 20px "Noto Sans KR",sans-serif'
    ctx.textAlign='left'; ctx.textBaseline='alphabetic'
    ctx.fillText(stock.ticker, 16, 52)
    ctx.fillStyle='#10b981'; ctx.font='400 12px "Noto Sans KR",sans-serif'
    ctx.fillText(fmtPrice(stock.price) + '  ' + fmtChange(stock.change_pct), 16, 70)
    ctx.fillStyle='#666'; ctx.font='300 10px "Noto Sans KR",sans-serif'
    ctx.fillText('60일 캔들 차트', 16, 88)
    ctx.restore()
  }

  /* ── 13. Phase 0: 가격선 혜성 + 일목 구름 (0~1200ms) ── */
  const p0 = prog(elapsed, 0, 1200)
  if (p0 > 0) {
    /* 구름 (MA5↔MA20 사이 반투명 채우기) */
    const cA = easeOutCubic(prog(elapsed, 0, 700))*0.25
    if (cA > 0.01) {
      ctx.save(); ctx.globalAlpha = cA
      ctx.beginPath(); let ok=false
      for (let i=0; i<DN; i++) {
        if (ma5Y[i]==null) continue
        ok ? ctx.lineTo(xs[i], ma5Y[i]) : (ctx.moveTo(xs[i], ma5Y[i]), ok=true)
      }
      for (let i=DN-1; i>=0; i--) {
        if (ma20Y[i]==null) continue; ctx.lineTo(xs[i], ma20Y[i])
      }
      ctx.closePath()
      const grad = ctx.createLinearGradient(CL, CT, CL, CB)
      grad.addColorStop(0,'#10b98140'); grad.addColorStop(1,'#10b98108')
      ctx.fillStyle = grad; ctx.fill(); ctx.restore()
    }
    /* 혜성 가격선 */
    drawCometLine(ctx, xs, closeY, p0, {
      color:'#6ee7b7', lineWidth:2, glowColor:'#10b981', glowBlur:10, comet:p0<0.97
    })
  }

  /* ── 14. Phase 1: 피보나치 + 진입 구간 (1200~2200ms) ── */
  const p1total = prog(elapsed, 1200, 1000)
  if (p1total > 0) {
    const swHigh = Math.max(...dh), swLow = Math.min(...dl)
    const fibs = [
      {r:0.382, label:'38.2%', color:'#60a5fa'},
      {r:0.500, label:'50.0%', color:'#a78bfa'},
      {r:0.618, label:'61.8%', color:'#f59e0b'},
    ]
    fibs.forEach(({r, label, color}, fi) => {
      const fp = easeOutCubic(prog(elapsed, 1200+fi*220, 380))
      if (fp < 0.01) return
      const fy = toY(swHigh - r*(swHigh-swLow))
      ctx.save(); ctx.globalAlpha = fp*0.55
      ctx.strokeStyle=color; ctx.lineWidth=1; ctx.setLineDash([6,4])
      ctx.beginPath(); ctx.moveTo(CL, fy); ctx.lineTo(CR, fy); ctx.stroke()
      ctx.setLineDash([])
      ctx.fillStyle=color; ctx.font='500 9px "Noto Sans KR",sans-serif'
      ctx.textAlign='left'; ctx.textBaseline='middle'
      ctx.globalAlpha=fp*0.75; ctx.fillText(label, CR+5, fy)
      ctx.restore()
    })

    /* 진입 구간 황금 하이라이트 */
    const ezA = easeOutCubic(prog(elapsed, 1550, 380))*0.14
    if (ezA > 0.01) {
      const ey1 = toY(sw.entry_high), ey2 = toY(sw.entry_low)
      ctx.save(); ctx.globalAlpha=ezA; ctx.fillStyle='#f59e0b'
      ctx.fillRect(CL, ey1, CR-CL, ey2-ey1); ctx.restore()
    }

    /* popLabel: 핵심 지지구간 진입 중 */
    const popA1 = prog(elapsed, 1750, 400)
    if (popA1 > 0) {
      const midY = clamp(toY((sw.entry_low+sw.entry_high)/2), CT+30, CB-10)
      drawPopLabel(ctx, W/2, midY, '핵심 지지구간 진입 중', popA1, '#f59e0b')
    }
  }

  /* ── 15. Phase 2: MA 라인 + 골든크로스 폭발 (2200~3000ms) ── */
  const p2 = prog(elapsed, 2200, 800)
  if (p2 > 0) {
    const maA = easeOutCubic(p2)
    drawCometLine(ctx, xs, ma5Y,  maA, {color:'#f59e0b', lineWidth:1.5, glowColor:'#f59e0b', glowBlur:5, comet:false})
    drawCometLine(ctx, xs, ma20Y, maA, {color:'#60a5fa', lineWidth:1.5, glowColor:'#60a5fa', glowBlur:5, comet:false})

    /* 골든크로스 점 표시 */
    if (ma5Y[gcIdx] != null) {
      const gx = xs[gcIdx], gy = ma5Y[gcIdx]
      const bP = prog(elapsed, 2200, 1100)
      if (bP > 0) drawBurst(ctx, gx, gy, bP, '#f59e0b')

      const pl2 = prog(elapsed, 2650, 400)
      if (pl2 > 0) {
        const lx = gx > W*0.6 ? gx-55 : gx+55
        drawPopLabel(ctx, lx, clamp(gy-28, CT+20, CB-10), '단기 모멘텀 켜짐 ✓', pl2, '#f59e0b')
      }
    }
  }

  /* ── 16. Phase 3: 거래량 바 (3000~3800ms) ── */
  const p3 = prog(elapsed, 3000, 800)
  if (p3 > 0) {
    const maxVol = Math.max(...dv)
    const bw = (CR-CL)/DN*0.72
    const avgVol = dv.reduce((a,b)=>a+b,0)/DN

    dv.forEach((vol, i) => {
      const vp = easeOutQuint(clamp(p3*1.6-(i/DN)*0.4, 0, 1))
      const bh = (vol/maxVol)*(VB-VT)
      const isSpike = vol > avgVol*1.8
      const pulse = isSpike ? (Math.sin(elapsed*0.007)*0.3+0.85) : 1
      ctx.save(); ctx.globalAlpha = vp * (isSpike?pulse:0.55)
      ctx.fillStyle = isSpike ? '#10b981' : '#1d3d2d'
      if (isSpike) { ctx.shadowColor='#10b981'; ctx.shadowBlur=10 }
      ctx.fillRect(xs[i]-bw/2, VB-bh*vp, bw, bh*vp)
      ctx.restore()
    })

    /* 거래량 popLabel — swing.vol_multiple(최근 5일 최대) 우선 사용 */
    const spikeIdx = dv.reduce((mi,v,i) => v > dv[mi] ? i : mi, 0)
    const vm = (sw.vol_multiple && sw.vol_multiple >= 1.0)
      ? sw.vol_multiple
      : Math.round(dv[spikeIdx] / avgVol * 10) / 10
    const spikeX = clamp(xs[spikeIdx] ?? W/2, W*0.2, W*0.8)
    const pl3 = prog(elapsed, 3350, 400)
    if (pl3 > 0) drawPopLabel(ctx, spikeX, VT-8, `평균 대비 ${vm}배 — 수급 확인 ✓`, pl3, '#10b981')
  }

  /* ── 17. Phase 4: 목표/손절선 + RR 뱃지 (3800~4500ms) ── */
  const p4 = prog(elapsed, 3800, 700)
  if (p4 > 0) {
    const lA = easeOutCubic(p4)

    /* hLine: 선은 정확한 가격 y에, 라벨은 겹침 방지 후 우측에 */
    const hLineData = []
    function hLine(price, color, dashed) {
      const ly = clamp(toY(price), CT+2, CB-2)
      ctx.save(); ctx.globalAlpha=lA*0.88
      ctx.strokeStyle=color; ctx.lineWidth=1.5
      if (dashed) ctx.setLineDash([5,3])
      ctx.beginPath(); ctx.moveTo(CL, ly); ctx.lineTo(CR, ly); ctx.stroke()
      ctx.setLineDash([])
      ctx.restore()
      return ly
    }

    const lyStop = hLine(sw.stop_loss, '#ef4444', true)
    const lyT1   = hLine(sw.target1,   '#10b981', false)
    const lyT2   = hLine(sw.target2,   '#6ee7b7', true)

    /* 라벨: 수직 겹침 방지 — 최소 13px 간격 보장 */
    const lbls = [
      {ly: lyStop, color:'#ef4444', txt:'🛑 '+fmtPrice(sw.stop_loss)},
      {ly: lyT1,   color:'#10b981', txt:'🎯 '+fmtPrice(sw.target1)},
      {ly: lyT2,   color:'#6ee7b7', txt:'🎯 '+fmtPrice(sw.target2)},
    ]
    lbls.sort((a,b)=>a.ly-b.ly)
    for (let i=1; i<lbls.length; i++) {
      if (lbls[i].ly - lbls[i-1].ly < 13) lbls[i].ly = lbls[i-1].ly + 13
    }
    ctx.save(); ctx.globalAlpha=lA
    ctx.font='bold 10px "Noto Sans KR",sans-serif'
    ctx.textAlign='left'; ctx.textBaseline='middle'
    for (const {color, txt, ly} of lbls) {
      ctx.fillStyle=color; ctx.fillText(txt, CR+4, ly)
    }
    ctx.restore()

    /* 진입 구간 박스 */
    const ey1=toY(sw.entry_high), ey2=toY(sw.entry_low)
    ctx.save(); ctx.globalAlpha=lA*0.10; ctx.fillStyle='#f59e0b'
    ctx.fillRect(CL, ey1, CR-CL, ey2-ey1)
    ctx.globalAlpha=lA*0.45; ctx.strokeStyle='#f59e0b'; ctx.lineWidth=1
    ctx.strokeRect(CL, ey1, CR-CL, ey2-ey1); ctx.restore()

    /* 손익비 뱃지 — 차트 좌측 하단, 수평선 라벨(우측)과 겹치지 않음 */
    const bp = easeOutElastic(prog(elapsed, 3950, 550))
    if (bp > 0.01) {
      const bx=CL+62, by=CB-26
      ctx.save(); ctx.globalAlpha=Math.min(1,bp*1.4)
      ctx.translate(bx, by); ctx.scale(bp, bp)
      ctx.fillStyle='#0a0a0a'
      ctx.shadowColor='#f59e0b'; ctx.shadowBlur=16
      ctx.strokeStyle='#f59e0b'; ctx.lineWidth=1.5
      ctx.beginPath(); ctx.roundRect(-58,-14,116,28,14); ctx.fill(); ctx.stroke()
      ctx.shadowBlur=0; ctx.fillStyle='#f59e0b'
      ctx.font='bold 12px "Noto Sans KR",sans-serif'
      ctx.textAlign='center'; ctx.textBaseline='middle'
      ctx.fillText(`R:R  ${sw.rr_ratio}:1  ⭐`, 0, 1)
      ctx.restore()
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   18. 스윙 조건 요약 씬 (Canvas — 녹화 캡처 가능)
════════════════════════════════════════════════════════════ */
function renderSummary(ctx, elapsed, stock) {
  setUI('')
  const sw = stock.swing
  const sigs = Object.entries(stock.signals||{})
    .filter(([,v])=>v)
    .map(([k])=>SIGNAL_LABELS[k])
    .filter(Boolean).slice(0,5)

  const hA = easeOutCubic(prog(elapsed, 0, 380))
  if (hA > 0.01) {
    ctx.save(); ctx.globalAlpha = hA
    ctx.fillStyle='#f59e0b'; ctx.font='700 18px "Noto Sans KR",sans-serif'
    ctx.textAlign='left'; ctx.textBaseline='alphabetic'
    ctx.fillText('진입 시그널 확인 !', 20, 140)
    ctx.restore()
  }

  const sigStartY=158, sigH=36, sigGap=4
  sigs.forEach((label, i) => {
    const p = easeOutCubic(prog(elapsed, 100+i*120, 380))
    if (p < 0.01) return
    const sy = sigStartY + i*(sigH+sigGap)
    ctx.save(); ctx.globalAlpha = p
    ctx.translate((1-p)*38, 0)
    ctx.fillStyle='#070707'; ctx.strokeStyle='#111111'; ctx.lineWidth=1
    ctx.beginPath(); ctx.roundRect(20,sy,W-40,sigH,8); ctx.fill(); ctx.stroke()
    const bx=36, by=sy+sigH/2
    ctx.fillStyle='#f59e0b'; ctx.beginPath(); ctx.arc(bx,by,8,0,Math.PI*2); ctx.fill()
    ctx.fillStyle='#000'; ctx.font='700 9px "Noto Sans KR",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('✓',bx,by)
    ctx.fillStyle='#ddd'; ctx.font='400 12px "Noto Sans KR",sans-serif'
    ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(label,52,by)
    ctx.restore()
  })

  const rA = easeOutCubic(prog(elapsed, 1500, 400))
  const statStartY = sigStartY + sigs.length*(sigH+sigGap) + 10
  const statH=32, statGap=4
  if (rA > 0.01) {
    const statDefs = [
      {icon:'🛑', l:'손절가',                       v:`${fmtPrice(sw.stop_loss)} (${sw.stop_pct}%)`, c:'#ef4444'},
      {icon:'🎯', l:`목표 2 (${sw.target2_week}주)`, v:`+${sw.target2_pct}%`,                        c:'#10b981'},
      {icon:'⚖️', l:'손익비',                       v:`${sw.rr_ratio}:1`,                            c:sw.rr_ratio>=2?'#f59e0b':'#ccc'},
    ]
    statDefs.forEach((r, si) => {
      const sy = statStartY + si*(statH+statGap)
      ctx.save(); ctx.globalAlpha = rA
      ctx.fillStyle='#0a0a0a'; ctx.strokeStyle='#111111'; ctx.lineWidth=1
      ctx.beginPath(); ctx.roundRect(20,sy,W-40,statH,8); ctx.fill(); ctx.stroke()
      ctx.fillStyle='#aaa'; ctx.font='400 12px "Noto Sans KR",sans-serif'
      ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(`${r.icon} ${r.l}`,32,sy+statH/2)
      ctx.fillStyle=r.c; ctx.font='700 13px "Noto Sans KR",sans-serif'
      ctx.textAlign='right'; ctx.fillText(r.v,W-32,sy+statH/2)
      ctx.restore()
    })
  }

  const score = stock.score||0
  let gradeText='⚠ 추가 관망', gradeColor='#888'
  if (score>=80) { gradeText='⭐ 강력 매수 신호'; gradeColor='#f59e0b' }
  else if (score>=60) { gradeText='👍 매수 신호'; gradeColor='#10b981' }
  const gP = easeOutElastic(prog(elapsed, 2200, 650))
  if (gP > 0.01) {
    ctx.save(); ctx.globalAlpha = Math.min(1,gP)
    ctx.translate(W/2, H-96)
    const s=clamp(gP,0.2,1); ctx.scale(s,s)
    ctx.fillStyle='#0a0a0a'; ctx.strokeStyle=gradeColor; ctx.lineWidth=2
    ctx.shadowColor=gradeColor; ctx.shadowBlur=22
    ctx.beginPath(); ctx.roundRect(-100,-22,200,44,50); ctx.fill(); ctx.stroke()
    ctx.shadowBlur=0; ctx.fillStyle=gradeColor
    ctx.font='700 15px "Noto Sans KR",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(gradeText,0,1)
    ctx.restore()
  }
}

/* ═══════════════════════════════════════════════════════════
   19. 전환 씬 (Canvas + UI 초기화)
════════════════════════════════════════════════════════════ */
function renderTransition(ctx, elapsed) {
  setUI('')
  const p = prog(elapsed, 0, 500)
  ctx.save(); ctx.globalAlpha = Math.sin(p*Math.PI)*0.82
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H); ctx.restore()
  const sp = easeOutCubic(prog(elapsed, 80, 320))
  ctx.save(); ctx.globalAlpha = Math.sin(p*Math.PI)*0.85
  ctx.fillStyle='#050505'
  ctx.font='700 13px "Noto Sans KR",sans-serif'
  ctx.textAlign='center'; ctx.textBaseline='alphabetic'
  ctx.fillText('다음 추천주 →', lerp(-60, W/2, sp), H/2)
  ctx.restore()
}

/* ═══════════════════════════════════════════════════════════
   20. 마무리 씬 (Canvas — 녹화 캡처 가능)
════════════════════════════════════════════════════════════ */
function renderFinal(ctx, elapsed, stocks) {
  setUI('')
  const hA    = easeOutCubic(prog(elapsed, 0, 380))
  const blink = (Math.sin(elapsed*0.006)+1)/2

  const headerY=230, cardTop=252, cardH=218
  const belowY=cardTop+cardH+26

  if (hA > 0.01) {
    ctx.save(); ctx.globalAlpha = hA
    ctx.fillStyle='#f59e0b'; ctx.font='400 12px "Noto Sans KR",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='alphabetic'
    ctx.letterSpacing='3px'; ctx.fillText('오늘의 스윙 픽',W/2,headerY); ctx.letterSpacing='0px'
    ctx.restore()
  }

  const gap=12, mx=20
  const halfW=(W-mx*2-gap)/2

  function drawCard(s, dir, delay, cx) {
    const p=easeOutCubic(prog(elapsed,delay,500))
    if (p<0.01) return
    const sw2=s.swing
    ctx.save(); ctx.globalAlpha=p
    ctx.translate((1-p)*60*dir,0)
    ctx.fillStyle='#0a0a0a'; ctx.strokeStyle='#1d1d1d'; ctx.lineWidth=1
    ctx.beginPath(); ctx.roundRect(cx,cardTop,halfW,cardH,14); ctx.fill(); ctx.stroke()
    ctx.fillStyle='#fff'; ctx.font='900 19px "Noto Sans KR",sans-serif'
    ctx.textAlign='left'; ctx.textBaseline='alphabetic'
    ctx.fillText(s.ticker,cx+12,cardTop+26)
    ctx.fillStyle='#aaa'; ctx.font='400 10px "Noto Sans KR",sans-serif'
    ctx.fillText((getKrName(s.ticker,s.name)||s.ticker).slice(0,14),cx+12,cardTop+40)
    ctx.fillStyle='#ccc'; ctx.font='400 11px "Noto Sans KR",sans-serif'
    ctx.fillText(fmtPrice(s.price),cx+12,cardTop+56)
    const miniRows=[
      {l:'진입',  v:fmtPrice(sw2.entry_low), c:'#f59e0b'},
      {l:'목표',  v:`+${sw2.target2_pct}%`,  c:'#10b981'},
      {l:'손절',  v:`${sw2.stop_pct}%`,       c:'#ef4444'},
      {l:'손익비',v:`${sw2.rr_ratio}:1`,      c:sw2.rr_ratio>=2?'#f59e0b':'#ccc'},
    ]
    const miniRowH=34, miniStartY=cardTop+68
    miniRows.forEach((r,ri)=>{
      const ry=miniStartY+ri*miniRowH
      if(ri>0){ctx.strokeStyle='#111111';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx+8,ry);ctx.lineTo(cx+halfW-8,ry);ctx.stroke()}
      ctx.fillStyle='#888';ctx.font='400 10px "Noto Sans KR",sans-serif'
      ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(r.l,cx+12,ry+miniRowH/2)
      ctx.fillStyle=r.c;ctx.font='700 11px "Noto Sans KR",sans-serif'
      ctx.textAlign='right';ctx.fillText(r.v,cx+halfW-12,ry+miniRowH/2)
    })
    ctx.restore()
  }

  drawCard(stocks[0],-1,200,mx)
  drawCard(stocks[1], 1,400,mx+halfW+gap)

  const pin1A=easeOutCubic(prog(elapsed,800,400))
  if(pin1A>0.01){
    ctx.save();ctx.globalAlpha=pin1A*blink
    ctx.fillStyle='#f59e0b';ctx.font='700 13px "Noto Sans KR",sans-serif'
    ctx.textAlign='center';ctx.textBaseline='alphabetic'
    ctx.fillText('저장해두고 직접 확인해보세요 📌',W/2,belowY+14);ctx.restore()
  }
  const pin2A=easeOutCubic(prog(elapsed,1200,400))
  if(pin2A>0.01){
    ctx.save();ctx.globalAlpha=pin2A
    ctx.fillStyle='#f59e0b';ctx.font='900 16px "Noto Sans KR",sans-serif'
    ctx.textAlign='center';ctx.textBaseline='alphabetic'
    ctx.fillText('TopStockDaily',W/2,belowY+42);ctx.restore()
  }
  const disc=easeOutCubic(prog(elapsed,1400,400))
  if(disc>0.01){
    ctx.save();ctx.globalAlpha=disc
    ctx.fillStyle='#555555';ctx.font='300 9px "Noto Sans KR",sans-serif'
    ctx.textAlign='center';ctx.textBaseline='alphabetic'
    ctx.fillText('⚠ 투자 참고용 · 손익 책임은 본인에게',W/2,belowY+62);ctx.restore()
  }
}

/* ═══════════════════════════════════════════════════════════
   7. 씬 렌더 디스패처
════════════════════════════════════════════════════════════ */
function renderScene(scene, elapsed, data) {
  const stock = scene.stock !== undefined ? data.stocks[scene.stock] : null
  switch(scene.type) {
    case 'hook':       setUI(''); renderHook(ctx, elapsed, stock);          break
    case 'entry_card': renderEntryCard(ctx, elapsed, stock);                break
    case 'chart':      setUI(''); renderChart(ctx, elapsed, stock);         break
    case 'summary':    renderSummary(ctx, elapsed, stock);                  break
    case 'transition': renderTransition(ctx, elapsed);                      break
    case 'final':      renderFinal(ctx, elapsed, data.stocks);              break
  }
}

/* ═══════════════════════════════════════════════════════════
   6. 마스터 루프  (21. 30초 자동재생 + 루프)
════════════════════════════════════════════════════════════ */
function masterLoop(ts) {
  requestAnimationFrame(masterLoop)
  if (paused) return
  lastTs = ts
  if (!sceneStartTime) sceneStartTime = ts
  const elapsed = ts - sceneStartTime

  /* 캔버스 클리어 */
  ctx.clearRect(0, 0, W, H)
  ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, W, H)

  const scene = SCENE_PLAN[sceneIdx]
  updateSegBar(sceneIdx, elapsed / scene.dur)

  if (stockData) renderScene(scene, elapsed, stockData)

  /* 씬 전환 */
  if (elapsed >= scene.dur) {
    sceneIdx = (sceneIdx + 1) % SCENE_PLAN.length
    sceneStartTime = ts
  }
}

/* ═══════════════════════════════════════════════════════════
   2. Canvas 초기화 + 탭 토글 + 부팅
════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  /* 4. 세그바 */
  buildSegBar()

  /* 2. Canvas 초기화 — DPR 처리 */
  canvas = document.getElementById('scene-canvas')
  DPR    = Math.min(window.devicePixelRatio || 1, 2)
  canvas.width  = W * DPR
  canvas.height = H * DPR
  canvas.style.width  = W + 'px'
  canvas.style.height = H + 'px'
  ctx = canvas.getContext('2d')
  ctx.scale(DPR, DPR)

  /* 6. 탭 → 일시정지 토글 */
  document.getElementById('phone').addEventListener('click', () => { paused = !paused })

  /* 5. 데이터 로드 → 22. 실데이터 연동 */
  stockData = await loadData()
  /* 업데이트 시간 표시: "데이터 기준 2026-03-18 01:03 UTC (KST 10:03)" */
  const ua = stockData.updated_at || ''
  let uaLabel = ua ? `데이터 기준 ${ua}` : ''
  if (ua && ua.includes('UTC')) {
    try {
      const dt = new Date(ua.replace(' UTC','Z').replace(' ','T'))
      const kstH = ((dt.getUTCHours()+9)%24).toString().padStart(2,'0')
      const kstM = dt.getUTCMinutes().toString().padStart(2,'0')
      const kstDay = dt.getUTCHours()+9 >= 24 ? dt.getUTCDate()+1 : dt.getUTCDate()
      uaLabel = `데이터 기준 ${ua}  ·  KST ${kstH}:${kstM}`
    } catch(e) {}
  }
  document.getElementById('updated-at').textContent = uaLabel

  /* 21. 자동재생 시작 */
  requestAnimationFrame(masterLoop)
})
</script>
