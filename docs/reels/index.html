<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>TopStockDaily</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Noto Sans KR',sans-serif}
    #phone{width:390px;height:844px;position:relative;overflow:hidden;cursor:pointer;user-select:none;-webkit-user-select:none}
    canvas#three-canvas{position:absolute;inset:0;width:100%!important;height:100%!important}
    #segbar{position:absolute;top:0;left:0;right:0;height:28px;padding:10px 10px 0;display:flex;gap:3px;z-index:100;pointer-events:none}
    .seg{flex:1;height:3px;border-radius:2px;background:#ffffff22;overflow:hidden}
    .seg-fill{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .06s linear}
    #loading{position:absolute;inset:0;background:#020208;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s}
    #loading-ring{width:48px;height:48px;border:3px solid #f59e0b33;border-top-color:#f59e0b;border-radius:50%;animation:spin .9s linear infinite}
    #loading p{color:#f59e0b88;font-size:13px;margin-top:16px;letter-spacing:.1em}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:430px){#phone{width:100vw;height:100dvh}}
  </style>
</head>
<body>
<div id="phone">
  <canvas id="three-canvas"></canvas>
  <div id="segbar"></div>
  <div id="loading"><div id="loading-ring"></div><p>로딩중...</p></div>
</div>
<script>
'use strict'
/* ═══════════════════════════════════════
   MATH / EASING
═══════════════════════════════════════ */
const easeOutCubic   = t => 1-Math.pow(1-t,3)
const easeOutQuint   = t => 1-Math.pow(1-t,5)
const easeOutElastic = t => t===0||t===1?t:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1
const easeInOutQuad  = t => t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2
const easeInOutCubic = t => t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v))
const prog  = (e,s,d)   => clamp((e-s)/d,0,1)
const lerp  = (a,b,t)   => a+(b-a)*t
const lerpV = (va,vb,t) => new THREE.Vector3().lerpVectors(va,vb,t)

function calcSMA(arr,n){return arr.map((_,i)=>i<n-1?null:arr.slice(i-n+1,i+1).reduce((a,b)=>a+b,0)/n)}
function fmtPrice(v){if(v==null||isNaN(v))return'—';if(v<10)return'$'+v.toFixed(3);if(v<1000)return'$'+v.toFixed(2);return'$'+Math.round(v).toLocaleString()}
function fmtPct(v){if(v==null||isNaN(v))return'—';return(v>=0?'+':'')+v.toFixed(1)+'%'}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r)
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r)
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r)
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath()
  }
}

/* ═══════════════════════════════════════
   THREE.JS SETUP
   portrait 390×844 → vFOV=60° → hFOV≈29.9°
   at z=12 from cam: max visible width ≈ 6.4 units
   → all meshes kept ≤ 5.5 units wide
═══════════════════════════════════════ */
const PW=390,PH=844
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('three-canvas'),antialias:true,alpha:false})
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2))
renderer.setSize(PW,PH)
renderer.toneMapping=THREE.ACESFilmicToneMapping
renderer.toneMappingExposure=1.1

const scene=new THREE.Scene()
scene.background=new THREE.Color(0x020208)
scene.fog=new THREE.FogExp2(0x020208,0.012)

const camera=new THREE.PerspectiveCamera(60,PW/PH,0.1,1000)
camera.position.set(0,2,12)
camera.lookAt(0,0,0)

const ambLight  =new THREE.AmbientLight(0xffffff,0.25);scene.add(ambLight)
const goldLight =new THREE.PointLight(0xf59e0b,2,40);goldLight.position.set(0,5,5);scene.add(goldLight)
const rimLight  =new THREE.DirectionalLight(0x60a5fa,0.4);rimLight.position.set(-5,3,-5);scene.add(rimLight)
const topLight  =new THREE.DirectionalLight(0xffffff,0.2);topLight.position.set(0,10,0);scene.add(topLight)

/* ═══════════════════════════════════════
   CANVAS TEXTURE HELPERS (2× DPR)
═══════════════════════════════════════ */
const TEX_DPR=2
function makeTextTexture(lines,opts={}){
  const{fontSize=48,color='#fff',fontWeight='700',
        width=512,height=128,glowColor=null,bgColor=null,
        lineSpacing=1.35}=opts
  const cvs=document.createElement('canvas')
  cvs.width=width*TEX_DPR;cvs.height=height*TEX_DPR
  const c=cvs.getContext('2d')
  c.scale(TEX_DPR,TEX_DPR)
  if(bgColor){c.fillStyle=bgColor;c.fillRect(0,0,width,height)}
  else c.clearRect(0,0,width,height)
  c.font=`${fontWeight} ${fontSize}px "Noto Sans KR",sans-serif`
  c.fillStyle=color;c.textAlign='center';c.textBaseline='middle'
  const arr=Array.isArray(lines)?lines:[lines]
  const lh=fontSize*lineSpacing,totalH=arr.length*lh
  arr.forEach((t,i)=>{
    if(glowColor){c.shadowColor=glowColor;c.shadowBlur=20}
    c.fillText(t,width/2,height/2-totalH/2+(i+0.5)*lh)
    c.shadowBlur=0
  })
  const tex=new THREE.CanvasTexture(cvs);tex.needsUpdate=true;return tex
}
function makeTextMesh(lines,opts={}){
  const{width=512,height=128,meshW=null,meshH=1}=opts
  const tex=makeTextTexture(lines,opts)
  const w=meshW!==null?meshW:(width/height)*meshH
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide})
  return new THREE.Mesh(new THREE.PlaneGeometry(w,meshH),mat)
}
function disposeObj(o){
  if(o.geometry)o.geometry.dispose()
  if(o.material){if(o.material.map)o.material.map.dispose();o.material.dispose()}
}

/* ═══════════════════════════════════════
   AMBIENT PARTICLES
═══════════════════════════════════════ */
function createAmbientParticles(){
  const N=900,geo=new THREE.BufferGeometry()
  const pos=new Float32Array(N*3),col=new Float32Array(N*3),sz=new Float32Array(N)
  for(let i=0;i<N;i++){
    pos[i*3]=(Math.random()-.5)*28;pos[i*3+1]=(Math.random()-.5)*46;pos[i*3+2]=(Math.random()-.5)*18
    const t=Math.random()
    col[i*3]=lerp(0.96,1,t);col[i*3+1]=lerp(0.62,0.95,t);col[i*3+2]=lerp(0.04,0.7,t)
    sz[i]=Math.random()*1.5+0.5
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3))
  geo.setAttribute('color',   new THREE.BufferAttribute(col,3))
  const mat=new THREE.PointsMaterial({size:0.065,vertexColors:true,transparent:true,opacity:0.55,sizeAttenuation:true})
  const pts=new THREE.Points(geo,mat);scene.add(pts)
  return{update(dt){
    const p=pts.geometry.attributes.position.array
    for(let i=0;i<N;i++){p[i*3+1]+=dt*0.18;if(p[i*3+1]>23)p[i*3+1]=-23}
    pts.geometry.attributes.position.needsUpdate=true;pts.rotation.y+=dt*0.008
  }}
}

/* ═══════════════════════════════════════
   BURST / RING EFFECTS
═══════════════════════════════════════ */
function createBurst(origin,color=0xf59e0b,count=200,spd=0.1){
  const geo=new THREE.BufferGeometry(),pos=new Float32Array(count*3),vel=[]
  for(let i=0;i<count;i++){
    pos[i*3]=origin.x;pos[i*3+1]=origin.y;pos[i*3+2]=origin.z
    const a=Math.random()*Math.PI*2,e=(Math.random()-.5)*Math.PI,s=spd*(0.3+Math.random()*0.7)
    vel.push(new THREE.Vector3(Math.cos(a)*Math.cos(e)*s,Math.sin(e)*s,Math.sin(a)*Math.cos(e)*s))
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3))
  const mat=new THREE.PointsMaterial({color,size:0.09,transparent:true,opacity:1})
  const pts=new THREE.Points(geo,mat);scene.add(pts);let age=0,dead=false
  return{update(dt){
    if(dead)return false;age+=dt
    const p=pts.geometry.attributes.position.array
    for(let i=0;i<count;i++){
      p[i*3]+=vel[i].x;p[i*3+1]+=vel[i].y-dt*0.04;p[i*3+2]+=vel[i].z
      vel[i].multiplyScalar(0.96)
    }
    pts.geometry.attributes.position.needsUpdate=true
    mat.opacity=Math.max(0,1-age/1.4)
    if(age>1.7){scene.remove(pts);geo.dispose();mat.dispose();dead=true;return false}
    return true
  },dispose(){}}
}
function createRing(pos,color=0xf59e0b,delay=0){
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.08,0.022,8,32),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.9}))
  ring.position.copy(pos);scene.add(ring);let age=0,dead=false
  return{update(dt){
    if(dead)return false;age+=dt;const a=age-delay;if(a<0)return true
    const sc=1+a*4;ring.scale.set(sc,sc,sc);ring.material.opacity=Math.max(0,0.9-a*0.9)
    if(a>1.1){scene.remove(ring);disposeObj(ring);dead=true;return false}
    return true
  },dispose(){}}
}

/* ═══════════════════════════════════════
   SCENE PLAN
═══════════════════════════════════════ */
const SCENE_PLAN=[
  {id:'intro',  dur:3000,type:'intro'},
  {id:'rev0',   dur:3000,type:'reveal',  stock:0},
  {id:'chart0', dur:8000,type:'chart3d', stock:0},
  {id:'sig0',   dur:3500,type:'signals', stock:0},
  {id:'trans',  dur:1000,type:'transition'},
  {id:'rev1',   dur:3000,type:'reveal',  stock:1},
  {id:'chart1', dur:8000,type:'chart3d', stock:1},
  {id:'sig1',   dur:3500,type:'signals', stock:1},
  {id:'final',  dur:3000,type:'final'},
]

/* ═══════════════════════════════════════
   GLOBAL STATE
═══════════════════════════════════════ */
let stockData=[]
let sceneIdx=0,sceneStart=null,lastTs=0,paused=false
let activeEffects=[]
let sceneObjs=[]            // per-scene disposable meshes
let ambientParticles=null
let initialized=false
let prevSceneType=null

function addSO(o){scene.add(o);sceneObjs.push(o);return o}
function clearSO(){
  sceneObjs.forEach(o=>{scene.remove(o);disposeObj(o)})
  sceneObjs=[]
}

/* ═══════════════════════════════════════
   INTRO SCENE
═══════════════════════════════════════ */
let introSphere=null,introTextMeshes=[]
function setupIntro(){
  introSphere=null;introTextMeshes=[]
  // Gold sphere
  const sm=new THREE.MeshStandardMaterial({color:0xf59e0b,emissive:0xf59e0b,emissiveIntensity:0.5,wireframe:true,roughness:0.2,metalness:0.9})
  introSphere=addSO(new THREE.Mesh(new THREE.SphereGeometry(1.2,32,32),sm))
  introSphere.position.set(0,0,0);introSphere.scale.setScalar(0.01)

  // Title — canvas 512×100, meshW=(512/100)*1.1=5.63 → at z=2 cam-dist=10, max=5.36 → use z=0: max=6.4 ✓
  const tm=makeTextMesh('오늘의 추천주',{
    fontSize:52,color:'#f59e0b',fontWeight:'900',glowColor:'#f59e0b',
    width:512,height:100,meshH:1.1
  })
  tm.position.set(0,1,0);tm.material.opacity=0;addSO(tm);introTextMeshes.push(tm)

  const sm2=makeTextMesh('TopStockDaily',{
    fontSize:26,color:'#ffffff99',fontWeight:'300',
    width:384,height:68,meshH:0.85
  })
  sm2.position.set(0,-0.6,0);sm2.material.opacity=0;addSO(sm2);introTextMeshes.push(sm2)
}
function renderIntro(elapsed){
  // Camera zoom in
  camera.position.z=lerp(55,12,easeOutQuint(prog(elapsed,0,1300)))
  camera.lookAt(0,0,0)
  goldLight.intensity=1.2+Math.sin(elapsed*.003)*1

  if(introSphere){
    const sp=easeOutElastic(prog(elapsed,700,950))
    introSphere.scale.setScalar(Math.max(.01,sp*1.4))
    introSphere.rotation.y+=.016;introSphere.rotation.x+=.007
    introSphere.material.wireframe=sp<.5
    introSphere.material.emissiveIntensity=.3+sp*.5
    if(elapsed>2100&&!introSphere.userData.burst){
      introSphere.userData.burst=true
      activeEffects.push(createBurst(new THREE.Vector3(0,0,0),0xf59e0b,400,.14))
      for(let r=0;r<4;r++)activeEffects.push(createRing(new THREE.Vector3(0,0,0),0xf59e0b,r*.1))
      introSphere.visible=false;goldLight.intensity=9
    }
    goldLight.intensity=Math.max(1.2,goldLight.intensity*.97)
  }

  // Text fade in + hologram flicker
  const tp=easeOutCubic(prog(elapsed,2150,700))
  if(tp>0){
    const flicker=elapsed>2600?.75+.25*Math.sin(elapsed*.07):1
    introTextMeshes.forEach(m=>{m.material.opacity=tp*flicker})
  }
}

/* ═══════════════════════════════════════
   REVEAL SCENE
   Camera (0,2,12) looking at (0,0,0)
   Screen center at z=0: world (0,0,0)
   Visible width at z=0: 6.4 units → all meshes ≤5.5
═══════════════════════════════════════ */
let rv={}   // reveal state
function setupReveal(stock){
  rv={_burst:false,scoreSc:null,scoreTex:null,scoreStock:stock.score}
  camera.position.set(0,2,12);camera.lookAt(0,0,0)

  // Company name — 512×90 → meshH=1.05 meshW=5.97 (at z=0 fits within 6.4) ✓
  const nm=makeTextMesh(stock.name||stock.ticker,{
    fontSize:34,color:'#fff',fontWeight:'700',width:512,height:90,meshH:1.05
  })
  nm.position.set(0,4,0);nm.material.opacity=0;nm.userData.r='name';addSO(nm)

  // Ticker — canvas 512×210, meshH=2.1, meshW=(512/210)*2.1=5.12 ✓
  const tk=makeTextMesh(stock.ticker,{
    fontSize:82,color:'#f59e0b',fontWeight:'900',glowColor:'#f59e0b',
    width:512,height:210,meshH:2.1
  })
  tk.position.set(0,2,0);tk.scale.setScalar(.01);tk.userData.r='ticker';addSO(tk)

  // Price — canvas 512×180, 2 lines, meshH=1.8, meshW=(512/180)*1.8=5.12 ✓
  const cpct=stock.change_pct!=null&&!isNaN(stock.change_pct)?fmtPct(stock.change_pct):''
  const pcol=(stock.change_pct||0)>=0?'#10b981':'#ef4444'
  const pm=makeTextMesh([fmtPrice(stock.price),cpct].filter(Boolean),{
    fontSize:38,color:pcol,fontWeight:'700',width:512,height:180,meshH:1.8,lineSpacing:1.4
  })
  pm.position.set(-10,.2,0);pm.material.opacity=0;pm.userData.r='price';addSO(pm)

  // Score bar — canvas 512×76, meshH=0.82, meshW=(512/76)*0.82=5.52 ✓
  const cvs=document.createElement('canvas');cvs.width=512*TEX_DPR;cvs.height=76*TEX_DPR
  const c=cvs.getContext('2d');c.scale(TEX_DPR,TEX_DPR)
  c.clearRect(0,0,512,76)
  c.font='400 21px "Noto Sans KR",sans-serif'
  c.fillStyle='#888';c.textAlign='left';c.textBaseline='middle';c.fillText('신호 점수',10,22)
  c.fillStyle='#f59e0b';c.textAlign='right';c.fillText(`${stock.score}점`,502,22)
  c.fillStyle='#1c1c2e';c.fillRect(10,44,492,14)
  const stex=new THREE.CanvasTexture(cvs)
  const sbm=new THREE.Mesh(new THREE.PlaneGeometry(5.52,.82),
    new THREE.MeshBasicMaterial({map:stex,transparent:true,depthWrite:false}))
  sbm.position.set(0,-1.3,0);sbm.material.opacity=0;sbm.userData.r='score'
  rv.scoreSc=c;rv.scoreCvs=cvs;rv.scoreTex=stex;addSO(sbm)
}
function renderReveal(elapsed,stock){
  camera.position.set(0,2,12);camera.lookAt(0,0,0)
  sceneObjs.forEach(obj=>{
    const r=obj.userData.r
    if(r==='name'){
      const p=easeOutCubic(prog(elapsed,400,900))
      obj.material.opacity=p;obj.position.y=4-(1-p)*3.5
    }
    if(r==='ticker'){
      const p=easeOutElastic(prog(elapsed,1100,750))
      obj.scale.setScalar(Math.max(.01,p));obj.material.opacity=clamp(p*2,0,1)
      if(p>.05&&!rv._burst){
        rv._burst=true
        activeEffects.push(createBurst(new THREE.Vector3(0,2,0),0xf59e0b,250,.12))
        for(let r2=0;r2<3;r2++)activeEffects.push(createRing(new THREE.Vector3(0,2,0),0xf59e0b,r2*.08))
        goldLight.intensity=9
      }
      goldLight.intensity=Math.max(1.5,goldLight.intensity*.95)
    }
    if(r==='price'){
      const p=easeOutCubic(prog(elapsed,1900,600))
      obj.material.opacity=p;obj.position.x=-10+p*10
    }
    if(r==='score'){
      const p=easeOutCubic(prog(elapsed,2350,700))
      obj.material.opacity=p
      if(p>0&&rv.scoreSc){
        const c=rv.scoreSc
        c.clearRect(10,44,492,14)
        c.fillStyle='#1c1c2e';c.fillRect(10,44,492,14)
        c.fillStyle='#f59e0b';c.fillRect(10,44,492*(rv.scoreStock/100)*p,14)
        rv.scoreTex.needsUpdate=true
      }
    }
  })
}

/* ═══════════════════════════════════════
   CHART 3D SCENE
   CW=7 (x ±3.5), CH=4 (y 0→4)
   Volume bars: y below -0.5
   Camera phase 0 (overview): wide angle showing full chart
   then zooms into points of interest
═══════════════════════════════════════ */
let chartGroup=null,chartObj=null
let chartFloatMesh=null,chartFloatText=''
let chartStockIdx=0

function buildChart3D(stock){
  const group=new THREE.Group()
  const ch=stock.chart
  const closes=ch.close,vols=ch.volume
  const N=closes.length,CW=7,CH=4
  const minP=Math.min(...closes),maxP=Math.max(...closes)
  const range=maxP-minP||1

  // Axes / grid
  group.add(new THREE.GridHelper(CW+1.5,14,0x0e1229,0x0e1229))
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(CW+1.5,10),
    new THREE.MeshBasicMaterial({color:0x04040e,transparent:true,opacity:.9,side:THREE.DoubleSide}))
  floor.rotation.x=-Math.PI/2;floor.position.y=-.05;group.add(floor)

  // Subtle glow floor line
  const glowFloor=new THREE.Mesh(new THREE.PlaneGeometry(CW+1.5,.02),
    new THREE.MeshBasicMaterial({color:0xf59e0b,transparent:true,opacity:.25}))
  glowFloor.position.set(0,-.04,0);glowFloor.rotation.x=-Math.PI/2;group.add(glowFloor)

  // Price tube (outer glow + inner sharp)
  const pts=closes.map((c,i)=>new THREE.Vector3((i/(N-1))*CW-CW/2,((c-minP)/range)*CH,0))
  const curve=new THREE.CatmullRomCurve3(pts)

  // Glow tube (wider, semi-transparent)
  const glowGeo=new THREE.TubeGeometry(curve,N*2,.12,6,false)
  const glowMat=new THREE.MeshBasicMaterial({color:0xf59e0b,transparent:true,opacity:.12})
  group.add(new THREE.Mesh(glowGeo,glowMat))

  // Main tube with vertex color gradient
  const tubeGeo=new THREE.TubeGeometry(curve,N*3,.055,8,false)
  const colArr=new Float32Array(tubeGeo.attributes.position.count*3)
  for(let i=0;i<tubeGeo.attributes.position.count;i++){
    const t=clamp(tubeGeo.attributes.position.getY(i)/CH,0,1)
    colArr[i*3]=lerp(.23,.96,t);colArr[i*3+1]=lerp(.51,.62,t);colArr[i*3+2]=lerp(.96,.04,t)
  }
  tubeGeo.setAttribute('color',new THREE.BufferAttribute(colArr,3))
  const tubeMat=new THREE.MeshStandardMaterial({vertexColors:true,roughness:.2,metalness:.8,emissiveIntensity:.15})
  const priceTube=new THREE.Mesh(tubeGeo,tubeMat)
  priceTube.userData.type='price';priceTube.geometry.setDrawRange(0,0);group.add(priceTube)

  // Volume bars
  const maxVol=Math.max(...vols),avgVol=vols.reduce((a,b)=>a+b,0)/N
  let spikeIdx=0,spikeMax=0
  vols.forEach((v,i)=>{if(v>spikeMax){spikeMax=v;spikeIdx=i}})
  vols.forEach((v,i)=>{
    const bh=Math.max(.04,(v/maxVol)*1.6)
    const isSpike=v>avgVol*1.5
    const bm=new THREE.MeshStandardMaterial({
      color:isSpike?0x10b981:0x1e2038,emissive:isSpike?0x10b981:0x000000,
      emissiveIntensity:isSpike?.35:0,transparent:true,opacity:isSpike?.88:.45
    })
    const bar=new THREE.Mesh(new THREE.BoxGeometry(CW/N*.62,bh,.28),bm)
    bar.position.set((i/(N-1))*CW-CW/2,-.6-bh/2,-1.4)
    bar.userData={type:'volume',isSpike,targetH:bh,bottomY:-.6}
    bar.scale.y=.001;group.add(bar)
  })

  // MA5 tube
  const ma5=(ch.ma5||calcSMA(closes,5))
    .map((v,i)=>v==null?null:new THREE.Vector3((i/(N-1))*CW-CW/2,((v-minP)/range)*CH+.1,.12))
    .filter(Boolean)
  if(ma5.length>2){
    const g=new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ma5),ma5.length*2,.032,6)
    group.add(new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:0xfbbf24})))
  }

  // MA20 tube
  const ma20=(ch.ma20||calcSMA(closes,20))
    .map((v,i)=>v==null?null:new THREE.Vector3((i/(N-1))*CW-CW/2,((v-minP)/range)*CH+.06,.07))
    .filter(Boolean)
  if(ma20.length>2){
    const g=new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ma20),ma20.length*2,.026,6)
    group.add(new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:0x60a5fa})))
  }

  // Detect golden cross
  const ma5arr=ch.ma5||calcSMA(closes,5),ma20arr=ch.ma20||calcSMA(closes,20)
  let crossIdx=Math.floor(N*.55)
  for(let i=1;i<N;i++){
    if(ma5arr[i]&&ma20arr[i]&&ma5arr[i-1]&&ma20arr[i-1]&&ma5arr[i-1]<=ma20arr[i-1]&&ma5arr[i]>ma20arr[i]){crossIdx=i;break}
  }
  const crossX=(crossIdx/(N-1))*CW-CW/2
  const crossY=((closes[crossIdx]-minP)/range)*CH
  const spikeX=(spikeIdx/(N-1))*CW-CW/2

  return{group,priceTube,tubeGeo,N,CW,CH,closes,vols,crossX,crossY,spikeX,minP,maxP,range,
    ma5arr,ma20arr,crossIdx,spikeIdx}
}

// 6-phase camera sequence for chart (8s total)
// Phase 0 (0-2s):   FULL OVERVIEW — shows entire chart as it draws in
// Phase 1 (2-3.5s): ZOOM to golden cross
// Phase 2 (3.5-5s): ZOOM to volume spike
// Phase 3 (5-6.5s): PULLBACK + fib levels appear
// Phase 4 (6.5-7.5s): OVERHEAD — target/stop planes
// Phase 5 (7.5-8s):  RETURN to overview
function makeChartCamSeq(co){
  const{crossX,crossY,spikeX}=co
  const triggered={}
  // Positions chosen so CW=7 chart is fully visible from overview
  // at dist 17: horiz = 2*17*tan(15°)=9.1 > CW=7 ✓
  const phases=[
    {s:0,   e:2000,
     fp:new THREE.Vector3(1.5,5.5,17),ft:new THREE.Vector3(0,.5,0),
     tp:new THREE.Vector3(0,5,16),  tt:new THREE.Vector3(0,.5,0),
     ease:easeInOutCubic,label:null},
    {s:2000,e:3500,
     fp:new THREE.Vector3(0,5,16),  ft:new THREE.Vector3(0,.5,0),
     tp:new THREE.Vector3(crossX,3.5,9),tt:new THREE.Vector3(crossX,crossY,0),
     ease:easeOutQuint,label:'골든 크로스 확인 ✓',lc:'#fbbf24',effect:'burst_cross'},
    {s:3500,e:5000,
     fp:new THREE.Vector3(crossX,3.5,9),ft:new THREE.Vector3(crossX,crossY,0),
     tp:new THREE.Vector3(spikeX,-1.2,6.5),tt:new THREE.Vector3(spikeX,.5,0),
     ease:easeOutCubic,label:'거래량 폭증 — 수급 확인 ✓',lc:'#10b981',effect:'vol_glow'},
    {s:5000,e:6500,
     fp:new THREE.Vector3(spikeX,-1.2,6.5),ft:new THREE.Vector3(spikeX,.5,0),
     tp:new THREE.Vector3(0,2,12),tt:new THREE.Vector3(0,1.5,0),
     ease:easeInOutQuad,label:'핵심 지지구간 반등 중 ✓',lc:'#a78bfa',effect:'fib'},
    {s:6500,e:7500,
     fp:new THREE.Vector3(0,2,12),ft:new THREE.Vector3(0,1.5,0),
     tp:new THREE.Vector3(0,8,9),  tt:new THREE.Vector3(0,1,0),
     ease:easeOutCubic,label:null,effect:'targets'},
    {s:7500,e:8000,
     fp:new THREE.Vector3(0,8,9),  ft:new THREE.Vector3(0,1,0),
     tp:new THREE.Vector3(1.5,5.5,17),tt:new THREE.Vector3(0,.5,0),
     ease:easeInOutQuad,label:null},
  ]
  return{
    update(elapsed,co2){
      const ph=phases.find(p=>elapsed>=p.s&&elapsed<p.e)
      if(!ph)return null
      const t=(elapsed-ph.s)/(ph.e-ph.s)
      const p=ph.ease(t)
      camera.position.copy(lerpV(ph.fp,ph.tp,p))
      camera.lookAt(lerpV(ph.ft,ph.tt,p))

      // Trigger effects once
      if(ph.effect&&t>.38&&!triggered[ph.effect]){
        triggered[ph.effect]=true
        if(ph.effect==='burst_cross'){
          activeEffects.push(createBurst(new THREE.Vector3(crossX,crossY,0),0xfbbf24,300,.11))
          for(let r=0;r<4;r++)activeEffects.push(createRing(new THREE.Vector3(crossX,crossY,0),0xfbbf24,r*.09))
          goldLight.position.set(crossX,crossY+2,3);goldLight.intensity=10
        }
        if(ph.effect==='fib'&&co2){
          [.382,.5,.618].forEach((lv,i)=>{
            const y=lv*co2.CH
            const pl=new THREE.Mesh(new THREE.PlaneGeometry(co2.CW+1.5,.025),
              new THREE.MeshBasicMaterial({color:[0xa78bfa,0xfbbf24,0xa78bfa][i],transparent:true,opacity:.55,side:THREE.DoubleSide}))
            pl.position.set(0,y,.25);chartGroup.add(pl)
            const lbl=makeTextMesh(`Fib ${(lv*100).toFixed(1)}%`,{
              fontSize:18,color:'#c4b5fd',width:180,height:44,meshH:.44
            })
            lbl.position.set(co2.CW/2+1,y,.25);chartGroup.add(lbl)
          })
        }
        if(ph.effect==='targets'&&co2){
          const sw=stockData[chartStockIdx].swing
          const toY=price=>((price-co2.minP)/co2.range)*co2.CH
          ;[
            [sw.stop_loss,  '#ef4444','🛑 손절 '+fmtPrice(sw.stop_loss)],
            [sw.entry_high, '#fbbf24','진입 '+fmtPrice(sw.entry_high)],
            [sw.target1,    '#10b981','🎯 목표1 '+fmtPrice(sw.target1)],
          ].forEach(([price,col,lbl])=>{
            const y=toY(price)
            if(isNaN(y)||y<-2||y>co2.CH+2)return
            const pl=new THREE.Mesh(new THREE.PlaneGeometry(co2.CW+1.5,.025),
              new THREE.MeshBasicMaterial({color:parseInt(col.replace('#',''),16),transparent:true,opacity:.8,side:THREE.DoubleSide}))
            pl.position.set(0,y,.22);chartGroup.add(pl)
            const lm=makeTextMesh(lbl,{fontSize:17,color:col,width:256,height:46,meshH:.5})
            lm.position.set(-co2.CW/2-1.4,y,.22);chartGroup.add(lm)
          })
          const sy=toY(sw.stop_loss),ey=toY(sw.entry_high),t1y=toY(sw.target1)
          if(!isNaN(sy)&&!isNaN(ey)&&ey>sy){
            const dz=new THREE.Mesh(new THREE.BoxGeometry(co2.CW+1.5,ey-sy,.06),
              new THREE.MeshBasicMaterial({color:0xef4444,transparent:true,opacity:.05,side:THREE.DoubleSide}))
            dz.position.set(0,(sy+ey)/2,-.25);chartGroup.add(dz)
          }
          if(!isNaN(ey)&&!isNaN(t1y)&&t1y>ey){
            const pz=new THREE.Mesh(new THREE.BoxGeometry(co2.CW+1.5,t1y-ey,.06),
              new THREE.MeshBasicMaterial({color:0x10b981,transparent:true,opacity:.05,side:THREE.DoubleSide}))
            pz.position.set(0,(ey+t1y)/2,-.25);chartGroup.add(pz)
          }
        }
      }
      // Label
      if(ph.label&&t>.6)return{text:ph.label,color:ph.lc,alpha:easeOutCubic((t-.6)/.4)}
      return ph.effect&&triggered[ph.effect]?{vol_glow:ph.effect==='vol_glow'}:null
    },
    isVolGlow(){return!!triggered['vol_glow']}
  }
}
let chartCamSeq=null

function setupChart(stock,si){
  chartStockIdx=si
  chartObj=buildChart3D(stock)
  chartGroup=chartObj.group;scene.add(chartGroup)

  // Float label (at z=-1 behind chart → max width 2*(12+1)*tan(15°)=6.97)
  chartFloatMesh=makeTextMesh('',{fontSize:24,color:'#fbbf24',fontWeight:'700',glowColor:'#fbbf24',width:512,height:70,meshH:.88})
  chartFloatMesh.position.set(0,5.5,-1);chartFloatMesh.material.opacity=0
  scene.add(chartFloatMesh);chartFloatText=''

  chartCamSeq=makeChartCamSeq(chartObj)
}

function renderChart3D(elapsed){
  if(!chartGroup||!chartObj||!chartCamSeq)return
  goldLight.intensity=Math.max(1.5,goldLight.intensity*.98)

  // Phase 0: chart draws in left-to-right
  const revP=easeOutCubic(prog(elapsed,0,2200))

  // Price tube drawRange
  if(chartObj.priceTube&&chartObj.priceTube.geometry.index){
    chartObj.priceTube.geometry.setDrawRange(0,Math.floor(chartObj.priceTube.geometry.index.count*revP))
  }

  // Volume bars scale from bottom
  chartGroup.children.forEach(c=>{
    if(c.userData.type!=='volume')return
    const s=Math.max(.001,easeOutQuint(clamp(revP*1.5-.15,0,1)))
    c.scale.y=s;c.position.y=c.userData.bottomY-c.userData.targetH*s/2
    if(chartCamSeq.isVolGlow()&&c.userData.isSpike){
      c.material.emissiveIntensity=.3+.4*Math.sin(elapsed*.006)
    }
  })

  // Camera + labels
  const labelInfo=chartCamSeq.update(elapsed,chartObj)

  // Floating label
  if(chartFloatMesh){
    if(labelInfo&&labelInfo.text){
      if(labelInfo.text!==chartFloatText){
        chartFloatText=labelInfo.text
        const nt=makeTextTexture(labelInfo.text,{fontSize:24,color:labelInfo.color,fontWeight:'700',width:512,height:70,glowColor:labelInfo.color})
        if(chartFloatMesh.material.map)chartFloatMesh.material.map.dispose()
        chartFloatMesh.material.map=nt;chartFloatMesh.material.needsUpdate=true
      }
      chartFloatMesh.material.opacity=labelInfo.alpha
      chartFloatMesh.lookAt(camera.position)
    } else {
      chartFloatMesh.material.opacity*=.95
    }
  }

  chartGroup.rotation.y=Math.sin(elapsed*.00025)*.03
}

function cleanupChart(){
  if(chartGroup){
    scene.remove(chartGroup)
    chartGroup.traverse(c=>{if(c.geometry)c.geometry.dispose();if(c.material){if(c.material.map)c.material.map.dispose();c.material.dispose()}})
    chartGroup=null;chartObj=null
  }
  if(chartFloatMesh){
    scene.remove(chartFloatMesh);disposeObj(chartFloatMesh);chartFloatMesh=null
  }
  chartCamSeq=null
}

const SIG_MAP={golden_cross:'골든 크로스',volume_confirm:'거래량 확인',rsi_signal:'RSI 과매도 반등',

  // Trading data

    ['손익비',   `${sw.rr_ratio} : 1`,sw.rr_ratio>=3?'#f59e0b':'#bbb'],
  ]

  rows.forEach(([lbl,val,col],i)=>{
    const y=388+i*52
    c.font=`400 19px "Noto Sans KR",sans-serif`;c.fillStyle='#666';c.textAlign='left'
    c.fillText(lbl,18,y)
    c.font=`700 21px "Noto Sans KR",sans-serif`;c.fillStyle=col;c.textAlign='right'
    c.fillText(val,W-18,y)
    c.strokeStyle='#18182e';c.lineWidth=.8
    c.beginPath();c.moveTo(14,y+14);c.lineTo(W-14,y+14);c.stroke()
  })

  // Grade badge
  c.fillStyle=gc+'22';c.roundRect(55,620,W-110,52,26);c.fill()
  c.strokeStyle=gc;c.lineWidth=1.5;c.roundRect(55,620,W-110,52,26);c.stroke()
  c.font=`900 26px "Noto Sans KR",sans-serif`
  c.fillStyle=gc;c.shadowColor=gc;c.shadowBlur=12;c.textAlign='center'
  c.fillText(`${grade}  ·  신호 ${score}점`,W/2,652);c.shadowBlur=0

  const tex=new THREE.CanvasTexture(cvs);tex.needsUpdate=true
  // meshW = (W/H)*meshH = (480/680)*5.5 = 3.88 ✓
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(3.88,5.5),
    new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false}))
  return mesh

   TRANSITION
═══════════════════════════════════════ */
function renderTransition(elapsed){
  const t=elapsed/1000
  if(t<.3)     renderer.toneMappingExposure=1.1+(t/.3)*5.5
  else if(t<.65)renderer.toneMappingExposure=6.6-((t-.3)/.35)*5.5
  else          renderer.toneMappingExposure=1.1
  if(t>.28&&t<.72){
    const rp=(t-.28)/.44,angle=rp*Math.PI*2
    camera.position.set(Math.sin(angle)*12,2,Math.cos(angle)*12);camera.lookAt(0,0,0)
  } else if(t>=.72){
    camera.position.set(0,2,12);camera.lookAt(0,0,0)
  }
}

function onSceneEnter(plan){

    case'intro':      setupIntro();break
    case'reveal':     setupReveal(stock);break
    case'chart3d':    setupChart(stock,plan.stock);break
    case'signals':    setupSignals(stock);break
    case'final':      setupFinal();break
  }
  prevSceneType=plan.type
}
function renderSceneFrame(plan,elapsed){
  const stock=plan.stock!==undefined?stockData[plan.stock]:null
  switch(plan.type){
    case'intro':      renderIntro(elapsed);break
    case'reveal':     renderReveal(elapsed,stock);break
    case'chart3d':    renderChart3D(elapsed);break
    case'signals':    renderSignals(elapsed);break
    case'transition': renderTransition(elapsed);break
    case'final':      renderFinal(elapsed);break
  }
}

/* ═══════════════════════════════════════
   SEGMENT BAR
═══════════════════════════════════════ */
function buildSegBar(){
  const bar=document.getElementById('segbar')
  bar.innerHTML=SCENE_PLAN.map(()=>'<div class="seg"><div class="seg-fill"></div></div>').join('')
}
function updateSegBar(idx,pct){
  document.querySelectorAll('.seg-fill').forEach((f,i)=>{
    f.style.width=i<idx?'100%':i===idx?(pct*100)+'%':'0%'
  })
}

/* ═══════════════════════════════════════
   MASTER LOOP
═══════════════════════════════════════ */
function masterLoop(ts){
  requestAnimationFrame(masterLoop)
  if(!initialized||paused){if(!initialized)renderer.render(scene,camera);return}
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts
  if(sceneStart===null)sceneStart=ts
  const elapsed=ts-sceneStart

  ambientParticles.update(dt)
  goldLight.intensity=Math.max(1,goldLight.intensity*.998)
  activeEffects=activeEffects.filter(e=>{const a=e.update(dt);if(!a&&e.dispose)e.dispose();return a})

  renderSceneFrame(SCENE_PLAN[sceneIdx],elapsed)
  updateSegBar(sceneIdx,elapsed/SCENE_PLAN[sceneIdx].dur)

  if(elapsed>=SCENE_PLAN[sceneIdx].dur){
    sceneIdx=(sceneIdx+1)%SCENE_PLAN.length
    sceneStart=ts;onSceneEnter(SCENE_PLAN[sceneIdx])
  }
  renderer.render(scene,camera)
}

/* ═══════════════════════════════════════
   MOCK DATA + LOADER
═══════════════════════════════════════ */
function getMockData(){
  function mkChart(base,trend=1){
    const close=[],high=[],low=[],volume=[],N=65;let p=base
    for(let i=0;i<N;i++){
      const chg=(Math.random()-.47)*p*.02*trend;p=Math.max(p*.8,p+chg)
      close.push(+p.toFixed(2));high.push(+(p*(1+Math.random()*.013)).toFixed(2))
      low.push(+(p*(1-Math.random()*.013)).toFixed(2))
      volume.push(Math.floor(3e6+Math.random()*8e6*(i>52?2.6:1)))
    }
    return{close,high,low,volume,ma5:calcSMA(close,5),ma20:calcSMA(close,20)}
  }
  return{stocks:[
    {ticker:'AAPL',name:'Apple Inc.',score:84,price:198.45,change_pct:1.23,
     signals:{golden_cross:true,volume_confirm:true,rsi_signal:true,macd_cross:true,ma_alignment:true,fib_support:false,relative_strength:true},
     swing:{entry_low:196.5,entry_high:199.2,stop_loss:188,stop_pct:-5.8,target1:218.5,target1_pct:11,target1_week:2,target2:234,target2_pct:19.3,target2_week:4,rr_ratio:3.8,vol_multiple:2.1},
     chart:mkChart(185,1.1)},
    {ticker:'NVDA',name:'NVIDIA Corporation',score:92,price:875.3,change_pct:3.45,
     signals:{golden_cross:true,volume_confirm:true,macd_cross:true,ma_alignment:true,fib_support:true,relative_strength:true,bollinger_break:true},
     swing:{entry_low:860,entry_high:880,stop_loss:820,stop_pct:-6.8,target1:950,target1_pct:8.6,target1_week:2,target2:1050,target2_pct:20,target2_week:5,rr_ratio:4.2,vol_multiple:2.8},
     chart:mkChart(810,1.15)},
  ]}
}
async function loadData(){
  for(const p of['../data.json','https://kimjaeseung.github.io/stock-screener/data.json']){
    try{const r=await fetch(p+'?t='+Date.now());if(!r.ok)continue;const j=await r.json();if(j.stocks?.length>=2)return j}catch(e){continue}
  }
  return getMockData()
}

/* ═══════════════════════════════════════
   INIT — wait for fonts, then start
═══════════════════════════════════════ */
async function init(){
  buildSegBar()

  // Force font load before any canvas texture creation
  try{
    const probe=document.createElement('span')
    probe.style.cssText='position:fixed;left:-9999px;font-family:"Noto Sans KR",sans-serif;font-size:20px'
    probe.textContent='가나다 ABC'
    document.body.appendChild(probe)
    await document.fonts.ready
    await Promise.all([
      document.fonts.load('300 20px "Noto Sans KR"'),
      document.fonts.load('400 20px "Noto Sans KR"'),
      document.fonts.load('700 20px "Noto Sans KR"'),
      document.fonts.load('900 20px "Noto Sans KR"'),
    ])
    document.body.removeChild(probe)
  }catch(e){}

  ambientParticles=createAmbientParticles()
  const data=await loadData()
  stockData=data.stocks.slice(0,2)
  onSceneEnter(SCENE_PLAN[0])
  lastTs=performance.now()
  initialized=true

  // Hide loading
  const ld=document.getElementById('loading')
  ld.style.opacity='0';setTimeout(()=>ld.remove(),700)

  requestAnimationFrame(masterLoop)
}

document.getElementById('phone').addEventListener('click',()=>{paused=!paused})
init()
</script>
