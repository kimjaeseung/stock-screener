<script>
'use strict'

/* ─── ROUND RECT POLYFILL ─── */
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    this.beginPath()
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r)
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r)
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r)
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r)
    this.closePath()
  }
}

/* ─── EASING / UTILS ─── */
const easeOutCubic   = t => 1-Math.pow(1-t,3)
const easeOutQuint   = t => 1-Math.pow(1-t,5)
const easeOutElastic = t => t===0||t===1?t:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1
const easeInOutQuad  = t => t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v))
const prog  = (e,s,d) => clamp((e-s)/d,0,1)
const lerp  = (a,b,t) => a+(b-a)*t

function calcSMA(arr,n){
  return arr.map((_,i)=>i<n-1?null:arr.slice(i-n+1,i+1).reduce((a,b)=>a+b,0)/n)
}
function fmtPrice(v){
  if(v==null||isNaN(v))return'—'
  if(v<10) return'$'+v.toFixed(3)
  if(v<1000)return'$'+v.toFixed(2)
  return'$'+v.toLocaleString('en-US',{maximumFractionDigits:0})
}
function fmtPct(v){
  if(v==null||isNaN(v))return'—'
  return(v>=0?'+':'')+v.toFixed(1)+'%'
}

/* ─── THREE.JS SETUP ─── */
const PW=390,PH=844

scene.add(ambientLight)

/* ─── CANVAS TEXTURE HELPERS ─── */
function makeTextTexture(lines,opts={}){
  const{fontSize=48,color='#fff',fontWeight='700',width=512,height=128,
        glowColor=null,bgColor=null,lineSpacing=1.35}=opts
  const cvs=document.createElement('canvas')
  cvs.width=width;cvs.height=height
  const c=cvs.getContext('2d')
  if(bgColor){c.fillStyle=bgColor;c.fillRect(0,0,width,height)}
  else c.clearRect(0,0,width,height)
  if(glowColor){c.shadowColor=glowColor;c.shadowBlur=22}
  c.font=`${fontWeight} ${fontSize}px "Noto Sans KR",sans-serif`
  c.fillStyle=color
  c.textAlign='center';c.textBaseline='middle'
  const arr=Array.isArray(lines)?lines:[lines]
  const lh=fontSize*lineSpacing
  const totalH=arr.length*lh
  arr.forEach((t,i)=>{
    c.fillText(t,width/2,height/2-totalH/2+(i+0.5)*lh)
  })
  const tex=new THREE.CanvasTexture(cvs)
  tex.needsUpdate=true
  return tex
}

function makeTextMesh(lines,opts={}){
  const{width=512,height=128,meshW=null,meshH=1}=opts
  const tex=makeTextTexture(lines,opts)
  const w=meshW!==null?meshW:(width/height)*meshH
  const geo=new THREE.PlaneGeometry(w,meshH)
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide})
  return new THREE.Mesh(geo,mat)
}

/* ─── AMBIENT PARTICLES ─── */
function createAmbientParticles(){
  const N=800,geo=new THREE.BufferGeometry()
  const pos=new Float32Array(N*3),col=new Float32Array(N*3)
  for(let i=0;i<N;i++){
    pos[i*3]=(Math.random()-.5)*30
    pos[i*3+1]=(Math.random()-.5)*50
    pos[i*3+2]=(Math.random()-.5)*20
    const t=Math.random()
    col[i*3]=lerp(0.96,1,t);col[i*3+1]=lerp(0.62,0.95,t);col[i*3+2]=lerp(0.04,0.8,t)
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3))
  geo.setAttribute('color',new THREE.BufferAttribute(col,3))
  const mat=new THREE.PointsMaterial({size:0.07,vertexColors:true,transparent:true,opacity:0.5,sizeAttenuation:true})
  const pts=new THREE.Points(geo,mat)
  scene.add(pts)
  return{
    update(dt){
      const p=pts.geometry.attributes.position.array
      for(let i=0;i<N;i++){p[i*3+1]+=dt*0.22;if(p[i*3+1]>25)p[i*3+1]=-25}
      pts.geometry.attributes.position.needsUpdate=true
      pts.rotation.y+=dt*0.012
    }
  }
}

/* ─── BURST EFFECT ─── */
function createBurst(origin,color=0xf59e0b,count=200,spd=0.1){
  const geo=new THREE.BufferGeometry()
  const pos=new Float32Array(count*3)
  const vel=[]
  for(let i=0;i<count;i++){
    pos[i*3]=origin.x;pos[i*3+1]=origin.y;pos[i*3+2]=origin.z
    const a=Math.random()*Math.PI*2,e=(Math.random()-.5)*Math.PI
    const s=spd*(0.3+Math.random()*0.7)
    vel.push(new THREE.Vector3(Math.cos(a)*Math.cos(e)*s,Math.sin(e)*s,Math.sin(a)*Math.cos(e)*s))
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3))
  const mat=new THREE.PointsMaterial({color,size:0.1,transparent:true,opacity:1})
  const pts=new THREE.Points(geo,mat)
  scene.add(pts)
  let age=0,dead=false
  return{
    update(dt){
      if(dead)return false
      age+=dt
      const p=pts.geometry.attributes.position.array
      for(let i=0;i<count;i++){
        p[i*3]+=vel[i].x;p[i*3+1]+=vel[i].y-dt*0.04;p[i*3+2]+=vel[i].z
        vel[i].multiplyScalar(0.97)
      }
      pts.geometry.attributes.position.needsUpdate=true
      mat.opacity=Math.max(0,1-age/1.5)
      if(age>1.8){scene.remove(pts);geo.dispose();mat.dispose();dead=true;return false}
      return true
    },dispose(){}
  }
}

function createExpandingRing(pos,color=0xf59e0b,delay=0){
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(0.08,0.025,8,32),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.9})
  )
  ring.position.copy(pos)
  scene.add(ring)
  let age=0,dead=false
  return{
    update(dt){
      if(dead)return false
      age+=dt
      const a=age-delay;if(a<0)return true
      const sc=1+a*3.5
      ring.scale.set(sc,sc,sc)
      ring.material.opacity=Math.max(0,0.9-a)
      if(a>1){scene.remove(ring);ring.geometry.dispose();ring.material.dispose();dead=true;return false}
      return true
    },dispose(){}
  }
}

/* ─── SCENE PLAN ─── */
const SCENE_PLAN=[
  {id:'intro',  dur:3000,type:'intro'},
  {id:'rev0',   dur:3000,type:'reveal',  stock:0},
  {id:'chart0', dur:8000,type:'chart3d', stock:0},
  {id:'sig0',   dur:3500,type:'signals', stock:0},
  {id:'trans',  dur:1000,type:'transition'},
  {id:'rev1',   dur:3000,type:'reveal',  stock:1},
  {id:'chart1', dur:8000,type:'chart3d', stock:1},
  {id:'sig1',   dur:3500,type:'signals', stock:1},
  {id:'final',  dur:3000,type:'final'},
]

/* ─── STATE ─── */
let stockData=[]
let sceneIdx=0,sceneStart=null,lastTs=0,paused=false
let activeEffects=[]
let sceneObjects=[]  // disposable per-scene meshes
let ambientParticles=null
let initialized=false

function addSO(obj){scene.add(obj);sceneObjects.push(obj);return obj}
function clearSO(){
  sceneObjects.forEach(o=>{
    scene.remove(o)
    if(o.geometry)o.geometry.dispose()
    if(o.material){if(o.material.map)o.material.map.dispose();o.material.dispose()}
  })
  sceneObjects=[]
}

/* ══════════════════════════════════════════════
   INTRO SCENE
══════════════════════════════════════════════ */
let introSphere=null,introTexts=[]
function setupIntro(){
  introSphere=null;introTexts=[]
  // Gold wireframe sphere
  const sGeo=new THREE.SphereGeometry(1.2,32,32)
  const sMat=new THREE.MeshStandardMaterial({
    color:0xf59e0b,emissive:0xf59e0b,emissiveIntensity:0.5,
    wireframe:true,roughness:0.3,metalness:0.8
  })
  introSphere=new THREE.Mesh(sGeo,sMat)
  introSphere.position.set(0,2,0)
  introSphere.scale.set(0.01,0.01,0.01)
  addSO(introSphere)

  // Title text
  const tm=makeTextMesh('오늘의 추천주',{
    fontSize:56,color:'#f59e0b',fontWeight:'900',
    width:512,height:120,glowColor:'#f59e0b',meshW:7.2,meshH:1.7
  })
  tm.position.set(0,0.5,2);tm.material.opacity=0
  addSO(tm);introTexts.push(tm)

  const sm=makeTextMesh('TopStockDaily',{
    fontSize:28,color:'#ffffff88',fontWeight:'300',
    width:384,height:72,meshW:5,meshH:0.9
  })
  sm.position.set(0,-0.8,2);sm.material.opacity=0
  addSO(sm);introTexts.push(sm)
}
function renderIntro(elapsed){
  // Camera zoom
  const zp=easeOutQuint(prog(elapsed,0,1200))
  camera.position.set(0,2,lerp(60,12,zp))
  camera.lookAt(0,0,0)
  goldLight.intensity=1+Math.sin(elapsed*0.003)*1.2

  // Sphere grow
  if(introSphere){
    const sp=easeOutElastic(prog(elapsed,600,900))
    const sc=sp*1.5
    introSphere.scale.set(Math.max(0.01,sc),Math.max(0.01,sc),Math.max(0.01,sc))
    introSphere.rotation.y+=0.015;introSphere.rotation.x+=0.006
    introSphere.material.wireframe=sp<0.55
    introSphere.material.emissiveIntensity=0.3+sp*0.5
    // Burst at 2s
    if(elapsed>2000&&!introSphere.userData.burst){
      introSphere.userData.burst=true
      activeEffects.push(createBurst(new THREE.Vector3(0,2,0),0xf59e0b,350,0.14))
      for(let r=0;r<4;r++)activeEffects.push(createExpandingRing(new THREE.Vector3(0,2,0),0xf59e0b,r*0.1))
      introSphere.visible=false
    }
  }
  // Text after burst
  const tp=easeOutCubic(prog(elapsed,2050,700))
  if(tp>0){
    const flicker=elapsed>2500?0.7+0.3*Math.sin(elapsed*0.06):1
    introTexts.forEach(m=>{m.material.opacity=tp*flicker})
  }
}

/* ══════════════════════════════════════════════
   REVEAL SCENE
══════════════════════════════════════════════ */
let revealState={}
function setupReveal(stock){
  revealState={_burst:false,scoreSc:null,scoreTex:null}
  // Company name
  const nm=makeTextMesh(stock.name||stock.ticker,{
    fontSize:36,color:'#fff',fontWeight:'700',
    width:512,height:88,meshW:7.5,meshH:1.3
  })
  nm.position.set(0,5,0);nm.material.opacity=0;nm.userData.role='name'
  addSO(nm)

  // Ticker
  const tk=makeTextMesh(stock.ticker,{
    fontSize:84,color:'#f59e0b',fontWeight:'900',
    width:512,height:160,glowColor:'#f59e0b',meshW:6,meshH:2.4
  })
  tk.position.set(0,1.4,0);tk.scale.set(0.01,0.01,0.01);tk.userData.role='ticker'
  addSO(tk)

  // Price row
  const cpct=stock.change_pct!=null&&!isNaN(stock.change_pct)?fmtPct(stock.change_pct):''
  const pcol=stock.change_pct>=0?'#10b981':'#ef4444'
  const pm=makeTextMesh([fmtPrice(stock.price),cpct].filter(Boolean),{
    fontSize:40,color:pcol,fontWeight:'700',
    width:512,height:140,meshW:5,meshH:2.1,lineSpacing:1.45
  })
  pm.position.set(-10,-0.2,0);pm.material.opacity=0;pm.userData.role='price'
  addSO(pm)

  // Score bar canvas
  const cvs=document.createElement('canvas');cvs.width=512;cvs.height=80
  const sc=cvs.getContext('2d')
  sc.clearRect(0,0,512,80)
  sc.font='400 22px "Noto Sans KR",sans-serif'
  sc.fillStyle='#888';sc.textAlign='left';sc.textBaseline='middle'
  sc.fillText('신호 점수',12,24)
  sc.fillStyle='#f59e0b';sc.textAlign='right'
  sc.fillText(`${stock.score}점`,500,24)
  sc.fillStyle='#1a1a2e';sc.fillRect(12,48,488,14)
  const tex=new THREE.CanvasTexture(cvs)
  const bm=new THREE.Mesh(
    new THREE.PlaneGeometry(7,0.85),
    new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false})
  )
  bm.position.set(0,-1.8,0);bm.material.opacity=0;bm.userData.role='score'
  revealState.scoreSc=sc;revealState.scoreCvs=cvs;revealState.scoreTex=tex
  revealState.scoreStock=stock.score
  addSO(bm)
}
function renderReveal(elapsed,stock){
  camera.position.set(0,2,12);camera.lookAt(0,0,0)
  goldLight.intensity=1.5

  sceneObjects.forEach(obj=>{
    const role=obj.userData.role
    if(role==='name'){
      const p=easeOutCubic(prog(elapsed,400,900))
      obj.material.opacity=p;obj.position.y=5-(1-p)*3
    }
    if(role==='ticker'){
      const p=easeOutElastic(prog(elapsed,1200,700))
      obj.scale.set(Math.max(0.01,p),Math.max(0.01,p),Math.max(0.01,p))
      obj.material.opacity=clamp(p*2,0,1)
      if(p>0.1&&!revealState._burst){
        revealState._burst=true
        activeEffects.push(createBurst(new THREE.Vector3(0,1.4,0),0xf59e0b,200,0.12))
        for(let r=0;r<3;r++)activeEffects.push(createExpandingRing(new THREE.Vector3(0,1.4,0),0xf59e0b,r*0.08))
        goldLight.intensity=8
      }
      goldLight.intensity=Math.max(1.5,goldLight.intensity*0.95)
    }
    if(role==='price'){
      const p=easeOutCubic(prog(elapsed,1900,600))
      obj.material.opacity=p;obj.position.x=-10+p*10
    }
    if(role==='score'){
      const p=easeOutCubic(prog(elapsed,2400,700))
      obj.material.opacity=p
      // Animate fill
      if(p>0&&revealState.scoreSc){
        const sc=revealState.scoreSc
        sc.clearRect(12,48,488,14)
        sc.fillStyle='#1a1a2e';sc.fillRect(12,48,488,14)
        sc.fillStyle='#f59e0b';sc.fillRect(12,48,488*(revealState.scoreStock/100)*p,14)
        revealState.scoreTex.needsUpdate=true
      }
    }
  })
}

/* ══════════════════════════════════════════════
   CHART 3D SCENE
══════════════════════════════════════════════ */
let chartGroup=null,chartObj=null,chartLabels=[]
let csCurrent=0  // current stock index for target_lines

function buildChart3D(stock){
  const group=new THREE.Group()
  const ch=stock.chart
  const closes=ch.close,volumes=ch.volume
  const N=closes.length,CW=14,CH=6
  const minP=Math.min(...closes),maxP=Math.max(...closes)
  const range=maxP-minP||1

  // Grid
  const gh=new THREE.GridHelper(CW+2,20,0x1a1a2e,0x0d0d1a)
  gh.position.y=-0.1;group.add(gh)
  const fl=new THREE.Mesh(
    new THREE.PlaneGeometry(CW+2,12),
    new THREE.MeshBasicMaterial({color:0x030310,transparent:true,opacity:0.8,side:THREE.DoubleSide})
  )
  fl.rotation.x=-Math.PI/2;fl.position.y=-0.12;group.add(fl)

  // Price tube
  const pts=closes.map((c,i)=>new THREE.Vector3((i/(N-1))*CW-CW/2,((c-minP)/range)*CH,0))
  const curve=new THREE.CatmullRomCurve3(pts)
  const tubeGeo=new THREE.TubeGeometry(curve,N*3,0.065,8,false)
  const colArr=new Float32Array(tubeGeo.attributes.position.count*3)
  for(let i=0;i<tubeGeo.attributes.position.count;i++){
    const t=clamp(tubeGeo.attributes.position.getY(i)/CH,0,1)
    colArr[i*3]=lerp(0.23,0.96,t);colArr[i*3+1]=lerp(0.51,0.62,t);colArr[i*3+2]=lerp(0.96,0.04,t)
  }
  tubeGeo.setAttribute('color',new THREE.BufferAttribute(colArr,3))
  const tubeMat=new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.3,metalness:0.7})
  const priceTube=new THREE.Mesh(tubeGeo,tubeMat)
  priceTube.userData.type='price'
  priceTube.geometry.setDrawRange(0,0)
  group.add(priceTube)

  // Volume bars
  const maxVol=Math.max(...volumes)
  const avgVol=volumes.reduce((a,b)=>a+b,0)/N
  let spikeIdx=0,spikeMax=0
  volumes.forEach((v,i)=>{if(v>spikeMax){spikeMax=v;spikeIdx=i}})
  volumes.forEach((v,i)=>{
    const bh=Math.max(0.05,(v/maxVol)*2.4)
    const isSpike=v>avgVol*1.5
    const bm=new THREE.MeshStandardMaterial({
      color:isSpike?0x10b981:0x1a1a2e,
      emissive:isSpike?0x10b981:0x000000,
      emissiveIntensity:isSpike?0.4:0,
      transparent:true,opacity:isSpike?0.9:0.4
    })
    const bar=new THREE.Mesh(new THREE.BoxGeometry(CW/N*0.65,bh,0.3),bm)
    bar.position.set((i/(N-1))*CW-CW/2,-1.6+bh/2,-1.6)
    bar.userData={type:'volume',isSpike,targetH:bh,bottomY:-1.6}
    bar.scale.y=0.001
    group.add(bar)
  })

  // MA5
  const ma5=(ch.ma5||calcSMA(closes,5)).map((v,i)=>v==null?null:
    new THREE.Vector3((i/(N-1))*CW-CW/2,((v-minP)/range)*CH+0.1,0.14)).filter(Boolean)
  if(ma5.length>2){
    const mg=new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ma5),ma5.length*2,0.035,6)
    group.add(new THREE.Mesh(mg,new THREE.MeshBasicMaterial({color:0xf59e0b})))
  }

  // MA20
  const ma20=(ch.ma20||calcSMA(closes,20)).map((v,i)=>v==null?null:
    new THREE.Vector3((i/(N-1))*CW-CW/2,((v-minP)/range)*CH+0.06,0.07)).filter(Boolean)
  if(ma20.length>2){
    const mg=new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ma20),ma20.length*2,0.028,6)
    group.add(new THREE.Mesh(mg,new THREE.MeshBasicMaterial({color:0x60a5fa})))
  }

  // Golden cross index
  const ma5arr=ch.ma5||calcSMA(closes,5)
  const ma20arr=ch.ma20||calcSMA(closes,20)
  let crossIdx=Math.floor(N*0.6)
  for(let i=1;i<N;i++){
    if(ma5arr[i]!=null&&ma20arr[i]!=null&&ma5arr[i-1]!=null&&ma20arr[i-1]!=null){
      if(ma5arr[i-1]<=ma20arr[i-1]&&ma5arr[i]>ma20arr[i]){crossIdx=i;break}
    }
  }
  const crossX=(crossIdx/(N-1))*CW-CW/2
  const crossY=((closes[crossIdx]-minP)/range)*CH
  const spikeX=(spikeIdx/(N-1))*CW-CW/2

  return{group,priceTube,tubeGeo,N,CW,CH,closes,volumes,crossX,crossY,spikeX,minP,maxP,range}
}

// Camera sequence definition per-chart
function makeCamSeq(co){
  const{crossX,crossY,spikeX}=co
  const seqs=[
    {s:0,   e:1500,fp:new THREE.Vector3(8,6,10),tp:new THREE.Vector3(6,4,8),
     ft:new THREE.Vector3(0,2,0),tt:new THREE.Vector3(0,2,0),ease:'outCubic',label:null},
    {s:1500,e:3000,fp:new THREE.Vector3(6,4,8),tp:new THREE.Vector3(crossX,4,5),
     ft:new THREE.Vector3(0,2,0),tt:new THREE.Vector3(crossX,crossY,0),ease:'outQuint',
     label:'단기 모멘텀 켜짐 ✓',lc:'#f59e0b',effect:'burst'},
    {s:3000,e:4500,fp:new THREE.Vector3(crossX,4,5),tp:new THREE.Vector3(spikeX,0.5,4.5),
     ft:new THREE.Vector3(crossX,crossY,0),tt:new THREE.Vector3(spikeX,2,0),ease:'outCubic',
     label:'거래량 폭증 — 수급 확인 ✓',lc:'#10b981',effect:'volGlow'},
    {s:4500,e:6000,fp:new THREE.Vector3(spikeX,0.5,4.5),tp:new THREE.Vector3(0,2,9),
     ft:new THREE.Vector3(spikeX,2,0),tt:new THREE.Vector3(0,2,0),ease:'inOutQuad',
     label:'핵심 지지구간 반등 중 ✓',lc:'#a78bfa',effect:'fib'},
    {s:6000,e:7500,fp:new THREE.Vector3(0,2,9),tp:new THREE.Vector3(0,9,7),
     ft:new THREE.Vector3(0,2,0),tt:new THREE.Vector3(0,2,0),ease:'outCubic',
     label:null,effect:'targets'},
    {s:7500,e:8000,fp:new THREE.Vector3(0,9,7),tp:new THREE.Vector3(6,4,8),
     ft:new THREE.Vector3(0,2,0),tt:new THREE.Vector3(0,2,0),ease:'inOutQuad',label:null},
  ]
  const triggered={}
  const easeFns={outCubic:easeOutCubic,outQuint:easeOutQuint,inOutQuad:easeInOutQuad}

  return{
    update(elapsed){
      const sq=seqs.find(s=>elapsed>=s.s&&elapsed<s.e)
      if(!sq)return null
      const t=(elapsed-sq.s)/(sq.e-sq.s)
      const p=(easeFns[sq.ease]||easeOutCubic)(t)
      camera.position.lerpVectors(sq.fp,sq.tp,p)
      camera.lookAt(new THREE.Vector3().lerpVectors(sq.ft,sq.tt,p))

      // Effect trigger
      if(sq.effect&&t>0.4&&!triggered[sq.effect]){
        triggered[sq.effect]=true
        if(sq.effect==='burst'){
          activeEffects.push(createBurst(new THREE.Vector3(crossX,crossY,0),0xf59e0b,300,0.12))
          for(let r=0;r<3;r++)activeEffects.push(createExpandingRing(new THREE.Vector3(crossX,crossY,0),0xf59e0b,r*0.09))
          goldLight.intensity=8
        }
        if(sq.effect==='fib'&&co){
          [0.382,0.5,0.618].forEach((lv,i)=>{
            const y=lv*co.CH
            const pl=new THREE.Mesh(new THREE.PlaneGeometry(co.CW+2,0.028),
              new THREE.MeshBasicMaterial({color:[0xa78bfa,0xf59e0b,0xa78bfa][i],transparent:true,opacity:0.55,side:THREE.DoubleSide}))
            pl.position.set(0,y,0.3)
            chartGroup.add(pl)
            const lbl=makeTextMesh(`Fib ${(lv*100).toFixed(1)}%`,{fontSize:18,color:'#c4b5fd',width:180,height:44,meshW:1.7,meshH:0.42})
            lbl.position.set(co.CW/2+1.1,y,0.3)
            chartGroup.add(lbl)
          })
        }
        if(sq.effect==='targets'&&co){
          const sw=stockData[csCurrent].swing
          const toY=price=>((price-co.minP)/co.range)*co.CH
          ;[
            [sw.stop_loss,  0xef4444,'손절 '+fmtPrice(sw.stop_loss)],
            [sw.entry_high, 0xf59e0b,'진입 '+fmtPrice(sw.entry_high)],
            [sw.target1,    0x10b981,'목표1 '+fmtPrice(sw.target1)],
          ].forEach(([price,col,lbl])=>{
            const y=toY(price)
            if(isNaN(y)||y<-1||y>co.CH+1)return
            const pl=new THREE.Mesh(new THREE.PlaneGeometry(co.CW+2,0.028),
              new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.8,side:THREE.DoubleSide}))
            pl.position.set(0,y,0.25);chartGroup.add(pl)
            const lm=makeTextMesh(lbl,{fontSize:17,color:'#'+col.toString(16).padStart(6,'0'),width:240,height:48,meshW:2,meshH:0.5})
            lm.position.set(-co.CW/2-1.3,y,0.25);chartGroup.add(lm)
          })
          // Risk/reward zones
          const sy=toY(sw.stop_loss),ey=toY(sw.entry_high),t1y=toY(sw.target1)
          if(!isNaN(sy)&&!isNaN(ey)&&ey>sy){
            const dz=new THREE.Mesh(new THREE.BoxGeometry(co.CW+2,ey-sy,0.08),
              new THREE.MeshBasicMaterial({color:0xef4444,transparent:true,opacity:0.06,side:THREE.DoubleSide}))
            dz.position.set(0,(sy+ey)/2,-0.3);chartGroup.add(dz)
          }
          if(!isNaN(ey)&&!isNaN(t1y)&&t1y>ey){
            const pz=new THREE.Mesh(new THREE.BoxGeometry(co.CW+2,t1y-ey,0.08),
              new THREE.MeshBasicMaterial({color:0x10b981,transparent:true,opacity:0.06,side:THREE.DoubleSide}))
            pz.position.set(0,(ey+t1y)/2,-0.3);chartGroup.add(pz)
          }
        }
      }

      // Label info
      if(sq.label&&t>0.65)return{text:sq.label,color:sq.lc,alpha:(t-0.65)/0.35}
      return{triggered}
    },
    isVolGlow(){return!!triggered['volGlow']}
  }
}

let camSeqCtrl=null
let floatLabelMesh=null,floatLabelText=''

function setupChart(stock,si){
  csCurrent=si
  chartObj=buildChart3D(stock)
  chartGroup=chartObj.group
  scene.add(chartGroup)

  // Pre-built float label mesh (reused, texture updated when text changes)
  floatLabelMesh=makeTextMesh('',{fontSize:26,color:'#f59e0b',fontWeight:'700',width:512,height:72,glowColor:'#f59e0b',meshW:5.8,meshH:1.05})
  floatLabelMesh.position.set(0,5.5,2)
  floatLabelMesh.material.opacity=0
  scene.add(floatLabelMesh)
  floatLabelText=''

  camSeqCtrl=makeCamSeq(chartObj)
}

function renderChart3D(elapsed){
  if(!chartGroup||!chartObj||!camSeqCtrl)return
  goldLight.intensity=Math.max(1.5,goldLight.intensity*0.98)

  // Reveal drawRange
  const revP=easeOutCubic(prog(elapsed,0,2200))
  const tube=chartObj.priceTube
  if(tube&&tube.geometry.index){
    tube.geometry.setDrawRange(0,Math.floor(tube.geometry.index.count*revP))
  }

  // Volume bars scale from bottom
  chartGroup.children.forEach(c=>{
    if(c.userData.type!=='volume')return
    const s=Math.max(0.001,easeOutQuint(clamp(revP*1.6-0.2,0,1)))
    c.scale.y=s
    c.position.y=c.userData.bottomY+c.userData.targetH*s/2
    // Glow pulsing when volGlow triggered
    if(camSeqCtrl.isVolGlow()&&c.userData.isSpike){
      c.material.emissiveIntensity=0.3+0.45*Math.sin(elapsed*0.006)
    }
  })

  // Camera + label
  const labelInfo=camSeqCtrl.update(elapsed)
  if(floatLabelMesh){
    if(labelInfo&&labelInfo.text){
      if(labelInfo.text!==floatLabelText){
        floatLabelText=labelInfo.text
        const newTex=makeTextTexture(labelInfo.text,{
          fontSize:26,color:labelInfo.color,fontWeight:'700',
          width:512,height:72,glowColor:labelInfo.color
        })
        if(floatLabelMesh.material.map)floatLabelMesh.material.map.dispose()
        floatLabelMesh.material.map=newTex
        floatLabelMesh.material.needsUpdate=true
      }
      floatLabelMesh.material.opacity=easeOutCubic(labelInfo.alpha)
      floatLabelMesh.lookAt(camera.position)
    } else {
      floatLabelMesh.material.opacity*=0.96
    }
  }

  chartGroup.rotation.y=Math.sin(elapsed*0.0003)*0.04
}

function cleanupChart(){
  if(chartGroup){
    scene.remove(chartGroup)
    chartGroup.traverse(c=>{
      if(c.geometry)c.geometry.dispose()
      if(c.material){if(c.material.map)c.material.map.dispose();c.material.dispose()}
    })
    chartGroup=null;chartObj=null
  }
  if(floatLabelMesh){
    scene.remove(floatLabelMesh)
    if(floatLabelMesh.material.map)floatLabelMesh.material.map.dispose()
    floatLabelMesh.geometry.dispose();floatLabelMesh.material.dispose()
    floatLabelMesh=null
  }
  camSeqCtrl=null
}

function renderTransition(elapsed){
  const p=elapsed/1000
  if(p<0.3)renderer.toneMappingExposure=1.2+(p/0.3)*5.5
  else if(p<0.6)renderer.toneMappingExposure=6.7-((p-0.3)/0.3)*5.5
  else renderer.toneMappingExposure=1.2
  if(p>0.3&&p<0.75){
    const rp=(p-0.3)/0.45,angle=rp*Math.PI*2,r=12
    camera.position.set(Math.sin(angle)*r,2,Math.cos(angle)*r)
    camera.lookAt(0,0,0)
  } else if(p>=0.75){
    camera.position.set(0,2,12);camera.lookAt(0,0,0)
  }
}

/* ══════════════════════════════════════════════
   SCENE MANAGEMENT
══════════════════════════════════════════════ */
let prevType=null
function onSceneEnter(plan){
  clearSO()
  renderer.toneMappingExposure=1.2
  if(prevType==='chart3d'&&plan.type!=='chart3d')cleanupChart()

  const stock=plan.stock!==undefined?stockData[plan.stock]:null
  switch(plan.type){
    case'intro':      setupIntro();break
    case'reveal':     setupReveal(stock);break
    case'chart3d':    setupChart(stock,plan.stock);break
    case'signals':    setupSignals(stock);break
    case'final':      setupFinal();break
  }
  prevType=plan.type
}

function renderSceneFrame(plan,elapsed){
  const stock=plan.stock!==undefined?stockData[plan.stock]:null
  switch(plan.type){
    case'intro':      renderIntro(elapsed);break
    case'reveal':     renderReveal(elapsed,stock);break
    case'chart3d':    renderChart3D(elapsed);break
    case'signals':    renderSignals(elapsed);break
    case'transition': renderTransition(elapsed);break
    case'final':      renderFinal(elapsed);break
  }
}

/* ─── SEGMENT BAR ─── */
function buildSegBar(){
  const bar=document.getElementById('segbar')
  bar.innerHTML=''
  SCENE_PLAN.forEach(()=>{
    const d=document.createElement('div');d.className='seg'
    const f=document.createElement('div');f.className='seg-fill'
    d.appendChild(f);bar.appendChild(d)
  })
}
function updateSegBar(idx,pct){
  document.querySelectorAll('.seg-fill').forEach((f,i)=>{
    if(i<idx)f.style.width='100%'
    else if(i===idx)f.style.width=(pct*100)+'%'
    else f.style.width='0%'
  })
}

/* ─── MASTER LOOP ─── */
function masterLoop(ts){
  requestAnimationFrame(masterLoop)
  if(!initialized||paused){if(!initialized)renderer.render(scene,camera);return}
  const dt=Math.min((ts-lastTs)/1000,0.05)
  lastTs=ts
  if(sceneStart===null)sceneStart=ts
  const elapsed=ts-sceneStart

  ambientParticles.update(dt)
  goldLight.intensity=Math.max(1,goldLight.intensity*0.995)
  activeEffects=activeEffects.filter(e=>{const a=e.update(dt);if(!a&&e.dispose)e.dispose();return a})

  renderSceneFrame(SCENE_PLAN[sceneIdx],elapsed)
  updateSegBar(sceneIdx,elapsed/SCENE_PLAN[sceneIdx].dur)

  if(elapsed>=SCENE_PLAN[sceneIdx].dur){
    sceneIdx=(sceneIdx+1)%SCENE_PLAN.length
    sceneStart=ts
    onSceneEnter(SCENE_PLAN[sceneIdx])
  }
  renderer.render(scene,camera)
}

async function loadData(){
  const paths=['../data.json','https://kimjaeseung.github.io/stock-screener/data.json']
  for(const p of paths){
    try{
      const r=await fetch(p+'?t='+Date.now())
      if(!r.ok)continue
      const j=await r.json()
      if(j.stocks?.length>=2)return j
    }catch(e){continue}
  }
  return getMockData()
}

async function init(){
  buildSegBar()
  ambientParticles=createAmbientParticles()
  const data=await loadData()
  stockData=data.stocks.slice(0,2)
  onSceneEnter(SCENE_PLAN[0])
  lastTs=performance.now()
  initialized=true
  requestAnimationFrame(masterLoop)
}

document.getElementById('phone').addEventListener('click',()=>{paused=!paused})
init()
