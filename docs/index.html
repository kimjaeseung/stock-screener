<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TopStockDaily</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;font-family:'SF Pro Display',system-ui,sans-serif;color:#fff;
       display:flex;flex-direction:column;align-items:center;min-height:100vh}
  h1{font-size:1.4rem;letter-spacing:0.12em;padding:1rem 0 0.4rem;
     background:linear-gradient(90deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;
     -webkit-text-fill-color:transparent}
  #subtitle{font-size:0.72rem;color:#555;letter-spacing:0.08em;margin-bottom:0.8rem}
  #stage{position:relative;width:360px;height:640px;border-radius:18px;overflow:hidden;
         box-shadow:0 0 60px rgba(0,212,255,0.18)}
  canvas{display:block;width:100%;height:100%}
  #controls{display:flex;gap:0.8rem;margin-top:1rem;align-items:center}
  button{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
         color:#fff;padding:0.4rem 1rem;border-radius:20px;cursor:pointer;
         font-size:0.78rem;transition:all 0.2s}
  button:hover{background:rgba(0,212,255,0.15);border-color:#00d4ff}
  #tickerPicker{display:flex;gap:0.5rem;margin:0.6rem 0;flex-wrap:wrap;justify-content:center}
  .tpBtn{padding:0.3rem 0.7rem;border-radius:12px;font-size:0.72rem;cursor:pointer;
         border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);
         color:#aaa;transition:all 0.2s}
  .tpBtn.active{border-color:#00d4ff;color:#00d4ff;background:rgba(0,212,255,0.08)}
  #progressBar{width:360px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:0.4rem}
  #progressFill{height:100%;background:linear-gradient(90deg,#00d4ff,#7b2ff7);border-radius:2px;
                width:0%;transition:width 0.1s linear}
  #statusBar{font-size:0.65rem;color:#444;margin-top:0.4rem;letter-spacing:0.05em}
  #regimeBadge{margin:0.3rem 0 0.5rem;font-size:0.72rem;font-weight:600;letter-spacing:0.08em;
               padding:0.25rem 0.9rem;border-radius:20px;border:1px solid;display:none}
  #regimeBadge.bull{color:#00ff88;border-color:#00ff8844;background:rgba(0,255,136,0.07)}
  #regimeBadge.caution{color:#ffaa00;border-color:#ffaa0044;background:rgba(255,170,0,0.07)}
  #regimeBadge.bear{color:#ff4444;border-color:#ff444444;background:rgba(255,68,68,0.07)}
  #top10Section{width:360px;margin-top:1.2rem;margin-bottom:2rem}
  #top10Section h2{font-size:0.78rem;color:#555;letter-spacing:0.1em;text-align:center;
                   margin-bottom:0.7rem;text-transform:uppercase}
  .stockCard{display:flex;align-items:center;gap:0.6rem;padding:0.6rem 0.8rem;
             border-radius:14px;background:rgba(255,255,255,0.03);
             border:1px solid rgba(255,255,255,0.06);margin-bottom:0.45rem;
             cursor:pointer;transition:all 0.2s}
  .stockCard:hover{background:rgba(0,212,255,0.07);border-color:rgba(0,212,255,0.25)}
  .stockCard.active{background:rgba(0,212,255,0.1);border-color:#00d4ff55}
  .cardRank{font-size:0.65rem;color:#555;width:1.4rem;text-align:center;flex-shrink:0}
  .cardTicker{font-size:0.95rem;font-weight:700;color:#00d4ff;width:3.4rem;flex-shrink:0}
  .cardNames{flex:1;min-width:0}
  .cardKrName{font-size:0.72rem;color:rgba(255,255,255,0.55);white-space:nowrap;
              overflow:hidden;text-overflow:ellipsis}
  .cardEnName{font-size:0.62rem;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cardScore{font-size:0.9rem;font-weight:700;flex-shrink:0;text-align:right;width:2.5rem}
  .cardPrice{font-size:0.7rem;color:#666;flex-shrink:0;text-align:right;width:3.2rem}
  .cardSignalDot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<h1>TopStockDaily</h1>
<div id="subtitle">NASDAQ · NYSE TOP PICKS — AUTO REELS</div>
<div id="regimeBadge"></div>

<div id="tickerPicker"></div>

<div id="stage">
  <canvas id="c" width="720" height="1280"></canvas>
</div>

<div id="progressBar"><div id="progressFill"></div></div>
<div id="statusBar" id="statusBar">Loading...</div>

<div id="controls">
  <button id="btnPrev">◀ Prev</button>
  <button id="btnPlay">⏸ Pause</button>
  <button id="btnNext">Next ▶</button>
  <button id="btnRefresh" onclick="loadData()">↺ Refresh</button>
  <button id="btnSaveVideo" title="캔버스만 녹화·다운로드 (동영상에는 버튼이 나오지 않음)">Save as video</button>
</div>

<div id="top10Section">
  <h2>TODAY'S TOP 10</h2>
  <div id="top10List"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  CONSTANTS & GLOBALS
// ══════════════════════════════════════════════════════════
const W = 720, H = 1280;
const API = './data.json';
const SCENE_DURATION = 3200; // ms per scene (60s / 18 scenes ≈ 3.3s)
const TOTAL_SCENES = 18;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const progressFill = document.getElementById('progressFill');
const statusBar = document.getElementById('statusBar');

let stocks = [];
let krNames = {};
let regimeInfo = null;
let currentStockIdx = 0;
let currentScene = 0;
let isPlaying = true;
let sceneTimer = null;
let sceneStart = 0;
let particles = [];
let comets = [];
let animFrame = null;

// ══════════════════════════════════════════════════════════
//  DATA LOADING
// ══════════════════════════════════════════════════════════
// 신호 객체 → 읽기 좋은 문자열 배열로 변환 (구형 배열 포맷도 호환)
const SIGNAL_LABELS = {
  golden_cross:    '골든크로스 (MA20>MA60)',
  early_trend:     '조기 추세 전환 (MA5>MA20)',
  ma_alignment:    'MA 완전 정렬 (5>20>60)',
  macd_cross:      'MACD 골든크로스',
  macd_turned:     'MACD 마이너스→플러스 전환',
  volume_confirm:  '거래량 급증 (1.5x+)',
  rsi_signal:      'RSI 모멘텀 존 (50-73)',
  rsi_oversold:    'RSI 과매도 반등',
  rsi_divergence:  'RSI 강세 다이버전스',
  bollinger_break: '볼린저 상단 돌파',
  fib_support:     '피보나치 지지선',
  stoch_signal:    '스토캐스틱 반등',
  relative_strength:'SPY 대비 상대강도',
};
function getSignalList(s) {
  const raw = s.signals;
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;   // 구형 배열 포맷 호환
  return Object.entries(raw)
    .filter(([, v]) => v)
    .map(([k]) => SIGNAL_LABELS[k] || k);
}

async function loadData() {
  statusBar.textContent = 'Loading today\'s picks...';
  drawLoading();
  try {
    const [res, krRes] = await Promise.all([
      fetch(API + '?t=' + Date.now()),
      fetch('./kr_names.json').catch(() => null),
    ]);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (krRes && krRes.ok) krNames = await krRes.json();
    stocks = json.stocks || [];
    regimeInfo = json.regime || null;
    if (stocks.length === 0) throw new Error('No stocks in data.json');
    const regime = regimeInfo ? ` · 레짐: ${regimeInfo.regime.toUpperCase()} (VIX ${regimeInfo.vix})` : '';
    statusBar.textContent = `갱신: ${json.updated_at} · SPY 20d: ${json.spy_20d > 0 ? '+' : ''}${json.spy_20d}%${regime}`;
    buildTickerPicker();
    buildTop10List(json);
    startReels(0);
  } catch(e) {
    statusBar.textContent = 'Error: ' + e.message;
    drawError(e.message);
  }
}

// ══════════════════════════════════════════════════════════
//  TICKER PICKER
// ══════════════════════════════════════════════════════════
function buildTop10List(json) {
  // Regime badge
  const badge = document.getElementById('regimeBadge');
  if (json.regime) {
    const r = json.regime;
    const labels = {bull:'강세장', caution:'주의구간', bear:'약세장'};
    badge.textContent = `시장 레짐: ${labels[r.regime]||r.regime.toUpperCase()} | VIX ${r.vix} | SPY 20d ${json.spy_20d>0?'+':''}${json.spy_20d}%`;
    badge.className = r.regime;
    badge.style.display = 'inline-block';
  }

  // TOP 10 card list
  const list = document.getElementById('top10List');
  list.innerHTML = '';
  stocks.slice(0, 10).forEach((s, i) => {
    const score = s.score;
    const scoreClr = score >= 70 ? '#00ff88' : score >= 55 ? '#00d4ff' : '#ffaa00';
    const kr = krNames[s.ticker] || '';
    const change = s.change_pct;
    const chClr = change >= 0 ? '#00ff88' : '#ff4444';
    const card = document.createElement('div');
    card.className = 'stockCard' + (i === 0 ? ' active' : '');
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="cardRank">#${i+1}</div>
      <div class="cardTicker">${s.ticker}</div>
      <div class="cardNames">
        <div class="cardKrName">${kr || s.name || '—'}</div>
        <div class="cardEnName">${s.sector||''}</div>
      </div>
      <div class="cardPrice" style="color:${chClr}">$${s.price}<br><span style="font-size:0.6rem">${change>=0?'+':''}${change}%</span></div>
      <div class="cardScore" style="color:${scoreClr}">${score}pt</div>
    `;
    card.onclick = () => switchStock(i);
    list.appendChild(card);
  });
}

function updateTop10Active() {
  document.querySelectorAll('.stockCard').forEach(card => {
    card.classList.toggle('active', parseInt(card.dataset.idx) === currentStockIdx);
  });
}

function buildTickerPicker() {
  const el = document.getElementById('tickerPicker');
  el.innerHTML = '';
  stocks.slice(0, 10).forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'tpBtn' + (i === 0 ? ' active' : '');
    btn.textContent = `#${i+1} ${s.ticker}`;
    btn.onclick = () => { switchStock(i); };
    el.appendChild(btn);
  });
}

function updateTickerPicker() {
  document.querySelectorAll('.tpBtn').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentStockIdx);
  });
  updateTop10Active();
}

// ══════════════════════════════════════════════════════════
//  REELS ENGINE
// ══════════════════════════════════════════════════════════
function startReels(stockIdx) {
  cancelAnimationFrame(animFrame);
  clearTimeout(sceneTimer);
  currentStockIdx = stockIdx;
  currentScene = 0;
  particles = [];
  comets = [];
  updateTickerPicker();
  playScene();
}

function switchStock(idx) {
  startReels(idx);
}

function nextScene() {
  currentScene++;
  if (currentScene >= TOTAL_SCENES) {
    // Auto-advance to next stock or loop
    const next = (currentStockIdx + 1) % Math.min(stocks.length, 10);
    if (next !== currentStockIdx) {
      startReels(next);
    } else {
      currentScene = 0;
      playScene();
    }
    return;
  }
  playScene();
}

function prevSceneAction() {
  currentScene = Math.max(0, currentScene - 1);
  playScene();
}

function playScene() {
  if (!stocks[currentStockIdx]) return;
  sceneStart = performance.now();
  clearTimeout(sceneTimer);
  if (isPlaying) {
    sceneTimer = setTimeout(nextScene, SCENE_DURATION);
  }
  // Reset per-scene particles
  particles = [];
  comets = [];
  renderLoop();
}

function renderLoop() {
  cancelAnimationFrame(animFrame);
  const stock = stocks[currentStockIdx];
  if (!stock) return;
  const elapsed = performance.now() - sceneStart;
  const progress = Math.min(elapsed / SCENE_DURATION, 1);

  // Progress bar
  const globalProgress = (currentStockIdx * TOTAL_SCENES + currentScene) / (Math.min(stocks.length, 10) * TOTAL_SCENES);
  progressFill.style.width = (globalProgress * 100) + '%';

  ctx.clearRect(0, 0, W, H);
  drawScene(stock, currentScene, elapsed, progress);
  updateParticles();
  drawParticles();
  drawComets(elapsed);

  if (isPlaying || elapsed < SCENE_DURATION) {
    animFrame = requestAnimationFrame(renderLoop);
  }
}

// ══════════════════════════════════════════════════════════
//  SCENE ROUTER
// ══════════════════════════════════════════════════════════
function drawScene(s, scene, t, p) {
  switch(scene) {
    case 0:  drawIntro(s, t, p); break;
    case 1:  drawScoreReveal(s, t, p); break;
    case 2:  drawPriceAction(s, t, p); break;
    case 3:  drawCandleChart(s, t, p); break;
    case 4:  drawBollingerScene(s, t, p); break;
    case 5:  drawVolumeScene(s, t, p); break;
    case 6:  drawRSIScene(s, t, p); break;
    case 7:  drawMACDScene(s, t, p); break;
    case 8:  drawStochScene(s, t, p); break;
    case 9:  drawGoldenCrossScene(s, t, p); break;
    case 10: drawMomentumScene(s, t, p); break;
    case 11: drawSignal1(s, t, p); break;
    case 12: drawSignal2(s, t, p); break;
    case 13: drawSignal3(s, t, p); break;
    case 14: drawRSBonusScene(s, t, p); break;
    case 15: drawSummaryScene(s, t, p); break;
    case 16: drawFinaleScene(s, t, p); break;
    case 17: drawCompareScene(t, p); break;
  }
}

// ══════════════════════════════════════════════════════════
//  BACKGROUND HELPERS
// ══════════════════════════════════════════════════════════
function drawBg(color1='#05080f', color2='#0d1420') {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, color1);
  g.addColorStop(1, color2);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawGrid(alpha=0.04) {
  ctx.save();
  ctx.strokeStyle = `rgba(0,212,255,${alpha})`;
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();
}

function drawGlow(x, y, r, color, alpha=0.3) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, color.replace(')', `,${alpha})`).replace('rgb','rgba'));
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
}

function gradText(text, x, y, size, color1, color2, align='center') {
  ctx.save();
  ctx.font = `700 ${size}px "SF Pro Display",system-ui,sans-serif`;
  ctx.textAlign = align;
  const g = ctx.createLinearGradient(x - 200, 0, x + 200, 0);
  g.addColorStop(0, color1);
  g.addColorStop(1, color2);
  ctx.fillStyle = g;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function fadeIn(t, duration=400) {
  return Math.min(1, t / duration);
}

function easeOut(t) {
  return 1 - Math.pow(1 - t, 3);
}

function scoreColor(score) {
  if (score >= 80) return '#00ff88';
  if (score >= 60) return '#00d4ff';
  if (score >= 40) return '#ffaa00';
  return '#ff4444';
}

// ══════════════════════════════════════════════════════════
//  SCENE 0 — INTRO
// ══════════════════════════════════════════════════════════
function drawIntro(s, t, p) {
  drawBg('#03050a', '#080d18');
  drawGrid(0.03);
  spawnComet(t);

  const a = easeOut(Math.min(1, t / 600));
  const rank = stocks.indexOf(s) + 1;

  // Rank badge
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = rank === 1 ? '#ffd700' : rank === 2 ? '#c0c0c0' : '#cd7f32';
  ctx.font = '700 28px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`#${rank} TOP PICK`, W/2, 180);

  // Ticker
  gradText(s.ticker, W/2, 320, 110, '#00d4ff', '#7b2ff7');

  // Korean name
  const krName = krNames[s.ticker] || s.name || '';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '400 26px system-ui';
  ctx.fillText(krName, W/2, 368);

  // Price
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '400 34px system-ui';
  ctx.fillText(`$${s.price}`, W/2, 412);

  // Score circle
  const sc = scoreColor(s.score);
  drawScoreCircle(W/2, 580, 80, s.score, sc, a);

  ctx.restore();
}

function drawScoreCircle(cx, cy, r, score, color, alpha=1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // Background ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 8;
  ctx.stroke();
  // Score arc
  const pct = Math.min(score, 100) / 100;
  ctx.beginPath();
  ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * pct);
  ctx.strokeStyle = color;
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.stroke();
  // Text
  ctx.fillStyle = color;
  ctx.font = '700 42px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(score, cx, cy);
  ctx.font = '400 18px system-ui';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('SCORE', cx, cy + 36);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ══════════════════════════════════════════════════════════
//  SCENE 1 — SCORE REVEAL
// ══════════════════════════════════════════════════════════
function drawScoreReveal(s, t, p) {
  drawBg('#050812', '#0a1025');
  drawGrid(0.025);

  const a = easeOut(Math.min(1, t / 500));
  ctx.save();
  ctx.globalAlpha = a;

  // Title
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '500 26px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('SIGNAL SCORE', W/2, 140);
  gradText(s.ticker, W/2, 210, 72, '#00d4ff', '#7b2ff7');

  // Animated score number
  const displayScore = Math.round(easeOut(p) * s.score);
  const sc = scoreColor(displayScore);
  ctx.fillStyle = sc;
  ctx.font = `700 140px system-ui`;
  ctx.textAlign = 'center';
  ctx.fillText(displayScore, W/2, 420);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '400 22px system-ui';
  ctx.fillText('/ 100', W/2 + 100, 430);

  // Signal pills
  const signals = getSignalList(s);
  signals.slice(0, 4).forEach((sig, i) => {
    const y = 520 + i * 68;
    const fade = Math.min(1, Math.max(0, (t - 400 - i * 120) / 300));
    ctx.globalAlpha = a * fade;
    ctx.fillStyle = 'rgba(0,212,255,0.08)';
    roundRect(ctx, 80, y - 32, W - 160, 50, 14);
    ctx.fill();
    ctx.fillStyle = '#00d4ff';
    ctx.font = '500 22px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(sig, W/2, y);
    ctx.globalAlpha = a;
  });

  ctx.restore();
}

// ══════════════════════════════════════════════════════════
//  SCENE 2 — PRICE ACTION SUMMARY
// ══════════════════════════════════════════════════════════
function drawPriceAction(s, t, p) {
  drawBg('#040810', '#0c1020');
  const a = easeOut(Math.min(1, t / 500));
  ctx.save();
  ctx.globalAlpha = a;

  gradText(s.ticker, W/2, 150, 60, '#00d4ff', '#7b2ff7');

  const det = s.details || {};
  const rows = [
    ['Price', `$${s.price}`, '#ffffff'],
    ['5D Return', `${(det.ret_5d||0) > 0 ? '+' : ''}${(det.ret_5d||0).toFixed(1)}%`, (det.ret_5d||0) >= 0 ? '#00ff88' : '#ff4444'],
    ['20D Return', `${(det.ret_20d||0) > 0 ? '+' : ''}${(det.ret_20d||0).toFixed(1)}%`, (det.ret_20d||0) >= 0 ? '#00ff88' : '#ff4444'],
    ['Vol Ratio', `${s.vol_ratio}×`, s.vol_ratio >= 2 ? '#00ff88' : s.vol_ratio >= 1.2 ? '#00d4ff' : '#aaa'],
    ['RSI', `${(det.rsi||0).toFixed(0)}`, rsiColor(det.rsi||50)],
    ['RS vs SPY', `${(s.rs_diff||0) > 0 ? '+' : ''}${(s.rs_diff||0).toFixed(1)}%`, (s.rs_diff||0) >= 0 ? '#00ff88' : '#ff4444'],
  ];

  rows.forEach(([label, val, color], i) => {
    const y = 250 + i * 110;
    const delay = 200 + i * 80;
    const rowA = Math.min(1, Math.max(0, (t - delay) / 300));
    ctx.globalAlpha = a * rowA;

    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    roundRect(ctx, 60, y - 44, W - 120, 80, 16);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '400 22px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(label, 100, y);

    ctx.fillStyle = color;
    ctx.font = '700 28px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(val, W - 100, y);
  });

  ctx.restore();
}

function rsiColor(rsi) {
  if (rsi > 70) return '#ff4444';
  if (rsi >= 55) return '#00ff88';
  if (rsi >= 45) return '#00d4ff';
  return '#ffaa00';
}

// ══════════════════════════════════════════════════════════
//  SCENE 3 — CANDLE CHART
// ══════════════════════════════════════════════════════════
function drawCandleChart(s, t, p) {
  drawBg('#030608', '#070e18');
  const chart = s.chart;
  if (!chart || !chart.close || chart.close.length < 20) {
    drawChartUnavailable(s, t); return;
  }

  const a = easeOut(Math.min(1, t / 400));
  ctx.save();
  ctx.globalAlpha = a;

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '600 28px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`${s.ticker} — Price Action`, W/2, 100);

  const n = chart.close.length;
  const candleCount = Math.min(n, 40);
  const startIdx = n - candleCount;
  const margin = { l: 60, r: 40, t: 140, b: 200 };
  const cw = W - margin.l - margin.r;
  const ch = H - margin.t - margin.b;

  const slice = {
    open: chart.open.slice(startIdx),
    high: chart.high.slice(startIdx),
    low: chart.low.slice(startIdx),
    close: chart.close.slice(startIdx),
    ma20: chart.ma20.slice(startIdx),
    ma60: chart.ma60.slice(startIdx),
  };

  const allVals = [...slice.high.filter(Boolean), ...slice.low.filter(Boolean)];
  const minY = Math.min(...allVals) * 0.998;
  const maxY = Math.max(...allVals) * 1.002;

  const toY = v => margin.t + ch - ((v - minY) / (maxY - minY)) * ch;
  const barW = cw / candleCount * 0.65;

  // Reveal animation: draw candles progressively
  const revealCount = Math.round(easeOut(p) * candleCount);

  for (let i = 0; i < revealCount; i++) {
    const x = margin.l + (i + 0.5) * (cw / candleCount);
    const o = slice.open[i], h = slice.high[i], l = slice.low[i], c = slice.close[i];
    if (!o || !h || !l || !c) continue;
    const bull = c >= o;
    ctx.strokeStyle = bull ? '#00ff88' : '#ff4444';
    ctx.fillStyle = bull ? '#00ff8833' : '#ff444433';
    ctx.lineWidth = 1.5;

    // Wick
    ctx.beginPath();
    ctx.moveTo(x, toY(h));
    ctx.lineTo(x, toY(l));
    ctx.stroke();

    // Body
    const bodyTop = toY(Math.max(o, c));
    const bodyH = Math.abs(toY(o) - toY(c)) || 1;
    ctx.fillRect(x - barW/2, bodyTop, barW, bodyH);
    ctx.strokeRect(x - barW/2, bodyTop, barW, bodyH);
  }

  // MA lines
  const drawMA = (arr, color) => {
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    let started = false;
    arr.slice(0, revealCount).forEach((v, i) => {
      if (!v) return;
      const x = margin.l + (i + 0.5) * (cw / candleCount);
      const y = toY(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  };
  drawMA(slice.ma20, 'rgba(0,212,255,0.8)');
  drawMA(slice.ma60, 'rgba(255,170,0,0.6)');

  // Legend
  ctx.font = '400 18px system-ui';
  ctx.fillStyle = 'rgba(0,212,255,0.8)'; ctx.textAlign = 'left'; ctx.fillText('MA20', margin.l, H - 160);
  ctx.fillStyle = 'rgba(255,170,0,0.8)'; ctx.fillText('MA60', margin.l + 80, H - 160);

  ctx.restore();
}

// ══════════════════════════════════════════════════════════
//  SCENE 4 — BOLLINGER BANDS
// ══════════════════════════════════════════════════════════
function drawBollingerScene(s, t, p) {
  drawBg('#030810', '#070f1c');
  const chart = s.chart;
  if (!chart || !chart.bb_upper) { drawChartUnavailable(s, t); return; }

  const a = easeOut(Math.min(1, t / 400));
  ctx.save();
  ctx.globalAlpha = a;

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '600 28px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`${s.ticker} — Bollinger Bands`, W/2, 100);

  const squeezeRatio = s.details?.bb_squeeze || 1;
  const isSqueezing = squeezeRatio < 0.85;
  if (isSqueezing) {
    ctx.fillStyle = '#00d4ff';
    ctx.font = '600 22px system-ui';
    ctx.fillText('⚡ BOLLINGER SQUEEZE DETECTED', W/2, 145);
  }

  const n = chart.close.length;
  const cnt = Math.min(n, 50);
  const si = n - cnt;
  const margin = { l: 60, r: 40, t: 180, b: 200 };
  const cw = W - margin.l - margin.r;
  const ch = H - margin.t - margin.b;

  const closeSlice = chart.close.slice(si);
  const upperSlice = chart.bb_upper.slice(si);
  const lowerSlice = chart.bb_lower.slice(si);
  const allVals = [...closeSlice, ...upperSlice, ...lowerSlice].filter(Boolean);
  const minY = Math.min(...allVals) * 0.998;
  const maxY = Math.max(...allVals) * 1.002;
  const toY = v => margin.t + ch - ((v - minY) / (maxY - minY)) * ch;
  const toX = i => margin.l + (i / (cnt - 1)) * cw;

  const revealCount = Math.round(easeOut(p) * cnt);

  // Band fill
  ctx.beginPath();
  upperSlice.slice(0, revealCount).forEach((v, i) => {
    if (!v) return;
    i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v));
  });
  for (let i = Math.min(revealCount, cnt) - 1; i >= 0; i--) {
    const v = lowerSlice[i];
    if (!v) continue;
    ctx.lineTo(toX(i), toY(v));
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,212,255,0.06)';
  ctx.fill();

  // Upper & lower bands
  [upperSlice, lowerSlice].forEach((arr, idx) => {
    ctx.beginPath();
    ctx.strokeStyle = idx === 0 ? 'rgba(0,212,255,0.5)' : 'rgba(0,212,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    let started = false;
    arr.slice(0, revealCount).forEach((v, i) => {
      if (!v) return;
      if (!started) { ctx.moveTo(toX(i), toY(v)); started = true; }
      else ctx.lineTo(toX(i), toY(v));
    });
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Close line
  ctx.beginPath();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2.5;
  let s2 = false;
  closeSlice.slice(0, revealCount).forEach((v, i) => {
    if (!v) return;
    if (!s2) { ctx.moveTo(toX(i), toY(v)); s2 = true; }
    else ctx.lineTo(toX(i), toY(v));
  });
  ctx.stroke();

  // Bandwidth label
  ctx.globalAlpha = a * easeOut(Math.min(1, (t - 800) / 300));
  ctx.fillStyle = isSqueezing ? '#00d4ff' : '#aaa';
  ctx.font = '500 22px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`Bandwidth ratio: ${(squeezeRatio * 100).toFixed(0)}% of 20d avg`, W/2, H - 150);

  ctx.restore();
}

// ══════════════════════════════════════════════════════════
//  SCENE 5 — VOLUME
// ══════════════════════════════════════════════════════════
function drawVolumeScene(s, t, p) {
  drawBg('#03080c', '#070f14');
  const chart = s.chart;
  if (!chart) { drawChartUnavailable(s, t); return; }

  const a = easeOut(Math.min(1, t / 400));
  ctx.save();
  ctx.globalAlpha = a;

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '600 28px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`${s.ticker} — Volume Analysis`, W/2, 100);

  // Vol ratio badge
  const vr = s.vol_ratio;
  const vrColor = vr >= 2 ? '#00ff88' : vr >= 1.5 ? '#00d4ff' : '#aaa';
  ctx.fillStyle = vrColor;
  ctx.font = '700 48px system-ui';
  ctx.fillText(`${vr}×`, W/2, 200);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '400 20px system-ui';
  ctx.fillText('vs 20-day avg volume', W/2, 240);

  const n = chart.volume.length;
  const cnt = Math.min(n, 40);
  const si = n - cnt;
  const volSlice = chart.volume.slice(si);
  const closeSlice = chart.close.slice(si);
  const margin = { l: 60, r: 40, t: 290, b: 200 };
  const cw = W - margin.l - margin.r;
  const ch = H - margin.t - margin.b;

  const maxVol = Math.max(...volSlice.filter(Boolean));
  const barW = cw / cnt * 0.75;
  const revealCount = Math.round(easeOut(p) * cnt);

  volSlice.slice(0, revealCount).forEach((v, i) => {
    if (!v) return;
    const x = margin.l + (i + 0.5) * (cw / cnt);
    const barH = (v / maxVol) * ch;
    const c_now = closeSlice[i], c_prev = i > 0 ? closeSlice[i-1] : c_now;
    const bull = c_now >= (c_prev || c_now);
    const isLast = i === revealCount - 1;
    ctx.fillStyle = isLast
      ? (vr >= 2 ? '#00ff88' : vr >= 1.5 ? '#00d4ff' : '#888')
      : (bull ? 'rgba(0,255,136,0.4)' : 'rgba(255,68,68,0.4)');
    ctx.fillRect(x - barW/2, margin.t + ch - barH, barW, barH);
  });

  // Avg line
  const avgVol = volSlice.reduce((a, b) => a + (b||0), 0) / cnt;
  const avgY = margin.t + ch - (avgVol / maxVol) * ch;
  ctx.setLineDash([8, 5]);
  ctx.strokeStyle = 'rgba(255,170,0,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(margin.l, avgY);
  ctx.lineTo(margin.l + cw, avgY);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

// ══════════════════════════════════════════════════════════
//  SCENE 6 — RSI
// ══════════════════════════════════════════════════════════
function drawRSIScene(s, t, p) {
  drawBg('#040a0c', '#081018');
  const chart = s.chart;
  if (!chart?.rsi) { drawChartUnavailable(s, t); return; }

  const a = easeOut(Math.min(1, t / 400));
  ctx.save();
  ctx.globalAlpha = a;

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '600 28px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`${s.ticker} — RSI (14)`, W/2, 100);

  const rsiVal = s.details?.rsi || 0;
  ctx.fillStyle = rsiColor(rsiVal);
  ctx.font = '700 80px system-ui';
  ctx.fillText(rsiVal.toFixed(0), W/2, 210);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '400 20px system-ui';
  const zone = rsiVal > 70 ? 'OVERBOUGHT' : rsiVal >= 55 ? 'BULLISH ZONE' : rsiVal >= 45 ? 'NEUTRAL' : 'OVERSOLD';
  ctx.fillText(zone, W/2, 250);

  const n = chart.rsi.length;
  const cnt = Math.min(n, 50);
  const si = n - cnt;
  const rsiSlice = chart.rsi.slice(si);
  const margin = { l: 60, r: 40, t: 310, b: 200 };
  const cw = W - margin.l - margin.r;
  const ch = H - margin.t - margin.b;

  // OB/OS zones
  ctx.fillStyle = 'rgba(255,68,68,0.06)';
  const obY = margin.t + ch - (70 / 100) * ch;
  ctx.fillRect(margin.l, margin.t, cw, obY - margin.t);
  ctx.fillStyle = 'rgba(0,212,255,0.06)';
  const osY = margin.t + ch - (30 / 100) * ch;
  ctx.fillRect(margin.l, osY, cw, margin.t + ch - osY);

  // Level lines
  [30, 50, 70].forEach(level => {
    const ly = margin.t + ch - (level / 100) * ch;
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = level === 50 ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(margin.l, ly); ctx.lineTo(margin.l + cw, ly);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '400 16px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(level, margin.l - 40, ly + 5);
  });

  // RSI line
  const toY = v => margin.t + ch - (v / 100) * ch;
  const toX = i => margin.l + (i / (cnt - 1)) * cw;
  const revealCount = Math.round(easeOut(p) * cnt);

  ctx.beginPath();
  ctx.lineWidth = 2.5;
  let started = false;
  rsiSlice.slice(0, revealCount).forEach((v, i) => {
    if (v == null) return;
    const x = toX(i), y = toY(v);
    if (!started) { ctx.moveTo(x, y); started = true; }
    else ctx.lineTo(x, y);
  });
  const grad = ctx.createLinearGradient(0, margin.t, 0, margin.t + ch);
  grad.addColorStop(0, '#ff4444');
  grad.addColorStop(0.5, '#00d4ff');
  grad.addColorStop(1, '#00ff88');
  ctx.strokeStyle = grad;
  ctx.stroke();

  ctx.restore();
}

// ══════════════════════════════════════════════════════════
//  SCENE 7 — MACD
// ══════════════════════════════════════════════════════════
function drawMACDScene(s, t, p) {
  drawBg('#030810', '#06101a');
  const chart = s.chart;
  if (!chart?.macd_hist) { drawChartUnavailable(s, t); return; }

  const a = easeOut(Math.min(1, t / 400));
  ctx.save();
  ctx.globalAlpha = a;

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '600 28px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`${s.ticker} — MACD`, W/2, 100);

  const macdDiff = s.details?.macd || 0;
  const bullMacd = macdDiff > 0;
  ctx.fillStyle = bullMacd ? '#00ff88' : '#ff4444';
  ctx.font = '700 52px system-ui';
  ctx.fillText(bullMacd ? 'BULLISH' : 'BEARISH', W/2, 200);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '400 20px system-ui';
  ctx.fillText(`MACD − Signal: ${macdDiff > 0 ? '+' : ''}${macdDiff.toFixed(4)}`, W/2, 245);

  const n = chart.macd_hist.length;
  const cnt = Math.min(n, 50);
  const si = n - cnt;
  const histSlice = chart.macd_hist.slice(si);
  const margin = { l: 60, r: 40, t: 300, b: 200 };
  const cw = W - margin.l - margin.r;
  const ch = H - margin.t - margin.b;

  const vals = histSlice.filter(Boolean);
  const maxH = Math.max(...vals.map(Math.abs)) || 1;
  const midY = margin.t + ch / 2;
  const barW = cw / cnt * 0.75;
  const revealCount = Math.round(easeOut(p) * cnt);

  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(margin.l, midY); ctx.lineTo(margin.l + cw, midY);
  ctx.stroke();

  histSlice.slice(0, revealCount).forEach((v, i) => {
    if (v == null) return;
    const x = margin.l + (i + 0.5) * (cw / cnt);
    const barH = (Math.abs(v) / maxH) * (ch / 2);
    ctx.fillStyle = v >= 0 ? 'rgba(0,255,136,0.65)' : 'rgba(255,68,68,0.65)';
    const y = v >= 0 ? midY - barH : midY;
    ctx.fillRect(x - barW/2, y, barW, barH);
  });

  ctx.restore();
}

  ctx.font = '700 70px system-ui';

  ctx.fillStyle = 'rgba(255,255,255,0.4)';

  const cnt = Math.min(n, 50);
  const si = n - cnt;
  const kSlice = chart.stoch_k.slice(si);
  const dSlice = chart.stoch_d.slice(si);
  const margin = { l: 60, r: 40, t: 310, b: 200 };
  const cw = W - margin.l - margin.r;
  const ch = H - margin.t - margin.b;

  const toY = v => margin.t + ch - (v / 100) * ch;
  const toX = i => margin.l + (i / (cnt - 1)) * cw;
  const revealCount = Math.round(easeOut(p) * cnt);

  // Zones
  ctx.fillStyle = 'rgba(255,68,68,0.06)';
  ctx.fillRect(margin.l, margin.t, cw, ch * 0.3);
  ctx.fillStyle = 'rgba(0,212,255,0.06)';
  ctx.fillRect(margin.l, margin.t + ch * 0.7, cw, ch * 0.3);

    ctx.lineWidth = width;

      if (v == null) return;
      if (!st) { ctx.moveTo(toX(i), toY(v)); st = true; }
      else ctx.lineTo(toX(i), toY(v));
    });
    ctx.stroke();
  };
  drawLine(kSlice, '#00d4ff', 2.5);
  drawLine(dSlice, 'rgba(255,170,0,0.7)', 2);

  ctx.restore();
}

function drawGauge(cx, cy, r, pct, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.3;
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 12;
  ctx.stroke();
  ctx.globalAlpha = alpha;
  const angle = Math.PI + pct * Math.PI;
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, angle);
  ctx.strokeStyle = color;
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();
}

// ══════════════════════════════════════════════════════════

    ctx.fillStyle = sc;
    ctx.font = '700 56px system-ui';

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '400 16px system-ui';
    ctx.fillText('SCORE', cx, 428);

    getSignalList(s).slice(0, 3).forEach((sig, i) => {

      ctx.textAlign = 'center';

// ══════════════════════════════════════════════════════════
//  PARTICLES & COMETS
// ══════════════════════════════════════════════════════════
function spawnComet(t) {
  if (Math.random() < 0.015) {
    comets.push({
      x: Math.random() * W,
      y: 0,
      vx: (Math.random() - 0.5) * 3,
      vy: 8 + Math.random() * 6,
      len: 60 + Math.random() * 80,
      alpha: 0.4 + Math.random() * 0.4,
      born: performance.now(),
    });
  }
}

function drawComets(t) {
  const now = performance.now();
  comets = comets.filter(c => {
    const age = (now - c.born) / 1000;
    if (age > 1.2 || c.y > H + 50) return false;
    const a = c.alpha * (1 - age / 1.2);
    const g = ctx.createLinearGradient(c.x, c.y, c.x - c.vx * 10, c.y - c.vy * 10);
    g.addColorStop(0, `rgba(0,212,255,${a})`);
    g.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.strokeStyle = g;
    ctx.lineWidth = 2;
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x - c.vx * 12, c.y - c.vy * 12);
    ctx.stroke();
    c.x += c.vx * 0.3;
    c.y += c.vy * 0.3;
    return true;
  });
}

function burstEffect(cx, cy, r, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const speed = 1 + Math.random() * 2;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 3,
      color,
      alpha: 0.8,
      life: 1,
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0.02);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life *= 0.94;
    p.alpha = p.life;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ══════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let currY = y;
  words.forEach(word => {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      ctx.fillText(line.trim(), x, currY);
      line = word + ' ';
      currY += lineH;
    } else {
      line = test;
    }
  });
  ctx.fillText(line.trim(), x, currY);
}

// ══════════════════════════════════════════════════════════
//  SAVE AS VIDEO (캔버스만 캡처 → 동영상에 버튼 미포함)
// ══════════════════════════════════════════════════════════
(function() {
  let mediaRecorder = null;
  let chunks = [];
  const btn = document.getElementById('btnSaveVideo');
  const FPS = 30;
  const MAX_DURATION_MS = 120000; // 2분 후 자동 정지

  function getMimeType() {
    const types = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
    for (const t of types) {
      if (MediaRecorder.isTypeSupported(t)) return t;
    }
    return '';
  }

  btn.onclick = function() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      return;
    }
    try {
      const stream = canvas.captureStream(FPS);
      const mime = getMimeType();
      const options = mime ? { mimeType: mime, videoBitsPerSecond: 2500000 } : { videoBitsPerSecond: 2500000 };
      mediaRecorder = new MediaRecorder(stream, options);
      chunks = [];
      mediaRecorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'TopStockDaily_reels_' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.webm';
        a.click();
        URL.revokeObjectURL(url);
        btn.textContent = 'Save as video';
        mediaRecorder = null;
      };
      mediaRecorder.start(500);
      btn.textContent = 'Stop & Save';
      setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
      }, MAX_DURATION_MS);
    } catch (e) {
      statusBar.textContent = 'Video not supported: ' + e.message;
      btn.textContent = 'Save as video';
    }
  };
})();
