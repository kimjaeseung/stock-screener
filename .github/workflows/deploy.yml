name: Deploy to GitHub Pages

# push 시 즉시 배포 (코드 변경, reels 업데이트 등)
# 스케줄 업데이트는 update.yml 이 처리함

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Vite SPA
        run: npm run build

      # dist/ 구조:
      #   /stock-screener/           ← Vite SPA
      #   /stock-screener/reels/     ← Three.js 릴스 페이지  (docs/reels/index.html)
      #   /stock-screener/data.json  ← reels 가 ../data.json 으로 읽는 파일
      - name: Copy reels & data into dist
        run: |
          mkdir -p dist/reels
          cp docs/reels/index.html dist/reels/index.html
          cp docs/data.json        dist/data.json
          cp docs/kr_names.json    dist/kr_names.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
