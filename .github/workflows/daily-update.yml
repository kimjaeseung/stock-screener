name: Daily Stock Update (TopStockDaily)

on:
  schedule:
    - cron: '30 20 * * 1-5'  # 여름(EDT) 나스닥 마감 후 — KST 05:30
    - cron: '30 21 * * 1-5'  # 겨울(EST) 나스닥 마감 후 — KST 06:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run screener
        run: python scripts/tsd/run.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push
