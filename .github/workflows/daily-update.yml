name: Daily Stock Update (DISABLED — 대신 update.yml 사용)

# ⚠ 이 워크플로우는 비활성화됨.
# update.yml 로 통합됨 (스크리닝 + 빌드 + 배포 한번에 처리).

on:
  workflow_dispatch:  # 수동 실행만 가능 (schedule 제거)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/tsd/run.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json public/data/
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push
