name: 나스닥 스크리닝 자동 업데이트

# 매일 11:00 KST = UTC 02:00 에만 스크리너 실행 (데이터 기준 11시로 표시)
# workflow_dispatch 로 수동 실행 가능

on:
  schedule:
    - cron: '0 2 * * *'      # 매일 11:00 KST (02:00 UTC)
  workflow_dispatch:          # GitHub Actions UI에서 수동 실행 가능

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true   # 두 크론이 겹칠 경우 최신 실행만 유지

jobs:
  screen-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20       # top-100 배치 다운로드 ~5분, 빌드 ~2분 → 여유 충분

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python: 스크리닝 ────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run screener (top-100 NASDAQ, batch download)
        run: python scripts/tsd/run.py

      - name: Commit & push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json public/data/
          if git diff --staged --quiet; then
            echo "데이터 변경 없음 — 커밋 스킵"
          else
            git commit -m "chore: 스크리닝 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      # ── Node.js: Vite 빌드 ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Vite SPA
        run: npm run build

      # ── dist/ 구조 구성 ──────────────────────────────────────────────────
      # /stock-screener/           ← Vite SPA (index.html + assets/)
      # /stock-screener/reels/     ← Three.js 릴스 페이지
      # /stock-screener/data.json  ← reels가 ../data.json 으로 참조
      - name: Copy reels & data into dist
        run: |
          mkdir -p dist/reels
          cp docs/reels/index.html dist/reels/index.html
          cp docs/data.json        dist/data.json
          cp docs/kr_names.json    dist/kr_names.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
