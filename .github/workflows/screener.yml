name: Daily Stock Screener

on:
  schedule:
    # 한국 장 마감 후 (UTC 07:30 = KST 16:30) 평일
    - cron: '30 7 * * 1-5'
    # 미국 장 마감 후 (UTC 22:30 = EST 17:30) 평일
    - cron: '30 22 * * 1-5'
  workflow_dispatch:  # 수동 실행 (GitHub Actions 탭에서 클릭)
    inputs:
      test_mode:
        description: '테스트 모드 (상위 20종목만 스캔)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run screener
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            echo "🧪 테스트 모드로 실행합니다"
            python scripts/screener.py --test
          else
            echo "🚀 전체 스캔 모드로 실행합니다"
            python scripts/screener.py
          fi

      - name: Commit & push results
        run: |
          git config user.name "Signal Deck Bot"
          git config user.email "bot@signal-deck.local"
          git add public/data/
          git diff --staged --quiet || git commit -m "📊 스크리닝 결과 업데이트 $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
