name: Daily Stock Screener (DISABLED — 대신 update.yml 사용)

# ⚠ 이 워크플로우는 비활성화됨.
# 6,754개 종목 순차 처리로 60분+ 타임아웃 발생.
# update.yml (top-100 배치 다운로드, ~5분)으로 대체됨.

on:
  workflow_dispatch:  # 수동 실행만 가능 (schedule 제거)
    inputs:
      test_mode:
        description: '테스트 모드'
        required: false
        default: 'true'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run screener
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python scripts/screener.py --test
          else
            python scripts/screener.py
          fi

      - name: Commit & push results
        run: |
          git config user.name "Signal Deck Bot"
          git config user.email "bot@signal-deck.local"
          git add public/data/
          git diff --staged --quiet || git commit -m "📊 스크리닝 결과 업데이트 $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
